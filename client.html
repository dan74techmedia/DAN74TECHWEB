<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAN74TECH MEDIA | Client Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brandBlue: '#0044ff', 
                        brandRed: '#ff2a2a', 
                        brandYellow: '#ffd700',
                        facebookBg: '#f0f2f5'
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f0f2f5; color: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; }
        .hide { display: none !important; }
        .scroll-clean::-webkit-scrollbar { width: 6px; }
        .scroll-clean::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .hero-mesh { background: radial-gradient(circle at 80% 20%, rgba(0, 68, 255, 0.05), transparent 50%); }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <section id="auth-section" class="flex-grow flex items-center justify-center p-6 hero-mesh">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-b-4 border-brandBlue">
            <div class="text-center mb-8">
                <div class="flex justify-center mb-4">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-brandBlue to-brandRed p-[2px]">
                        <div class="w-full h-full bg-white rounded-[6px] flex items-center justify-center font-bold text-brandBlue">D</div>
                    </div>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight">DAN74TECH<span class="text-brandBlue">.</span>MEDIA</h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Client Login Details</p>
            </div>
            <div id="login-view">
                <form id="login-form" class="space-y-4">
                    <input type="email" id="login-email" placeholder="Clearance Email" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brandBlue outline-none text-sm">
                    <input type="password" id="login-password" placeholder="Passphrase" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brandBlue outline-none text-sm">
                    <button type="submit" class="w-full bg-brandBlue text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg">LOGIN CHAT MODE</button>
                </form>
                <button onclick="toggleAuth('register')" class="w-full mt-4 text-sm font-semibold text-brandBlue hover:underline">REGISTER NOW</button>
            </div>
        </div>
    </section>

    <section id="dashboard-section" class="flex-grow hide flex flex-col h-screen overflow-hidden">
        <nav class="bg-white/90 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50 px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="font-mono font-extrabold text-sm tracking-tighter">DAN74TECH<span class="text-brandBlue">.</span>MEDIA</span>
            </div>
            <div class="flex gap-1 h-full items-center">
                <button onclick="switchTab('feed')" id="tab-feed" class="px-6 h-full border-b-2 border-brandBlue text-brandBlue transition-all"><i class="fa-solid fa-house"></i></button>
                <button onclick="switchTab('messages')" id="tab-messages" class="px-6 h-full border-b-2 border-transparent text-gray-400 hover:text-brandBlue transition-all"><i class="fa-solid fa-message"></i></button>
            </div>
            <button onclick="logoutPipeline()" class="text-gray-400 hover:text-brandRed transition-colors"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <div class="flex-grow overflow-y-auto scroll-clean p-4">
            <div class="max-w-2xl mx-auto space-y-6">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                    <div class="flex gap-3 mb-4">
                        <div id="publisher-avatar" class="w-10 h-10 rounded-full bg-brandBlue text-white flex items-center justify-center font-bold">U</div>
                        <button onclick="openPublishModal()" class="flex-grow bg-gray-50 hover:bg-gray-100 text-left text-gray-500 px-4 py-2 rounded-full border border-gray-100 transition">Update the community...</button>
                    </div>
                </div>

                <div id="social-feed-container" class="space-y-4"></div>
            </div>
        </div>
    </section>

    <div id="publish-modal" class="hide fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-gray-100">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="font-extrabold text-gray-800">Create Post</h3>
                <button onclick="closePublishModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="new-publish-form" class="p-4 space-y-4">
                <select id="pub-target" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-sm font-semibold outline-none focus:ring-2 focus:ring-brandBlue">
                    <option value="blog">Blog Entry</option>
                    <option value="case_study">Case Study</option>
                </select>
                <input type="text" id="pub-title" placeholder="Catchy Title" required class="w-full text-lg font-bold outline-none border-b border-gray-100 pb-2">
                <textarea id="pub-content" rows="4" placeholder="Share your insights..." required class="w-full outline-none text-sm resize-none"></textarea>
                
                <div class="flex flex-wrap gap-2 pt-2 border-t border-gray-50">
                    <label class="cursor-pointer bg-blue-50 text-brandBlue px-3 py-1.5 rounded-lg text-[10px] font-bold flex items-center gap-2 hover:bg-blue-100">
                        <i class="fa-solid fa-image"></i> Media/Files
                        <input type="file" id="pub-media" class="hidden" accept="image/*,video/*">
                    </label>
                    <button type="button" onclick="promptTag()" class="bg-green-50 text-green-600 px-3 py-1.5 rounded-lg text-[10px] font-bold flex items-center gap-2 hover:bg-green-100">
                        <i class="fa-solid fa-user-tag"></i> Tag People
                    </button>
                    <button type="button" onclick="promptLocation()" class="bg-red-50 text-brandRed px-3 py-1.5 rounded-lg text-[10px] font-bold flex items-center gap-2 hover:bg-red-100">
                        <i class="fa-solid fa-location-dot"></i> Pin Location
                    </button>
                </div>

                <button type="submit" class="w-full bg-brandBlue text-white font-extrabold py-3 rounded-xl shadow-lg hover:bg-blue-700 transition">Publish to Matrix</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'https://dan74techweb.onrender.com/api';
        let token = localStorage.getItem('dan74tech_token');
        let userNode = JSON.parse(localStorage.getItem('dan74tech_user'));

        function setViewState() {
            if(token) {
                document.getElementById('auth-section').classList.add('hide');
                document.getElementById('dashboard-section').classList.remove('hide');
                if(userNode) document.getElementById('publisher-avatar').innerText = userNode.name[0];
                fetchSocialFeed();
            }
        }

        async function fetchSocialFeed() {
            const container = document.getElementById('social-feed-container');
            try {
                const res = await fetch(`${API_BASE}/feed/global`);
                const data = await res.json();
                container.innerHTML = data.map(item => `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="p-4 flex gap-3 items-center">
                            <div class="w-8 h-8 rounded-full bg-brandBlue text-white flex items-center justify-center text-xs font-bold">${item.author_name ? item.author_name[0] : 'D'}</div>
                            <div>
                                <h4 class="text-sm font-bold">${item.author_name || 'Dan74Tech Media'}</h4>
                                <p class="text-[10px] text-gray-400 uppercase font-bold">${item.type} • ${new Date(item.created_at).toLocaleDateString()}</p>
                            </div>
                        </div>
                        <div class="px-4 pb-2">
                            <h2 class="text-lg font-extrabold mb-1">${item.title}</h2>
                            <p class="text-sm text-gray-600 leading-relaxed">${item.content.substring(0, 150)}...</p>
                        </div>
                        ${item.media_url ? `<img src="${item.media_url}" class="w-full h-64 object-cover">` : ''}
                        <div class="p-3 border-t border-gray-50 flex justify-between text-gray-500 font-bold text-xs">
                            <button class="hover:text-brandBlue transition"><i class="fa-regular fa-thumbs-up"></i> Like</button>
                            <button class="hover:text-brandBlue transition"><i class="fa-regular fa-comment"></i> Comment</button>
                            <span>${item.views_count} Views</span>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error("Feed link failure", e); }
        }

        document.getElementById('new-publish-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('target', document.getElementById('pub-target').value);
            formData.append('title', document.getElementById('pub-title').value);
            formData.append('content', document.getElementById('pub-content').value);
            const file = document.getElementById('pub-media').files[0];
            if(file) formData.append('media', file);

            try {
                const res = await fetch(`${API_BASE}/content/publish`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                if(res.ok) {
                    closePublishModal();
                    fetchSocialFeed();
                    alert("Submission received and queued for clearance.");
                }
            } catch(e) { alert("Matrix Sync Error: " + e.message); }
        });

        // UI Helpers
        function openPublishModal() { document.getElementById('publish-modal').classList.remove('hide'); }
        function closePublishModal() { document.getElementById('publish-modal').classList.add('hide'); }
        function toggleAuth(v) { /* Logic to swap login/reg views */ }
        function logoutPipeline() { localStorage.clear(); location.reload(); }
        window.onload = setViewState;
    </script>
</body>
</html>
