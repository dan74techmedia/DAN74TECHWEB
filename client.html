<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAN74TECH MEDIA | Client Hub</title>
    
    <meta name="description" content="DAN74TECH Professional Client Portal & Social Feed Matrix">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brandBlue: '#0044ff', 
                        brandRed: '#ff2a2a', 
                        brandYellow: '#ffd700',
                        bgLight: '#f8fafc',
                        textMain: '#0f172a',
                        textMuted: '#475569',
                        borderLight: '#e2e8f0'
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            background-color: theme('colors.bgLight'); 
            color: theme('colors.textMain');
            overflow-y: scroll;
        }
        
        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Premium Geometric Backgrounds */
        .hero-mesh {
            background: radial-gradient(circle at 80% 20%, rgba(0, 68, 255, 0.05), transparent 50%),
                        radial-gradient(circle at 10% 80%, rgba(255, 42, 42, 0.04), transparent 45%);
        }

        /* Nav & UI Utilities */
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .nav-item-active { background-color: rgba(0, 68, 255, 0.05); color: #0044ff; }
        .nav-item-active i { color: #0044ff; }
        
        /* Modals & Toasts Animations */
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        .toast-notification { animation: slideInLeft 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInLeft { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Chat Docks */
        .chat-dock { transition: transform 0.2s ease; transform-origin: bottom right; }
        .chat-dock.minimized { transform: translateY(calc(100% - 48px)); }

        .loader-spinner {
            border: 3px solid rgba(0,68,255,0.1); border-left-color: #0044FF;
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        [v-cloak] { display: none !important; }
    </style>
</head>
<body class="antialiased selection:bg-brandBlue selection:text-white hero-mesh">

    <div id="toastCenter" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <section id="authView" class="fixed inset-0 z-50 bg-bgLight flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl border border-gray-100 overflow-hidden relative">
            <div class="absolute inset-0 bg-gradient-to-tr from-brandBlue/5 to-brandRed/5 pointer-events-none"></div>
            
            <div class="p-8 text-center border-b border-gray-100 relative z-10">
                <div class="h-12 mx-auto mb-4 flex items-center justify-center overflow-hidden">
                    <img src="images/logo.png" alt="DAN74TECH Logo" class="h-full w-auto object-contain" onerror="this.src='https://placehold.co/150x50?text=DAN74TECH'">
                </div>
                <h2 class="text-2xl font-extrabold tracking-tight text-textMain font-mono">DAN74TECH<span class="text-brandBlue">.</span><span class="text-brandRed">MEDIA</span></h2>
                <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest font-bold">Secure Client Login</p>
            </div>
            
            <div id="loginFormContainer" class="p-8 space-y-5 relative z-10">
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-extrabold text-gray-500 mb-1.5 uppercase tracking-wider font-mono">Email*</label>
                        <div class="relative">
                            <i class="fa-solid fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="email" id="loginEmail" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue outline-none text-sm font-medium transition-all" placeholder="client@domain.com" required>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-[10px] font-extrabold text-gray-500 mb-1.5 uppercase tracking-wider font-mono">Password*</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="password" id="loginPassword" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue outline-none text-sm font-medium transition-all" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full py-3 mt-2 bg-brandBlue hover:opacity-90 text-white font-bold rounded-lg shadow-md shadow-brandBlue/20 transition-all text-sm tracking-wide flex items-center justify-center gap-2">
                        LOGIN <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    </button>
                </form>
                
                <div class="text-center pt-5 border-t border-gray-100">
                    <button onclick="toggleAuth('register')" class="text-xs font-bold text-gray-500 hover:text-brandBlue transition-colors">CREATE NEW ACCOUNT</button>
                </div>
            </div>

            <div id="registerFormContainer" class="p-8 space-y-5 relative z-10 hidden">
                <form id="registerForm" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-extrabold text-gray-500 mb-1.5 uppercase tracking-wider font-mono">Full Name</label>
                        <input type="text" id="regName" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue outline-none text-sm transition-all" placeholder="John Doe" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-extrabold text-gray-500 mb-1.5 uppercase tracking-wider font-mono">Email</label>
                        <input type="email" id="regEmail" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue outline-none text-sm transition-all" placeholder="john@domain.com" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-extrabold text-gray-500 mb-1.5 uppercase tracking-wider font-mono">Phone/Contact</label>
                            <input type="text" id="regPhone" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue outline-none text-sm transition-all" placeholder="+254..." required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-extrabold text-gray-500 mb-1.5 uppercase tracking-wider font-mono">Password</label>
                            <input type="password" id="regPassword" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue outline-none text-sm transition-all" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="w-full py-3 mt-2 bg-gradient-to-r from-brandBlue to-brandRed hover:opacity-90 text-white font-bold rounded-lg shadow-md transition-all text-sm tracking-wide">
                        REGISTER
                    </button>
                </form>
                <div class="text-center pt-5 border-t border-gray-100">
                    <button onclick="toggleAuth('login')" class="text-xs font-bold text-gray-500 hover:text-brandBlue transition-colors">Back to LOGIN</button>
                </div>
            </div>
        </div>
    </section>

    <div id="appWrapper" class="hidden flex flex-col h-screen overflow-hidden relative">
        
        <header class="glass-panel border-b border-gray-100 h-16 fixed top-0 w-full z-40 flex items-center justify-between px-4 sm:px-6 lg:px-8 transition-all duration-300">
            <div class="flex items-center gap-4 flex-1 min-w-0">
                <div class="h-9 flex-shrink-0 overflow-hidden rounded-[7px] bg-white flex items-center justify-center">
                    <img src="images/logo.png" alt="DAN74TECH Logo" class="h-full w-auto object-contain" onerror="this.src='https://placehold.co/100?text=DAN74TECH'">
                </div>
                <div class="hidden md:flex items-center bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 w-full max-w-[240px] focus-within:ring-2 focus-within:ring-brandBlue/20 focus-within:border-brandBlue transition-all">
                    <i class="fa-solid fa-search text-gray-400 text-sm"></i>
                    <input type="text" placeholder="Search matrices..." class="bg-transparent border-none outline-none ml-2 text-sm w-full text-gray-700 placeholder-gray-400">
                </div>
            </div>

            <nav class="hidden md:flex h-full items-center justify-center gap-1 flex-1">
                <button onclick="switchView('feed')" class="view-tab active relative px-5 h-full flex items-center justify-center text-gray-500 hover:text-brandBlue transition-colors group" data-target="feed">
                    <div class="flex items-center gap-2 font-bold text-sm tracking-wide">
                        <i class="fa-solid fa-satellite-dish text-base group-hover:scale-110 transition-transform"></i>
                        <span class="hidden lg:inline">HOME</span>
                    </div>
                    <div class="active-indicator absolute bottom-0 w-full h-0.5 bg-brandBlue hidden"></div>
                </button>
                <button onclick="switchView('orders')" class="view-tab relative px-5 h-full flex items-center justify-center text-gray-500 hover:text-brandBlue transition-colors group" data-target="orders">
                    <div class="flex items-center gap-2 font-bold text-sm tracking-wide">
                        <i class="fa-solid fa-layer-group text-base group-hover:scale-110 transition-transform"></i>
                        <span class="hidden lg:inline">ORDER</span>
                    </div>
                    <div class="active-indicator absolute bottom-0 w-full h-0.5 bg-brandBlue hidden"></div>
                </button>
                <button onclick="switchView('dashboard')" class="view-tab relative px-5 h-full flex items-center justify-center text-gray-500 hover:text-brandBlue transition-colors group" data-target="dashboard">
                    <div class="flex items-center gap-2 font-bold text-sm tracking-wide">
                        <i class="fa-solid fa-chart-pie text-base group-hover:scale-110 transition-transform"></i>
                        <span class="hidden lg:inline">PROFILE</span>
                    </div>
                    <div class="active-indicator absolute bottom-0 w-full h-0.5 bg-brandBlue hidden"></div>
                </button>
            </nav>

            <div class="flex items-center justify-end gap-3 flex-1">
                <button class="w-9 h-9 rounded-full bg-gray-50 border border-gray-100 hover:bg-gray-100 flex items-center justify-center transition-colors flex-shrink-0">
                    <i class="fa-regular fa-bell text-gray-600"></i>
                </button>
                <button onclick="logout()" class="hidden sm:flex items-center gap-2 pl-1.5 pr-4 py-1.5 rounded-full bg-white border border-gray-200 hover:bg-gray-50 transition-colors shadow-sm cursor-pointer group flex-shrink-0">
                    <div class="w-7 h-7 rounded-full bg-brandBlue text-white flex items-center justify-center font-bold font-mono text-[10px]" id="headerAvatar">U</div>
                    <span class="text-xs font-bold text-gray-700 max-w-[100px] truncate" id="headerName">User</span>
                    <i class="fa-solid fa-arrow-right-from-bracket text-gray-400 text-xs ml-1 group-hover:text-brandRed transition-colors"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 mt-16 flex justify-center max-w-7xl mx-auto w-full relative z-10">
            
            <aside class="hidden lg:block w-[280px] p-6 h-[calc(100vh-64px)] overflow-y-auto">
                <div class="space-y-1.5">
                    <div onclick="switchView('dashboard')" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white hover:shadow-sm border border-transparent hover:border-gray-100 cursor-pointer transition-all">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-brandBlue to-blue-400 text-white flex items-center justify-center font-bold font-mono text-sm shadow-sm" id="sideAvatar">U</div>
                        <div class="flex flex-col">
                            <span class="text-sm font-extrabold text-gray-900" id="sideName">User Name</span>
                            <span class="text-[10px] font-mono text-emerald-500 font-bold uppercase">Online</span>
                        </div>
                    </div>
                    
                    <div class="pt-4 pb-2">
                        <h3 class="px-3 text-[10px] font-extrabold text-gray-400 tracking-widest uppercase font-mono">System Modules</h3>
                    </div>
                    
                    <button onclick="switchView('feed')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white hover:shadow-sm border border-transparent hover:border-gray-100 cursor-pointer transition-all text-gray-600 group">
                        <div class="w-8 h-8 rounded-lg bg-blue-50 text-brandBlue flex items-center justify-center group-hover:scale-105 transition-transform"><i class="fa-solid fa-users text-sm"></i></div>
                        <span class="text-xs font-bold tracking-wide">Home</span>
                    </button>
                    <button onclick="switchView('orders')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white hover:shadow-sm border border-transparent hover:border-gray-100 cursor-pointer transition-all text-gray-600 group">
                        <div class="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-500 flex items-center justify-center group-hover:scale-105 transition-transform"><i class="fa-solid fa-server text-sm"></i></div>
                        <span class="text-xs font-bold tracking-wide">Order Services</span>
                    </button>
                    <button onclick="switchView('dashboard')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white hover:shadow-sm border border-transparent hover:border-gray-100 cursor-pointer transition-all text-gray-600 group">
                        <div class="w-8 h-8 rounded-lg bg-purple-50 text-purple-500 flex items-center justify-center group-hover:scale-105 transition-transform"><i class="fa-solid fa-folder-tree text-sm"></i></div>
                        <span class="text-xs font-bold tracking-wide">Profile</span>
                    </button>
                    
                    <div class="pt-4 pb-2">
                        <h3 class="px-3 text-[10px] font-extrabold text-gray-400 tracking-widest uppercase font-mono">Profile Settings</h3>
                    </div>
                    <button onclick="toggleProfileEdit()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white hover:shadow-sm border border-transparent hover:border-gray-100 cursor-pointer transition-all text-gray-600 group">
                        <div class="w-8 h-8 rounded-lg bg-gray-100 text-gray-500 flex items-center justify-center group-hover:scale-105 transition-transform"><i class="fa-solid fa-sliders text-sm"></i></div>
                        <span class="text-xs font-bold tracking-wide">Settings</span>
                    </button>
                </div>
            </aside>

            <main class="w-full md:w-[600px] lg:w-[680px] h-[calc(100vh-64px)] overflow-y-auto scroll-smooth pb-24 sm:pb-8 px-4 flex flex-col items-center" id="mainScrollArea">
                
                <div id="view-feed" class="w-full max-w-2xl pt-6 space-y-5">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
                        <div class="flex gap-3 border-b border-gray-100 pb-4">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-brandBlue to-blue-400 text-white flex items-center justify-center font-bold text-sm shadow-sm flex-shrink-0" id="postAvatar">U</div>
                            <button onclick="openPostModal()" class="flex-1 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-xl text-left px-4 text-sm font-medium text-gray-500 transition-colors">
                               <span class="firstName">User</span>, create a new post (blog/case) today.
                            </button>
                        </div>
                        <div class="flex justify-around pt-3">
                            <button onclick="openPostModal('blog_posts')" class="flex-1 flex justify-center items-center gap-2 py-2 hover:bg-gray-50 rounded-lg text-xs font-bold text-gray-600 transition-colors">
                                <i class="fa-solid fa-feather text-brandBlue"></i> Tech Blog
                            </button>
                            <button onclick="openPostModal('case_studies')" class="flex-1 flex justify-center items-center gap-2 py-2 hover:bg-gray-50 rounded-lg text-xs font-bold text-gray-600 transition-colors border-l border-gray-100">
                                <i class="fa-solid fa-chart-line text-emerald-500"></i> Case Study
                            </button>
                        </div>
                    </div>

                    <div id="feedStream" class="space-y-5 pb-8">
                        <div class="text-center py-10 text-gray-400 font-mono text-xs flex flex-col items-center" id="feedLoader">
                            <div class="loader-spinner mb-3"></div>
                            Loading...
                        </div>
                    </div>
                </div>

                <div id="view-orders" class="w-full max-w-2xl pt-6 space-y-5 hidden">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 sm:p-8">
                        <div class="mb-6 border-b border-gray-100 pb-4">
                            <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">Order service</h2>
                            <p class="text-xs text-gray-500 mt-1">Submit a new order to DAN74TECH ADMIN</p>
                        </div>
                        
                        <form id="orderForm" class="space-y-5">
                            <div>
                                <label class="block text-[10px] font-extrabold text-gray-500 mb-1.5 uppercase tracking-wider font-mono">Select a main service</label>
                                <select id="orderMainService" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm font-medium outline-none focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue transition-all appearance-none" onchange="loadSubServices()" required>
                                    <option value="">Fetching ...</option>
                                </select>
                            </div>
                            <div id="subServiceWrapper" class="hidden">
                                <label class="block text-[10px] font-extrabold text-gray-500 mb-1.5 uppercase tracking-wider font-mono">Select sub-service</label>
                                <select id="orderSubService" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm font-medium outline-none focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue transition-all appearance-none">
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-extrabold text-gray-500 mb-1.5 uppercase tracking-wider font-mono">Tell us more about your order</label>
                                <textarea id="orderRequirements" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue transition-all min-h-[120px] resize-y placeholder-gray-400" placeholder="Outline architectural parameters, frameworks, or deployment constraints..." required></textarea>
                            </div>
                            <div>
                                <label class="block text-[10px] font-extrabold text-gray-500 mb-1.5 uppercase tracking-wider font-mono">Upload support files (Optional)</label>
                                <input type="file" id="orderFile" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg text-xs file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-brandBlue file:text-white hover:file:bg-blue-700 transition-all cursor-pointer">
                            </div>
                            <button type="submit" id="btnSubmitOrder" class="w-full py-3.5 bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-bold rounded-lg shadow-md hover:shadow-lg hover:opacity-90 transition-all text-sm tracking-wide mt-2">
                                Order Now <i class="fa-solid fa-rocket ml-1"></i>
                            </button>
                        </form>
                    </div>
                </div>

                <div id="view-dashboard" class="w-full max-w-2xl pt-6 space-y-5 hidden">
                    
                    <div id="profileEditCard" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 hidden">
                        <div class="flex justify-between items-center mb-5 border-b border-gray-100 pb-3">
                            <h2 class="text-lg font-extrabold text-gray-900 tracking-tight">Edit Profile</h2>
                            <button onclick="toggleProfileEdit()" class="text-gray-400 hover:text-brandRed transition-colors"><i class="fa-solid fa-times text-lg"></i></button>
                        </div>
                        <form id="profileForm" class="space-y-4">
                            <div>
                                <label class="block text-[10px] font-extrabold text-gray-500 mb-1.5 uppercase tracking-wider font-mono">Name</label>
                                <input type="text" id="profName" class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 text-sm focus:ring-2 focus:ring-brandBlue/20 outline-none" required>
                            </div>
                            <div>
                                <label class="block text-[10px] font-extrabold text-gray-500 mb-1.5 uppercase tracking-wider font-mono">Phone/Contact</label>
                                <input type="text" id="profPhone" class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 text-sm focus:ring-2 focus:ring-brandBlue/20 outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-extrabold text-gray-500 mb-1.5 uppercase tracking-wider font-mono">New Password (Optional)</label>
                                <input type="password" id="profPassword" class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 text-sm focus:ring-2 focus:ring-brandBlue/20 outline-none" placeholder="Leave blank to maintain current matrix">
                            </div>
                            <button type="submit" id="btnUpdateProfile" class="w-full py-3 bg-brandBlue text-white rounded-lg font-bold text-sm shadow-sm hover:bg-blue-700 transition-colors">
                                Update Profile <i class="fa-solid fa-check ml-1"></i>
                            </button>
                        </form>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 text-center relative overflow-hidden group">
                            <div class="absolute -right-4 -top-4 w-16 h-16 bg-blue-50 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                            <i class="fa-solid fa-microchip text-2xl text-brandBlue mb-2 relative z-10"></i>
                            <h3 class="text-[10px] text-gray-500 uppercase font-extrabold tracking-widest font-mono relative z-10">Active Orders</h3>
                            <p class="text-3xl font-extrabold font-mono text-gray-900 mt-1 relative z-10" id="dashOrderCount">0</p>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 text-center relative overflow-hidden group">
                            <div class="absolute -right-4 -top-4 w-16 h-16 bg-emerald-50 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                            <i class="fa-solid fa-server text-2xl text-emerald-500 mb-2 relative z-10"></i>
                            <h3 class="text-[10px] text-gray-500 uppercase font-extrabold tracking-widest font-mono relative z-10">Your Posts</h3>
                            <p class="text-3xl font-extrabold font-mono text-gray-900 mt-1 relative z-10" id="dashPostCount">0</p>
                        </div>
                    </div>

                    <div class="flex bg-gray-50 border border-gray-200 rounded-xl p-1">
                        <button onclick="switchDashboardTab('my-orders')" id="dashBtn-my-orders" class="flex-1 py-2.5 text-xs font-bold bg-white rounded-lg text-brandBlue shadow-sm transition-all border border-gray-100">My Orders</button>
                        <button onclick="switchDashboardTab('my-posts')" id="dashBtn-my-posts" class="flex-1 py-2.5 text-xs font-bold text-gray-500 hover:text-gray-700 rounded-lg transition-all border border-transparent">My Posts</button>
                    </div>

            <aside class="hidden md:block w-[280px] p-6 h-[calc(100vh-64px)] overflow-y-auto border-l border-gray-100 bg-white/50">
                <div class="flex items-center justify-between mb-4 pb-2 border-b border-gray-200">
                    <h3 class="text-[10px] font-extrabold text-gray-400 tracking-widest uppercase font-mono">Subscribers</h3>
                    <div class="flex gap-1">
                        <button class="w-7 h-7 rounded bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-400 transition-colors"><i class="fa-solid fa-magnifying-glass text-xs"></i></button>
                    </div>

                <div id="activeUsersList" class="space-y-1">
                    <div class="text-center py-6 text-xs font-mono text-gray-400 flex flex-col items-center gap-2">

    <nav class="md:hidden fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-gray-200 flex justify-around items-center h-16 z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-safe">
        <button onclick="switchView('feed')" class="flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-brandBlue transition-colors group" data-target="feed">
            <i class="fa-solid fa-satellite-dish text-xl mb-1 group-hover:scale-110 transition-transform"></i>
            <span class="text-[9px] font-bold">HOME</span>
        </button>
        <button onclick="switchView('orders')" class="flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-brandBlue transition-colors group" data-target="orders">
            <i class="fa-solid fa-layer-group text-xl mb-1 group-hover:scale-110 transition-transform"></i>
            <span class="text-[9px] font-bold">ORDERS</span>
        </button>
        <button onclick="toggleMobileContacts()" class="flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-brandBlue transition-colors relative group">
            <i class="fa-solid fa-comments text-xl mb-1 group-hover:scale-110 transition-transform"></i>
            <span class="absolute top-2 right-6 w-2 h-2 bg-brandRed rounded-full border border-white"></span>
            <span class="text-[9px] font-bold">CHATS</span>
        </button>
        <button onclick="switchView('dashboard')" class="flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-brandBlue transition-colors group" data-target="dashboard">
            <i class="fa-solid fa-chart-pie text-xl mb-1 group-hover:scale-110 transition-transform"></i>
            <span class="text-[9px] font-bold">PROFILE</span>
        </button>
    </nav>

    <div id="mobileContactsOverlay" class="fixed inset-0 z-[60] bg-white hidden flex-col">
        <div class="glass-panel border-b border-gray-100 p-4 flex items-center justify-between h-16">
            <h2 class="text-base font-extrabold text-gray-900 font-mono tracking-tight">Subscribers</h2>
            <button onclick="toggleMobileContacts()" class="w-8 h-8 bg-gray-50 hover:bg-gray-100 rounded-full flex items-center justify-center transition-colors"><i class="fa-solid fa-times text-gray-600"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 bg-bgLight" id="mobileActiveUsersList"></div>
    </div>
    <script>
        // --- 1. CONFIG & STATE ---
        const API_BASE = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1') ? 'http://localhost:10000/api' : '/api';
        
        const state = {
            token: localStorage.getItem('dan74tech_token') || null,
            user: JSON.parse(localStorage.getItem('dan74tech_user')) || null,
            socket: null,
            feedOffset: 0,
            feedLoading: false,
            catalog: [],
            activeChats: {},
            usersDirectory: []
        };

        const CryptoEngine = {
            encrypt: (plaintext) => {
                return { 
                    ciphertext: btoa(encodeURIComponent(plaintext)), 
                    iv: 'iv_' + Math.random().toString(36).slice(2), 
                    wrapped_key: 'key_' + Math.random().toString(36).slice(2) 
                };
            },
            decrypt: (ciphertext) => decodeURIComponent(atob(ciphertext))
        };

        // --- 2. INITIALIZATION & UTILITIES ---
        window.onload = () => {
            if (state.token && state.user) {
                initApplication();
            } else {
                document.getElementById('authView').classList.remove('hidden');
            }
        };

        function showToast(message, type = 'info') {
            const center = document.getElementById('toastCenter');
            const toast = document.createElement('div');
            
            let styling = 'border-blue-100 text-blue-800 shadow-blue-500/5 bg-white';
            let icon = '<i class="fa-solid fa-circle-info text-brandBlue text-base"></i>';
            if(type === 'success') { styling = 'border-emerald-100 text-emerald-800 shadow-emerald-500/5 bg-white'; icon = '<i class="fa-solid fa-circle-check text-emerald-500 text-base"></i>'; }
            if(type === 'error') { styling = 'border-red-100 text-red-800 shadow-red-500/5 bg-white'; icon = '<i class="fa-solid fa-circle-exclamation text-brandRed text-base"></i>'; }

            toast.className = `toast-notification pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl border shadow-lg text-xs font-semibold ${styling}`;
            toast.innerHTML = `${icon} <div>${message}</div>`;
            center.appendChild(toast);

            setTimeout(() => { 
                toast.style.opacity = '0'; 
                toast.style.transform = 'translateY(10px)'; 
                setTimeout(() => toast.remove(), 300); 
            }, 3500);
        }

        async function apiCall(endpoint, method = 'GET', body = null) {
            const headers = {};
            if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
            
            const options = { method, headers };
            if (body) {
                if (body instanceof FormData) {
                    options.body = body;
                } else {
                    headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(body);
                }
            }

            try {
                const res = await fetch(`${API_BASE}${endpoint}`, options);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || data.message || 'Wrong password.');
                return data;
            } catch (err) {
                showToast(err.message, 'error');
                return null;
            }
        }

        // --- 3. AUTHENTICATION POSTGRESQL MAPPING ---
        function toggleAuth(view) {
            document.getElementById('loginFormContainer').classList.toggle('hidden', view !== 'login');
            document.getElementById('registerFormContainer').classList.toggle('hidden', view !== 'register');
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...';
            btn.disabled = true;

            const payload = { email: e.target[0].value.trim(), password: e.target[1].value };
            const res = await apiCall('/auth/login', 'POST', payload);
            
            btn.innerHTML = originalHtml;
            btn.disabled = false;

            if (res && res.success && res.token) finalizeAuth(res);
        };

        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Deploying...';
            btn.disabled = true;

            const payload = { name: e.target[0].value.trim(), email: e.target[1].value.trim(), phone: e.target[2].value.trim(), password: e.target[3].value };
            const res = await apiCall('/auth/register', 'POST', payload);
            
            btn.innerHTML = originalHtml;
            btn.disabled = false;

            if (res && res.success && res.token) finalizeAuth(res);
        };

        function finalizeAuth(data) {
            localStorage.setItem('dan74tech_token', data.token);
            localStorage.setItem('dan74tech_user', JSON.stringify(data.user));
            state.token = data.token; state.user = data.user;
            showToast("Login successful. Entering Chat", "success");
            initApplication();
        }

        function logout() {
            localStorage.clear();
            if(state.socket) state.socket.disconnect();
            window.location.reload();
        }

        // --- 4. CORE APP BOOTSTRAP ---
        function initApplication() {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('appWrapper').classList.remove('hidden');
            
            const avatarChar = state.user.name.charAt(0).toUpperCase();
            document.getElementById('headerAvatar').innerText = avatarChar;
            document.getElementById('sideAvatar').innerText = avatarChar;
            document.getElementById('postAvatar').innerText = avatarChar;
            document.getElementById('headerName').innerText = state.user.name;
            document.getElementById('sideName').innerText = state.user.name;
            document.querySelectorAll('.firstName').forEach(el => el.innerText = state.user.name.split(' ')[0]);

            document.getElementById('profName').value = state.user.name;
            document.getElementById('profPhone').value = state.user.phone || '';

            switchView('feed');
            initSockets();
            loadFeed(true);
            fetchUsersDirectory();
            fetchCatalog();
        }

        function switchView(target) {
            ['feed', 'orders', 'dashboard'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
            });
            document.getElementById(`view-${target}`).classList.remove('hidden');

            document.querySelectorAll('.view-tab').forEach(el => {
                if(el.dataset.target === target) {
                    el.classList.add('text-brandBlue');
                    el.classList.remove('text-gray-500');
                    el.querySelector('.active-indicator')?.classList.remove('hidden');
                } else {
                    el.classList.remove('text-brandBlue');
                    el.classList.add('text-gray-500');
                    el.querySelector('.active-indicator')?.classList.add('hidden');
                }
            });

            if(target === 'dashboard') loadDashboardData();
        }

        // --- 5. DYNAMIC FEED (POSTGRESQL MAPPING) ---
        async function loadFeed(isInitial = false) {
            if(state.feedLoading) return;
            state.feedLoading = true;
            
            const loader = document.getElementById('feedLoader');
            const container = document.getElementById('feedStream');
            
            if(isInitial) {
                container.innerHTML = '';
                container.appendChild(loader);
            }
            loader.style.display = 'flex';

            const res = await apiCall('/feed/global');
            
            let integratedFeedTimeline = [];
            
            // Map Database Tables to Unified Timeline
            if (res) {
                if (res.blogs) integratedFeedTimeline.push(...res.blogs.map(b => ({...b, type: 'blog'})));
                if (res.case_studies) integratedFeedTimeline.push(...res.case_studies.map(c => ({...c, type: 'case_study'})));
                if (res.portfolio) {
                    res.portfolio.forEach(p => {
                        integratedFeedTimeline.push({
                            id: p.id,
                            type: 'portfolio',
                            title: p.title || 'Untitled Portfolio Node',
                            content: p.description || 'Verified engineering deployment.',
                            media_url: (p.link && p.link.trim() !== '') ? p.link : null,
                            author_name: p.publisher_name || 'DAN74TECH ADMIN',
                            likes_count: p.likes_count || 0,
                            created_at: p.created_at || new Date()
                        });
                    });
                }
            }

            // Global chronological sort
            integratedFeedTimeline.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            
            loader.style.display = 'none';

            if(integratedFeedTimeline.length === 0 && isInitial) {
                container.innerHTML = `<div class="bg-white p-8 rounded-2xl border border-gray-200 text-center text-gray-500 font-mono text-xs shadow-sm">No posts available now.</div>`;
                state.feedLoading = false;
                return;
            }

            const chunk = integratedFeedTimeline.slice(state.feedOffset, state.feedOffset + 10);
            chunk.forEach(post => {
                container.appendChild(createPostElement(post));
            });

            state.feedOffset += chunk.length;
            state.feedLoading = false;
        }

        document.getElementById('mainScrollArea').addEventListener('scroll', (e) => {
            const target = e.target;
            if(!document.getElementById('view-feed').classList.contains('hidden')) {
                if (target.scrollTop + target.clientHeight >= target.scrollHeight - 50) {
                    loadFeed();
                }
            }
        });

        function createPostElement(post) {
            const div = document.createElement('div');
            div.className = 'bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden mb-5 transition-shadow hover:shadow-md';
            
            const badgeMap = {
                'blog': { color: 'bg-blue-50 text-brandBlue border-blue-100', label: 'Tech Blog' },
                'case_study': { color: 'bg-emerald-50 text-emerald-600 border-emerald-100', label: 'Case Study' },
                'portfolio': { color: 'bg-purple-50 text-purple-600 border-purple-100', label: 'Portfolio Asset' }
            };
            const theme = badgeMap[post.type] || badgeMap['blog'];
         // This checks for author_name, falls back to publisher_name, and defaults to 'Anonymous Creator' if null
          const authorName = post.author_name || post.publisher_name || 'Anonymous Creator';
          const avChar = authorName.charAt(0).toUpperCase();
            
            const d = new Date(post.created_at);
            const timeStr = `${d.toLocaleString('default', { month: 'short' })} ${d.getDate()} at ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;

            let imgHtml = '';
            if(post.media_url || post.image_url) {
                const src = post.media_url || post.image_url;
                imgHtml = `<img src="${src}" loading="lazy" class="w-full max-h-[450px] object-cover border-y border-gray-100" onerror="this.remove()">`;
            }

            div.innerHTML = `
                <div class="p-4 pb-3 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gray-100 border border-gray-200 font-bold text-gray-700 flex items-center justify-center text-sm">${avChar}</div>
                        <div>
                            <div class="font-extrabold text-sm text-gray-900 tracking-tight">${authorName}</div>
                            <div class="text-[10px] text-gray-400 font-mono tracking-wide">${timeStr} <i class="fa-solid fa-earth-americas ml-0.5"></i></div>
                        </div>
                    </div>
                    <span class="px-2.5 py-1 rounded-md border text-[9px] font-bold uppercase tracking-widest font-mono ${theme.color}">${theme.label}</span>
                </div>
                <div class="px-4 pb-3">
                    <h4 class="font-extrabold text-base text-gray-900 leading-tight mb-1.5">${post.title}</h4>
                    <p class="text-sm text-gray-600 whitespace-pre-line leading-relaxed mb-2">${post.content || post.challenge || ''}</p>
                </div>
                ${imgHtml}
                <div class="px-4 py-2.5 flex justify-between items-center text-gray-500 text-xs border-b border-gray-100 bg-gray-50/50">
                    <span class="flex items-center gap-1.5 font-bold font-mono text-[10px]">
                        <div class="w-5 h-5 bg-brandBlue text-white rounded-full flex items-center justify-center text-[10px] shadow-sm"><i class="fa-solid fa-thumbs-up"></i></div> 
                        <span id="likes-${post.id}">${post.likes_count || 0}</span> Likes
                    </span>
                </div>
                <div class="grid grid-cols-2 p-1.5 gap-1 bg-white">
                    <button onclick="likePost('${post.type}', ${post.id})" class="flex items-center justify-center gap-2 py-2 hover:bg-gray-50 rounded-lg text-gray-600 font-bold text-xs transition-colors">
                        <i class="fa-regular fa-thumbs-up"></i> Like
                    </button>
                    <button class="flex items-center justify-center gap-2 py-2 hover:bg-gray-50 rounded-lg text-gray-600 font-bold text-xs transition-colors">
                        <i class="fa-regular fa-comment"></i> Comment
                    </button>
                </div>
            `;
            return div;
        }

        async function likePost(type, id) {
            const el = document.getElementById(`likes-${id}`);
            if(el) el.innerText = parseInt(el.innerText) + 1; 
            await apiCall('/feed/interact', 'POST', { entity_id: id, entity_type: type, action: 'like' });
        }

        // --- 6. POSTING SYSTEM ---
        function openPostModal(type = 'blog_posts') {
            document.getElementById('postType').value = type;
            document.getElementById('postModalTitle').innerText = type === 'blog_posts' ? 'Compose Tech Blog' : 'Create Case Study';
            document.getElementById('postModal').classList.remove('hidden');
            document.getElementById('postModal').classList.add('flex');
        }
        function closePostModal() {
            document.getElementById('postModal').classList.add('hidden');
            document.getElementById('postModal').classList.remove('flex');
            document.getElementById('postForm').reset();
        }

        document.getElementById('postForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmitPost');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Posting...';
            btn.disabled = true;

            const type = document.getElementById('postType').value;
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const fileInput = document.getElementById('postImage').files[0];

            let imageUrl = null;
            if (fileInput) {
                const formData = new FormData();
                formData.append('file', fileInput);
                const uploadRes = await apiCall('/media/upload', 'POST', formData);
                if (uploadRes && uploadRes.data) {
                    imageUrl = uploadRes.data.url;
                } else {
                    showToast("Warning: Files restricted.", "error");
                }
            }

            // Generate clean URL slug if it's a blog post
            let slug = null;
            if (type === 'blog_posts') {
                slug = title
                    .toLowerCase()
                    .trim()
                    .replace(/[^a-z0-9\s-]/g, '') // Remove special characters
                    .replace(/\s+/g, '-')         // Replace spaces with -
                    .replace(/-+/g, '-');         // Deduplicate sequential hyphens
            }

            const res = await apiCall('/content/publish', 'POST', { 
                target: type === 'blog_posts' ? 'blog' : 'case_study', 
                title, 
                content,
                image_url: imageUrl,
                slug: slug
            });
            
            btn.innerHTML = originalText;
            btn.disabled = false;

            if (res && res.success) {
                showToast("Posted. Waiting Admin Approval.", "success");
                closePostModal();
            }
        };
        
        // --- 7. DYNAMIC ORDERS ---
        async function fetchCatalog() {
            const res = await apiCall('/catalog/full');
            if(res && Array.isArray(res)) {
                state.catalog = res;
                const select = document.getElementById('orderMainService');
                select.innerHTML = '<option value="">-Choose Service-</option>';
                res.forEach(s => {
                    select.innerHTML += `<option value="${s.name}">${s.name}</option>`;
                });
            }
        }

        function loadSubServices() {
            const mainName = document.getElementById('orderMainService').value;
            const wrapper = document.getElementById('subServiceWrapper');
            const subSelect = document.getElementById('orderSubService');
            
            const service = state.catalog.find(s => s.name === mainName);
            if(service && service.packages && service.packages.length > 0) {
                wrapper.classList.remove('hidden');
                subSelect.innerHTML = '<option value="">-Sub-Service-</option>';
                service.packages.forEach(p => {
                    subSelect.innerHTML += `<option value="${p.id}">${p.name} - ${p.price > 0 ? 'Ksh ' + p.price : 'Quote'}</option>`;
                });
                subSelect.required = true;
            } else {
                wrapper.classList.add('hidden');
                subSelect.required = false;
            }
        }

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmitOrder');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Deploying...';
            btn.disabled = true;

            const service = document.getElementById('orderMainService').value;
            const subServiceId = document.getElementById('orderSubService').value || null;
            const details = document.getElementById('orderRequirements').value;
            
            const payload = {
                user_id: state.user.id,
                customer_name: state.user.name,
                phone: state.user.phone || '00000',
                service: service,
                sub_service: subServiceId,
                project_details: details
            };

            const res = await apiCall('/orders', 'POST', payload);
            
            btn.innerHTML = 'Deploy Execution Pipeline <i class="fa-solid fa-rocket ml-1"></i>';
            btn.disabled = false;

            if(res && res.success) {
                showToast("Architecture Order logged in central ledger.", "success");
                document.getElementById('orderForm').reset();
                document.getElementById('subServiceWrapper').classList.add('hidden');
            }
        };

        // --- 8. DASHBOARD & PROFILE ---
        function toggleProfileEdit() {
            document.getElementById('profileEditCard').classList.toggle('hidden');
        }

        async function loadDashboardData() {
            const orderRes = await apiCall(`/orders/user/${state.user.id}`);
            const orders = orderRes && Array.isArray(orderRes) ? orderRes : [];
            document.getElementById('dashOrderCount').innerText = orders.length;

            const div = document.getElementById('dashContent-my-orders');
            div.innerHTML = '';
            if(orders.length === 0) div.innerHTML = '<div class="p-5 text-center text-xs font-mono text-gray-400 border border-gray-200 rounded-xl bg-gray-50 shadow-sm">You have not placed any order yet.</div>';
            
            orders.forEach(o => {
                const statusColor = o.status === 'pending' ? 'bg-amber-100 text-amber-800' : 'bg-brandBlue/10 text-brandBlue';
                div.innerHTML += `
                    <div class="p-4 border border-gray-200 rounded-xl bg-white flex justify-between items-center text-sm shadow-sm hover:shadow-md transition-shadow">
                        <div>
                            <div class="font-extrabold text-brandBlue font-mono text-xs tracking-tight">#ORD-${o.id} <span class="text-gray-900 font-sans ml-1">(${o.service})</span></div>
                            <div class="text-[11px] text-gray-500 mt-1 line-clamp-1">${o.project_details}</div>
                        </div>
                        <span class="px-2.5 py-1 ${statusColor} rounded-md text-[9px] font-mono font-bold uppercase tracking-widest">${o.status}</span>
                    </div>
                `;
            });

          const allPostsRes = await apiCall('/feed/global');
let myPosts = [];
if(allPostsRes && Array.isArray(allPostsRes)) {
    myPosts = allPostsRes.filter(p => 
        (p.author_id && String(p.author_id) === String(state.user.id)) ||
        (p.publisher_id && String(p.publisher_id) === String(state.user.id)) ||
        (p.publisher_name === state.user.name) ||
        (p.author_name === state.user.name)
    );
}
document.getElementById('dashPostCount').innerText = myPosts.length;

const pDiv = document.getElementById('dashContent-my-posts');
pDiv.innerHTML = '';
if(myPosts.length === 0) {
    pDiv.innerHTML = '<div class="p-5 text-center text-xs font-mono text-gray-400 border border-gray-200 rounded-xl bg-gray-50 shadow-sm">You have not posted anything yet.</div>';
} else {
    myPosts.forEach(p => {
        pDiv.innerHTML += `
            <div class="p-4 border border-gray-200 rounded-xl bg-white shadow-sm hover:shadow-md transition-shadow">
                <div class="font-extrabold text-sm text-gray-900 mb-2">${p.title || 'Untitled Post'}</div>
                <div class="flex justify-between items-center text-xs text-gray-500">
                    <span class="font-mono bg-gray-100 px-2 py-0.5 rounded-md text-[9px] font-bold uppercase tracking-wider">${p.category || p.type || 'POST'}</span>
                    <span class="text-brandRed cursor-pointer hover:underline font-bold text-[10px]">Request Teardown</span>
                </div>
            </div>
        `;
    });
}

        function switchDashboardTab(tab) {
            document.getElementById('dashContent-my-orders').classList.add('hidden');
            document.getElementById('dashContent-my-posts').classList.add('hidden');
            document.getElementById(`dashContent-${tab}`).classList.remove('hidden');
            
            const activeClass = "flex-1 py-2.5 text-xs font-bold bg-white rounded-lg text-brandBlue shadow-sm transition-all border border-gray-100";
            const inactiveClass = "flex-1 py-2.5 text-xs font-bold text-gray-500 hover:text-gray-700 rounded-lg transition-all border border-transparent";

            document.getElementById('dashBtn-my-orders').className = inactiveClass;
            document.getElementById('dashBtn-my-posts').className = inactiveClass;
            document.getElementById(`dashBtn-${tab}`).className = activeClass;
        }

        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnUpdateProfile');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';

            const payload = {
                name: document.getElementById('profName').value,
                phone: document.getElementById('profPhone').value,
                role: state.user.role,
                email: state.user.email
            };
            const pwd = document.getElementById('profPassword').value;
            if(pwd) payload.password = pwd;

            const res = await apiCall(`/users/${state.user.id}`, 'PUT', payload);
            
            btn.innerHTML = 'Update Profile <i class="fa-solid fa-check ml-1"></i>';

            state.user.name = payload.name;
            state.user.phone = payload.phone;
            localStorage.setItem('dan74tech_user', JSON.stringify(state.user));
            document.getElementById('headerName').innerText = state.user.name;
            document.getElementById('profPassword').value = '';
            showToast("Profile updated.", "success");
            toggleProfileEdit();
        };

        // --- 9. REAL-TIME E2EE CHAT & SOCKETS ---
        function initSockets() {
            const wsUrl = API_BASE.replace('/api', '');
            state.socket = io(wsUrl, { auth: { token: state.token } });

            state.socket.on('connect', () => {
                state.socket.emit('join_thread', state.user.id);
            });

            state.socket.on('receive_encrypted_message', (msg) => {
                const partnerId = msg.sender_id === state.user.id ? msg.receiver_id : msg.sender_id;
                
                if(!state.activeChats[partnerId]) {
                    const u = state.usersDirectory.find(x => x.id === partnerId);
                    if(u) openChat(partnerId, u.name);
                } else {
                    if(state.activeChats[partnerId].isMinimized) toggleDock(partnerId);
                }
                renderMessage(partnerId, msg);
            });

            state.socket.on('presence_update', (data) => {
                const dot = document.getElementById(`statusDot-${data.userId}`);
                if(dot) {
                    dot.className = `absolute bottom-0 right-0 w-2.5 h-2.5 rounded-full border-2 border-white shadow-sm ${data.status === 'online' ? 'bg-emerald-500' : 'bg-gray-300'}`;
                }
            });
        }

        async function fetchUsersDirectory() {
            const res = await apiCall('/community/users'); 
            if(res && Array.isArray(res)) {
                state.usersDirectory = res.filter(u => u.id !== state.user.id);
                renderUsersList();
            }
        }

        function renderUsersList() {
            const dList = document.getElementById('activeUsersList');
            const mList = document.getElementById('mobileActiveUsersList');
            let html = '';
            
            if(state.usersDirectory.length === 0) {
                html = '<div class="text-center text-xs font-mono text-gray-400 p-4">No one is online.</div>';
            } else {
                state.usersDirectory.forEach(u => {
                    const statusColor = u.is_online ? 'bg-emerald-500' : 'bg-gray-300';
                    const av = u.name.charAt(0).toUpperCase();
                    html += `
                        <div onclick="openChat(${u.id}, '${u.name}')" class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-xl cursor-pointer transition-colors group">
                            <div class="relative flex-shrink-0">
                                <div class="w-10 h-10 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center font-bold text-sm text-gray-700 shadow-sm group-hover:bg-white transition-colors">${av}</div>
                                <div id="statusDot-${u.id}" class="absolute bottom-0 right-0 w-2.5 h-2.5 rounded-full border-2 border-white shadow-sm ${statusColor}"></div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h4 class="text-xs font-extrabold text-gray-900 truncate">${u.name}</h4>
                                <p class="text-[9px] text-gray-400 font-mono tracking-wide">Select to Chat</p>
                            </div>
                        </div>
                    `;
                });
            }
            dList.innerHTML = html;
            if(mList) mList.innerHTML = html;
        }

        function toggleMobileContacts() {
            const ov = document.getElementById('mobileContactsOverlay');
            if(ov.classList.contains('hidden')) {
                ov.classList.remove('hidden');
                ov.classList.add('flex');
            } else {
                ov.classList.add('hidden');
                ov.classList.remove('flex');
            }
        }

        // --- DOCKED CHAT LOGIC ---
        function openChat(userId, userName) {
            if(!document.getElementById('mobileContactsOverlay').classList.contains('hidden')) {
                toggleMobileContacts(); 
            }

            if(state.activeChats[userId]) {
                if(state.activeChats[userId].isMinimized) toggleDock(userId);
                document.getElementById(`chatInput-${userId}`).focus();
                return;
            }

            state.activeChats[userId] = { name: userName, isMinimized: false };
            
            const dock = document.createElement('div');
            dock.id = `chatDock-${userId}`;
            dock.className = 'chat-dock w-[300px] sm:w-[340px] bg-white rounded-t-2xl shadow-[0_-5px_20px_rgba(0,0,0,0.1)] border border-gray-200 flex flex-col pointer-events-auto h-[450px] max-h-[65vh] overflow-hidden';
            
            dock.innerHTML = `
                <div class="bg-gradient-to-r from-brandBlue to-blue-600 text-white p-3 flex justify-between items-center cursor-pointer select-none" onclick="toggleDock(${userId})">
                    <div class="flex items-center gap-2.5">
                        <div class="w-7 h-7 bg-white/20 rounded-full flex items-center justify-center text-xs font-bold border border-white/30">${userName.charAt(0).toUpperCase()}</div>
                        <span class="text-xs font-extrabold tracking-wide truncate max-w-[150px]">${userName}</span>
                    </div>
                    <div class="flex gap-2">
                        <button class="hover:bg-white/20 w-7 h-7 rounded-md flex items-center justify-center transition-colors" onclick="closeChat(event, ${userId})"><i class="fa-solid fa-times text-sm"></i></button>
                    </div>
                </div>
                <div id="chatHistory-${userId}" class="flex-1 overflow-y-auto p-4 space-y-3 bg-bgLight text-sm flex flex-col scroll-smooth">
                    <div class="text-center text-[9px] text-gray-400 font-mono my-2 uppercase tracking-widest bg-gray-100 rounded-full px-2 py-1 mx-auto border border-gray-200 shadow-sm"><i class="fa-solid fa-lock text-brandBlue mr-1"></i>End to End encrypted</div>
                </div>
                <div class="p-3 border-t border-gray-200 bg-white">
                    <form onsubmit="handleSend(event, ${userId})" class="flex gap-2 relative">
                        <input type="text" id="chatInput-${userId}" class="flex-1 bg-gray-50 border border-gray-200 rounded-full pl-4 pr-10 py-2.5 text-xs font-medium outline-none focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue transition-all" placeholder="Send message..." autocomplete="off">
                        <button type="submit" class="absolute right-1 top-1 w-8 h-8 flex-shrink-0 bg-brandBlue text-white hover:bg-blue-700 rounded-full transition-colors flex items-center justify-center shadow-sm"><i class="fa-solid fa-paper-plane text-[10px]"></i></button>
                    </form>
                </div>
            `;
            
            document.getElementById('chatDocksContainer').appendChild(dock);
            fetchChatHistory(userId);
        }

        function toggleDock(userId) {
            const dock = document.getElementById(`chatDock-${userId}`);
            if(dock) {
                dock.classList.toggle('minimized');
                state.activeChats[userId].isMinimized = dock.classList.contains('minimized');
                if(!state.activeChats[userId].isMinimized) document.getElementById(`chatInput-${userId}`).focus();
            }
        }

        function closeChat(e, userId) {
            e.stopPropagation();
            const dock = document.getElementById(`chatDock-${userId}`);
            if(dock) {
                dock.remove();
                delete state.activeChats[userId];
            }
        }

        async function fetchChatHistory(userId) {
            const res = await apiCall(`/client-portal/thread`); 
            if(res && Array.isArray(res)) {
                const thread = res.filter(m => m.sender_id === userId || m.receiver_id === userId);
                thread.forEach(msg => renderMessage(userId, msg));
            }
        }

        function renderMessage(dockId, msgObj) {
            const histBox = document.getElementById(`chatHistory-${dockId}`);
            if(!histBox) return;

            const isMe = msgObj.sender_id === state.user.id;
            const alignCls = isMe ? 'self-end' : 'self-start';
            const colorCls = isMe ? 'bg-brandBlue text-white rounded-br-sm shadow-sm' : 'bg-white border border-gray-200 text-gray-900 rounded-bl-sm shadow-sm';

            let text = msgObj.message_body || '';
            if(msgObj.ciphertext) {
                try { text = CryptoEngine.decrypt(msgObj.ciphertext); } 
                catch(e) { text = 'Failed to load'; }
            }

            const div = document.createElement('div');
            div.className = `max-w-[80%] px-3.5 py-2 rounded-2xl ${colorCls} ${alignCls} leading-relaxed break-words text-[13px] font-medium`;
            div.innerText = text;
            
            histBox.appendChild(div);
            histBox.scrollTop = histBox.scrollHeight;
        }

        async function handleSend(e, targetId) {
            e.preventDefault();
            const input = document.getElementById(`chatInput-${targetId}`);
            const text = input.value.trim();
            if(!text) return;
            input.value = '';

            const cryptoPayload = CryptoEngine.encrypt(text);
            
            const mockMsg = { sender_id: state.user.id, receiver_id: targetId, ciphertext: cryptoPayload.ciphertext };
            renderMessage(targetId, mockMsg);

            await apiCall('/communications/send', 'POST', {
                receiver_id: targetId,
                ciphertext: cryptoPayload.ciphertext,
                iv: cryptoPayload.iv,
                sender_key: cryptoPayload.wrapped_key,
                receiver_key: cryptoPayload.wrapped_key
            });
        }
    </script>
</body>
