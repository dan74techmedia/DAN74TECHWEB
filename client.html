<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAN74TECH Community Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-blue: #0044ff;
            --brand-red: #ff2a2a;
            --brand-yellow: #ffd700;
            --bg-social: #f0f2f5;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-social); 
            -webkit-tap-highlight-color: transparent;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { display: none; }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        
        .nav-item { color: #64748b; transition: all 0.2s; }
        .nav-item.active { color: var(--brand-blue); }
        .nav-item.active i { transform: scale(1.1); color: var(--brand-blue); }
        
        .chat-bubble { max-width: 80%; animation: slideUp 0.3s ease-out forwards; }
        .chat-user { background-color: var(--brand-blue); color: #fff; border-bottom-right-radius: 4px; }
        .chat-admin { background-color: #fff; color: #0f172a; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .fab-services {
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-red));
            box-shadow: 0 4px 15px rgba(0, 68, 255, 0.3);
        }
    </style>
</head>
<body class="antialiased pb-20">

    <header class="fixed top-0 w-full bg-white border-b border-gray-200 z-40 shadow-sm h-14 flex items-center justify-between px-4">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-[#0044ff] to-[#ff2a2a] p-[1.5px]">
                <div class="w-full h-full bg-white rounded-md flex items-center justify-center overflow-hidden">
                    <img src="images/logo.png" alt="Logo" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100?text=D74'">
                </div>
            </div>
            <span class="text-[15px] font-extrabold tracking-tight text-gray-900 font-mono">DAN74TECH</span>
        </div>
        <div class="flex items-center gap-4 text-gray-600">
            <button class="relative hover:bg-gray-100 p-2 rounded-full transition-colors">
                <i class="fa-solid fa-bell"></i>
                <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
            </button>
            <div id="header-avatar" class="w-8 h-8 rounded-full bg-[#0044ff] text-white flex items-center justify-center font-bold text-xs shadow-sm cursor-pointer" onclick="switchTab('profile')">--</div>
        </div>
    </header>

    <main class="pt-16 px-0 md:max-w-2xl md:mx-auto">
        
        <section id="view-feed" class="tab-content active space-y-3">
            <div class="bg-white p-4 shadow-sm border-b border-gray-100 flex items-center gap-3">
                <div id="feed-avatar" class="w-10 h-10 rounded-full bg-blue-100 text-[#0044ff] flex items-center justify-center font-bold flex-shrink-0">--</div>
                <div class="flex-1 bg-gray-100 rounded-full px-4 py-2.5 text-sm text-gray-500 cursor-pointer hover:bg-gray-200 transition-colors" onclick="switchTab('chat')">
                    Have a technical inquiry or project idea?
                </div>
            </div>

            <div id="feed-container" class="space-y-3 pb-6">
                <div class="text-center py-10 text-gray-400">
                    <i class="fa-solid fa-circle-notch fa-spin text-2xl text-[#0044ff]"></i>
                    <p class="text-xs font-mono mt-2">Synchronizing Network Data...</p>
                </div>
            </div>
        </section>

        <section id="view-chat" class="tab-content h-[calc(100vh-7rem)] flex flex-col bg-white">
            <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between bg-gray-50 sticky top-14 z-30">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-[#ffd700] flex items-center justify-center text-black font-bold shadow-sm">
                        <i class="fa-solid fa-headset"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-extrabold text-gray-900">Admin Support Matrix</h3>
                        <p class="text-[10px] text-emerald-600 font-mono font-bold flex items-center gap-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Online
                        </p>
                    </div>
                </div>
            </div>

            <div id="chat-thread" class="flex-1 overflow-y-auto p-4 space-y-4 bg-[#f8fafc]">
            </div>

            <form id="client-message-form" class="p-3 bg-white border-t border-gray-200 sticky bottom-14 md:bottom-0">
                <div id="attachment-preview" class="hidden mb-2 flex items-center gap-2 px-3 py-1.5 bg-blue-50 border border-blue-100 rounded-lg w-max max-w-full overflow-hidden">
                    <i class="fa-solid fa-paperclip text-[#0044ff] text-xs"></i>
                    <span id="attachment-name" class="text-xs font-mono text-gray-700 truncate">file.pdf</span>
                    <button type="button" onclick="removeAttachment()" class="text-red-500 ml-2"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="flex items-end gap-2">
                    <label class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200 hover:text-[#0044ff] transition-colors cursor-pointer flex-shrink-0">
                        <i class="fa-solid fa-paperclip"></i>
                        <input type="file" id="chat-file-upload" class="hidden">
                    </label>
                    <textarea id="chat-input" rows="1" class="flex-1 bg-gray-100 border-none rounded-2xl px-4 py-3 text-sm text-gray-800 focus:ring-0 focus:outline-none resize-none" placeholder="Type your message..."></textarea>
                    <button type="submit" id="btn-send-chat" class="w-10 h-10 rounded-full bg-[#0044ff] flex items-center justify-center text-white shadow-md hover:bg-blue-700 transition-colors flex-shrink-0">
                        <i class="fa-solid fa-paper-plane text-sm translate-x-[-1px] translate-y-[1px]"></i>
                    </button>
                </div>
            </form>
        </section>

        <section id="view-profile" class="tab-content bg-white min-h-[calc(100vh-3.5rem)]">
            <div class="relative h-32 bg-gradient-to-r from-[#0044ff] to-[#ff2a2a]"></div>
            <div class="px-4 pb-6 relative">
                <div id="profile-avatar-lg" class="w-24 h-24 rounded-full bg-white border-4 border-white shadow-lg flex items-center justify-center text-3xl font-bold text-[#0044ff] -mt-12 mb-3 mx-auto relative z-10">
                    --
                </div>
                <div class="text-center space-y-1">
                    <h2 id="profile-name" class="text-xl font-extrabold text-gray-900">User Identity</h2>
                    <p id="profile-role" class="text-xs font-mono font-bold text-[#0044ff] uppercase tracking-widest bg-blue-50 inline-block px-2 py-0.5 rounded">Verified Client</p>
                </div>

                <div class="mt-8 space-y-4">
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 space-y-3">
                        <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest font-mono">Telemetry Data</h4>
                        <div class="flex items-center gap-3 text-sm">
                            <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-gray-400 shadow-sm"><i class="fa-solid fa-envelope"></i></div>
                            <span id="profile-email" class="text-gray-700 font-mono">--</span>
                        </div>
                        <div class="flex items-center gap-3 text-sm">
                            <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-gray-400 shadow-sm"><i class="fa-solid fa-phone"></i></div>
                            <span id="profile-phone" class="text-gray-700 font-mono">--</span>
                        </div>
                    </div>

                    <button onclick="logout()" class="w-full py-3 rounded-xl border-2 border-red-50 text-red-500 font-bold text-sm hover:bg-red-50 transition-colors">
                        <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i> Terminate Session
                    </button>
                </div>
            </div>
        </section>
    </main>

    <a href="services.html" class="fab-services fixed bottom-20 right-4 w-14 h-14 rounded-full flex items-center justify-center text-white z-40 transition-transform active:scale-95 md:right-[calc(50vw-300px)]">
        <i class="fa-solid fa-layer-group text-xl"></i>
    </a>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 h-14 flex items-center justify-around px-2 z-50 md:max-w-2xl md:mx-auto md:left-0 md:right-0">
        <button onclick="switchTab('feed')" class="nav-item active flex flex-col items-center justify-center w-16 gap-1" data-target="feed">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[9px] font-bold">Feed</span>
        </button>
        <a href="services.html" class="nav-item flex flex-col items-center justify-center w-16 gap-1">
            <i class="fa-solid fa-store text-lg"></i>
            <span class="text-[9px] font-bold">Store</span>
        </a>
        <button onclick="switchTab('chat')" class="nav-item flex flex-col items-center justify-center w-16 gap-1 relative" data-target="chat">
            <i class="fa-solid fa-comment-dots text-lg"></i>
            <span class="text-[9px] font-bold">Inbox</span>
        </button>
        <button onclick="switchTab('profile')" class="nav-item flex flex-col items-center justify-center w-16 gap-1" data-target="profile">
            <i class="fa-solid fa-user text-lg"></i>
            <span class="text-[9px] font-bold">Profile</span>
        </button>
    </nav>
    <script>
        // FIX #2: Stabilized robust API_BASE calculation for local network IP access
        const hostname = window.location.hostname;
        const isLocalNetwork = hostname === 'localhost' || hostname === '127.0.0.1' || hostname.startsWith('192.168.') || hostname.startsWith('10.');
        const API_BASE = isLocalNetwork ? 'http://localhost:10000/api' : '/api';
         
        // Rectified token retrieval: captures standard keys and legacy keys to prevent future drift
        let authToken = localStorage.getItem('token') || localStorage.getItem('dan74_admin_token') || localStorage.getItem('dan74_token'); 
        let userNode = JSON.parse(localStorage.getItem('user') || localStorage.getItem('dan74_admin_user') || localStorage.getItem('user_context') || 'null');
        let selectedFile = null;

        // Auth Enforcement Gate
        if (!authToken || !userNode) {
            window.location.replace('login.html');
        }

        // Init App Data
        document.addEventListener('DOMContentLoaded', () => {
            if (userNode) populateUserData();
            loadSocialFeed();
            loadChatThread();
            
            setInterval(loadChatThread, 15000); 
        });

        function populateUserData() {
            const initials = userNode.name ? userNode.name.substring(0, 2).toUpperCase() : 'U';
            document.getElementById('header-avatar').textContent = initials;
            document.getElementById('feed-avatar').textContent = initials;
            document.getElementById('profile-avatar-lg').textContent = initials;
            
            document.getElementById('profile-name').textContent = userNode.name || 'Unknown User';
            document.getElementById('profile-email').textContent = userNode.email || 'N/A';
            document.getElementById('profile-phone').textContent = userNode.phone || 'No phone recorded';
            document.getElementById('profile-role').textContent = userNode.role === 'admin' ? 'System Admin' : 'Verified Client';
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`view-${tabId}`).classList.add('active');
            const navBtn = document.querySelector(`.nav-item[data-target="${tabId}"]`);
            if(navBtn) navBtn.classList.add('active');

            if (tabId === 'chat') {
                const thread = document.getElementById('chat-thread');
                thread.scrollTop = thread.scrollHeight;
            }
        }

        function logout() {
            // Comprehensive session wipe targeting all possible legacy and active keys
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            localStorage.removeItem('dan74_admin_token');
            localStorage.removeItem('dan74_admin_user');
            localStorage.removeItem('dan74_token');
            localStorage.removeItem('user_context');
            window.location.replace('login.html');
        }
        async function loadSocialFeed() {
            const container = document.getElementById('feed-container');
            try {
                const [blogs, caseStudies, testimonials] = await Promise.all([
                    fetch(`${API_BASE}/blogs`).then(res => res.json()).catch(() => []),
                    fetch(`${API_BASE}/case-studies`).then(res => res.json()).catch(() => []),
                    fetch(`${API_BASE}/testimonials/approved`).then(res => res.json()).catch(() => [])
                ]);

                let feedItems = [];

                if (Array.isArray(blogs)) {
                    blogs.forEach(b => feedItems.push({
                        type: 'Blog Post',
                        icon: 'fa-newspaper text-blue-500',
                        author: 'DAN74TECH MEDIA',
                        title: b.title,
                        body: b.summary || b.content.substring(0, 150) + '...',
                        image: b.image_url,
                        date: new Date(b.created_at).getTime(),
                        rawDate: b.created_at,
                        likes: Math.floor(Math.random() * 50) + 10 
                    }));
                }

                if (Array.isArray(caseStudies)) {
                    caseStudies.forEach(c => feedItems.push({
                        type: 'Case Study',
                        icon: 'fa-chart-line text-red-500',
                        author: 'DAN74TECH MEDIA',
                        title: c.title,
                        body: `<b>Challenge:</b> ${c.challenge}<br><b>Result:</b> ${c.result}`,
                        image: c.image_url,
                        date: new Date(c.created_at).getTime(),
                        rawDate: c.created_at,
                        likes: Math.floor(Math.random() * 80) + 20
                    }));
                }

                if (Array.isArray(testimonials)) {
                    testimonials.forEach(t => feedItems.push({
                        type: 'Community Review',
                        icon: 'fa-star text-yellow-500',
                        author: t.client_name + (t.company ? ` (${t.company})` : ''),
                        title: `Rated us ${t.rating} Stars!`,
                        body: `"${t.review}"`,
                        image: null,
                        date: new Date(t.created_at).getTime(),
                        rawDate: t.created_at,
                        likes: Math.floor(Math.random() * 100) + 5
                    }));
                }

                feedItems.sort((a, b) => b.date - a.date);

                container.innerHTML = '';
                if (feedItems.length === 0) {
                    container.innerHTML = `<div class="text-center p-8 bg-white text-gray-400 font-mono text-xs">No active network data found.</div>`;
                    return;
                }

                feedItems.forEach(item => {
                    const timeStr = new Date(item.rawDate).toLocaleDateString();
                    const card = document.createElement('div');
                    card.className = "bg-white shadow-sm border-y border-gray-100 mb-2";
                    card.innerHTML = `
                        <div class="px-4 py-3 flex items-center justify-between">
                            <div class="flex items-center gap-2.5">
                                <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center flex-shrink-0">
                                    <img src="images/logo.png" class="w-6 h-6 object-contain" onerror="this.style.display='none'">
                                    <i class="fa-solid ${item.icon} text-lg ${item.image ? 'hidden' : ''}"></i>
                                </div>
                                <div>
                                    <h4 class="text-sm font-bold text-gray-900">${item.author}</h4>
                                    <div class="text-[10px] text-gray-500 font-mono flex items-center gap-1">
                                        <span>${timeStr}</span> • <i class="fa-solid fa-earth-africa"></i>
                                    </div>
                                </div>
                            </div>
                            <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-2 py-1 bg-gray-50 rounded">${item.type}</span>
                        </div>

                        <div class="px-4 pb-2">
                            <h3 class="text-base font-extrabold text-gray-900 leading-tight mb-1">${item.title}</h3>
                            <p class="text-sm text-gray-700 leading-relaxed font-sans">${item.body}</p>
                        </div>
                        
                        ${item.image ? `<img src="${item.image}" class="w-full max-h-72 object-cover bg-gray-100 border-y border-gray-50">` : ''}

                        <div class="px-4 py-1 border-t border-gray-50 flex items-center justify-between">
                            <div class="flex gap-1 py-2 text-[11px] text-gray-500 font-bold">
                                <div class="flex items-center justify-center w-5 h-5 rounded-full bg-blue-500 text-white"><i class="fa-solid fa-thumbs-up text-[10px]"></i></div>
                                <span>${item.likes}</span>
                            </div>
                            <div class="flex items-center text-gray-500 gap-4 text-xs font-bold">
                                <button class="flex items-center gap-1.5 hover:text-[#0044ff] transition-colors"><i class="fa-regular fa-thumbs-up text-lg"></i> Like</button>
                                <button onclick="switchTab('chat')" class="flex items-center gap-1.5 hover:text-[#0044ff] transition-colors"><i class="fa-regular fa-message text-lg"></i> Connect</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                container.innerHTML = `<div class="p-6 text-center text-red-500 text-xs font-mono">Failed to sync feed: ${err.message}</div>`;
            }
        }

        async function loadChatThread() {
            const threadContainer = document.getElementById('chat-thread');
            const atBottom = threadContainer.scrollHeight - threadContainer.scrollTop <= threadContainer.clientHeight + 50;

                    try {
            const res = await fetch(`${API_BASE}/client-portal/thread`, {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            
            // 1. Only trigger a hard logout on actual authentication rejections
            if (res.status === 401 || res.status === 403) {
                throw new Error('Auth failure');
            }
            
            // 2. Prevent logout on database or server crashes (HTTP 500, 404, etc.)
            if (!res.ok) {
                throw new Error(`Server communication error: HTTP ${res.status}`);
            }
            
            const messages = await res.json();
                        
                
                threadContainer.innerHTML = '';
                
                if (messages.length === 0) {
                    threadContainer.innerHTML = `
                        <div class="h-full flex flex-col items-center justify-center text-center text-gray-400 opacity-70">
                            <i class="fa-solid fa-envelope-open-text text-4xl mb-3 text-gray-300"></i>
                            <p class="text-xs font-mono">Transmission channel is clear.<br>Send a message to initiate contact.</p>
                        </div>`;
                    return;
                }

                messages.forEach(msg => {
                    const isClient = msg.sender_id === userNode.id;
                    const alignment = isClient ? 'justify-end' : 'justify-start';
                    const bubbleClass = isClient ? 'chat-user rounded-tl-2xl rounded-tr-2xl rounded-bl-2xl' : 'chat-admin rounded-tl-2xl rounded-tr-2xl rounded-br-2xl';
                    const time = new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    let attachmentHtml = '';
                    if (msg.attachment_url) {
                        const isImage = msg.attachment_url.match(/\.(jpeg|jpg|gif|png|webp)/i);
                        if(isImage) {
                            attachmentHtml = `<div class="mt-2"><img src="${msg.attachment_url}" class="rounded-lg max-w-full h-auto border border-white/20 shadow-sm" onclick="window.open('${msg.attachment_url}')"></div>`;
                        } else {
                            attachmentHtml = `<a href="${msg.attachment_url}" target="_blank" class="mt-2 inline-flex items-center gap-2 px-3 py-2 bg-black/10 rounded-lg text-xs font-mono hover:bg-black/20 transition-colors"><i class="fa-solid fa-file-arrow-down"></i> ${msg.attachment_name || 'File'}</a>`;
                        }
                    }

                    threadContainer.innerHTML += `
                        <div class="flex ${alignment} w-full">
                            <div class="chat-bubble p-3 shadow-sm text-sm ${bubbleClass}">
                                <p class="whitespace-pre-wrap leading-relaxed">${msg.message_body}</p>
                                ${attachmentHtml}
                                <div class="text-[9px] mt-1 font-mono text-right opacity-80">${time}</div>
                            </div>
                        </div>
                    `;
                });

                if (atBottom) threadContainer.scrollTop = threadContainer.scrollHeight;

            } catch (err) {
                // Ignore transient network errors during background polling
                if (err.message.includes('Auth')) {
                    console.error("Token compromised. Forcing logout.");
                    logout();
                }
            }
        }
        document.getElementById('client-message-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-send-chat');
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            
            if (!text && !selectedFile) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';

            try {
                let formData = new FormData();
                formData.append('message_body', text || 'Secure Asset Delivered');
                if (selectedFile) formData.append('attachment', selectedFile);

                const res = await fetch(`${API_BASE}/client-portal/send`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` },
                    body: formData
                });
                
                if (res.ok) {
                    input.value = '';
                    removeAttachment();
                    await loadChatThread();
                    const thread = document.getElementById('chat-thread');
                    thread.scrollTop = thread.scrollHeight;
                }
            } catch (err) {
                console.error("Transmission Error:", err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane text-sm translate-x-[-1px] translate-y-[1px]"></i>';
            }
        });

        document.getElementById('chat-file-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('attachment-preview').classList.remove('hidden');
                document.getElementById('attachment-name').innerText = file.name;
            }
        });

        function removeAttachment() {
            selectedFile = null;
            document.getElementById('chat-file-upload').value = '';
            document.getElementById('attachment-preview').classList.add('hidden');
        }
    </script>
</body>
</html>
