<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAN74TECH MEDIA | Unified Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6 !important; font-family: 'Segoe UI', sans-serif; }
        .hide { display: none !important; }
        .scroll-style::-webkit-scrollbar { width: 6px; }
        .scroll-style::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="bg-white border-b px-6 py-3 flex justify-between items-center z-20">
        <div class="text-xl font-bold text-professionalBlue tracking-tighter">DAN74TECH MEDIA</div>
        <div class="flex gap-6 text-gray-600 font-medium">
            <button onclick="switchView('feed')" class="hover:text-professionalBlue">Portal Feed</button>
            <button onclick="switchView('chat')" class="hover:text-professionalBlue">Communications</button>
        </div>
        <div class="flex items-center gap-4">
            <span id="user-role-badge" class="text-xs bg-gray-100 px-2 py-1 rounded border"></span>
            <button onclick="logoutPipeline()" class="text-sm text-actionRed font-bold hover:underline">Logout</button>
        </div>
    </nav>

    <main class="flex flex-grow overflow-hidden">
        
        <aside class="w-64 bg-white border-r p-4 scroll-style overflow-y-auto">
            <h3 class="font-bold text-gray-400 text-xs uppercase mb-4">Network Connections</h3>
            <div id="user-list-container" class="space-y-3">
                </div>
        </aside>

        <section class="flex-grow bg-gray-50 overflow-y-auto p-6">
            
            <div id="feed-view" class="max-w-3xl mx-auto space-y-6">
                <div class="bg-white p-4 rounded-lg shadow-sm border">
                    <textarea id="post-input" placeholder="Publish to the community..." class="w-full p-2 border rounded-md resize-none h-20 outline-none"></textarea>
                    <div class="flex justify-between mt-3">
                        <select id="post-type" class="text-sm border p-1 rounded">
                            <option value="portfolio">Portfolio</option>
                            <option value="blog">Blog</option>
                            <option value="case-study">Case Study</option>
                        </select>
                        <button onclick="submitPost()" class="bg-professionalBlue text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700">Publish</button>
                    </div>
                </div>
                <div id="feed-container" class="space-y-6"></div>
            </div>

            <div id="chat-view" class="hide max-w-4xl mx-auto h-full flex flex-col">
                <div id="chat-header" class="bg-white p-4 border-b font-bold">Select a connection to start messaging</div>
                <div id="chat-window" class="flex-grow bg-white p-4 overflow-y-auto scroll-style"></div>
                <div class="bg-white p-4 border-t flex gap-2">
                    <input type="file" id="file-input" class="hidden">
                    <button onclick="document.getElementById('file-input').click()" class="text-gray-500 hover:text-professionalBlue"><i class="fa-solid fa-paperclip"></i></button>
                    <input type="text" id="msg-input" class="flex-grow border rounded-full px-4 py-2 outline-none" placeholder="Transmit data...">
                    <button onclick="sendMessage()" class="bg-professionalBlue text-white px-6 py-2 rounded-full font-bold">Send</button>
                </div>
            </div>

        </section>
    </main>

    <script>
        const API_BASE = 'https://dan74techweb.onrender.com/api';
        let currentUser = JSON.parse(localStorage.getItem('dan74tech_user'));
        let token = localStorage.getItem('dan74tech_token');
        let socket = io(API_BASE.replace('/api', ''));
        let activeChatRecipient = null;

        // UI Routing
        function switchView(view) {
            document.getElementById('feed-view').classList.toggle('hide', view !== 'feed');
            document.getElementById('chat-view').classList.toggle('hide', view !== 'chat');
        }

        // Initialize Socket Presence
        socket.emit('login', currentUser.id);

        socket.on('user_status', (users) => {
            renderUserList(users);
        });

        // Messaging Engine
        socket.on('receive_message', (msg) => {
            if(activeChatRecipient && msg.sender_id === activeChatRecipient.id) {
                appendMessage(msg, 'received');
                socket.emit('mark_read', { messageId: msg.id });
            }
        });

        socket.on('message_delivered', (data) => {
            const el = document.getElementById(`msg-${data.messageId}`);
            if(el) el.innerHTML = '<i class="fa-solid fa-check-double text-blue-500 text-[10px]"></i>';
        });

        // Feed Logic
        async function fetchFeed() {
            const res = await fetch(`${API_BASE}/posts`, { headers: {'Authorization': `Bearer ${token}`}});
            const posts = await res.json();
            const container = document.getElementById('feed-container');
            container.innerHTML = posts.map(post => `
                <div class="bg-white p-6 rounded-lg shadow-sm border ${post.status === 'pending' ? 'opacity-70' : ''}">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-bold text-professionalBlue">${post.publisher_name}</span>
                        <span class="text-xs bg-gray-100 px-2 py-1 rounded">${post.type} | ${post.status}</span>
                    </div>
                    <p class="text-gray-700">${post.content}</p>
                </div>
            `).join('');
        }

        // User List Render
        function renderUserList(users) {
            const container = document.getElementById('user-list-container');
            container.innerHTML = users.map(user => `
                <div onclick="startChat(${JSON.stringify(user).replace(/"/g, '&quot;')})" class="flex items-center gap-3 cursor-pointer hover:bg-gray-100 p-2 rounded">
                    <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs font-bold">${user.name.charAt(0)}</div>
                    <div>
                        <div class="text-sm font-bold">${user.name}</div>
                        <div class="text-[10px] text-gray-500">${user.role}</div>
                    </div>
                    <span class="ml-auto status-dot ${user.online ? 'bg-green-500' : 'bg-gray-300'}"></span>
                </div>
            `).join('');
        }

        function startChat(user) {
            activeChatRecipient = user;
            document.getElementById('chat-header').innerText = `Chatting with: ${user.name}`;
            document.getElementById('chat-window').innerHTML = '';
            switchView('chat');
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const msg = {
                sender_id: currentUser.id,
                receiver_id: activeChatRecipient.id,
                body: input.value,
                timestamp: new Date()
            };
            socket.emit('send_message', msg);
            appendMessage(msg, 'sent');
            input.value = '';
        }

        function appendMessage(msg, type) {
            const window = document.getElementById('chat-window');
            window.insertAdjacentHTML('beforeend', `
                <div class="mb-4 ${type === 'sent' ? 'text-right' : 'text-left'}">
                    <div class="inline-block p-3 rounded-lg ${type === 'sent' ? 'bg-professionalBlue text-white' : 'bg-gray-200'}">
                        ${msg.body}
                        <span id="msg-${msg.id}" class="ml-2">${type === 'sent' ? '<i class="fa-solid fa-check text-[10px]"></i>' : ''}</span>
                    </div>
                </div>
            `);
        }

        function logoutPipeline() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Lifecycle
        window.onload = () => {
            fetchFeed();
            document.getElementById('user-role-badge').innerText = currentUser.role.toUpperCase();
        };
    </script>
</body>
</html>
