<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAN74TECH MEDIA | AUTHENTICATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0044ff;
            --accent-red: #ff2a2a;
            --warning-yellow: #ffcc00;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #001133, #000000, #002266, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary-blue);
            border-bottom: 5px solid var(--accent-red);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
        }

        .logo { width: 100px; filter: drop-shadow(0 0 8px var(--primary-blue)); animation: pulse 3s infinite; margin-bottom: 15px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        h1 { font-family: 'Montserrat', sans-serif; font-size: 1.6rem; color: var(--primary-blue); margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { color: var(--warning-yellow); font-size: 0.8rem; font-weight: 600; margin-bottom: 30px; text-transform: uppercase; }

        .tabs { display: flex; margin-bottom: 25px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 5px; }
        .tab { flex: 1; padding: 12px; cursor: pointer; font-weight: 600; color: #888; transition: 0.4s; border-radius: 10px; }
        .tab.active { color: white; background: var(--primary-blue); box-shadow: 0 4px 15px rgba(0, 68, 255, 0.3); }

        form { display: none; text-align: left; animation: fadeIn 0.5s ease; }
        form.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 18px; position: relative; }
        label { display: block; font-size: 0.75rem; color: #aaa; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        
        input[type="text"], input[type="password"], input[type="email"], input[type="tel"] {
            width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid #333;
            border-radius: 10px; color: white; font-size: 0.95rem; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--warning-yellow); background: rgba(255,255,255,0.1); box-shadow: 0 0 12px rgba(255, 204, 0, 0.2); }

        /* Password Toggle */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            color: var(--warning-yellow);
            font-size: 0.7rem;
            font-weight: bold;
            user-select: none;
        }

        /* Remember Me & Forgot Password Layout */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.8rem;
        }
        .remember-me { display: flex; align-items: center; cursor: pointer; color: #aaa; }
        .remember-me input { margin-right: 8px; cursor: pointer; }
        .forgot-link { color: var(--warning-yellow); text-decoration: none; font-weight: 600; }
        .forgot-link:hover { text-decoration: underline; }

        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: 800;
            text-transform: uppercase; cursor: pointer; transition: 0.4s; margin-top: 10px;
        }
        .btn-blue { background: var(--primary-blue); color: white; box-shadow: 0 5px 15px rgba(0, 68, 255, 0.4); }
        .btn-blue:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 68, 255, 0.5); }

        .alert-box {
            background: rgba(255, 204, 0, 0.1); border: 1px solid var(--warning-yellow); color: var(--warning-yellow);
            padding: 12px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 20px; display: none;
        }
    </style>
</head>

<body>

<div class="auth-container">
    <img src="images/logo.png" alt="DAN74TECH Logo" class="logo">
    <h1>DAN74TECH SITE</h1>
    <p class="subtitle">Your One Stop ICT Solutions</p>

    <div class="tabs" id="authTabs">
        <div class="tab active" id="loginTab" onclick="showForm('login')">LOGIN</div>
        <div class="tab" id="signupTab" onclick="showForm('signup')">SIGN UP</div>
    </div>

    <form id="loginForm" class="active">
        <div class="input-group">
            <label>Username or Email</label>
            <input type="text" id="loginUser" placeholder="Username or Email" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="••••••••" required>
            <span class="toggle-password" onclick="togglePass('loginPass', this)">SHOW</span>
        </div>
        <div class="form-options">
            <label class="remember-me">
                <input type="checkbox" id="rememberMe"> Remember Me
            </label>
            <a href="#" class="forgot-link" onclick="showForm('forgot')">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-blue">Enter Dashboard</button>
    </form>

    <form id="signupForm">
        <div id="signupAlert" class="alert-box">⚠️ <strong>Important:</strong> Your username is required for login.</div>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="regFullName" placeholder="Full Name" required>
        </div>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="regUsername" placeholder="e.g. DantyzTech" required>
        </div>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="regEmail" placeholder="example@gmail.com" required>
        </div>
        <div class="input-group">
            <label>Phone Number (+254)</label>
            <input type="tel" id="regPhone" placeholder="07XXXXXXXX" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="regPass" placeholder="••••••••" required>
            <span class="toggle-password" onclick="togglePass('regPass', this)">SHOW</span>
        </div>
        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPass" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-blue" style="background: var(--accent-red); box-shadow: 0 5px 15px rgba(255, 42, 42, 0.4);">Create Account</button>
    </form>

    <form id="forgotForm">
        <div class="alert-box" style="display: block;">🔐 <strong>Recovery:</strong> Enter your registered phone number to authenticate.</div>
        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="recoveryPhone" placeholder="07XXXXXXXX" required>
        </div>
        <button type="submit" class="btn btn-blue" style="background: var(--warning-yellow); color: black; box-shadow: 0 5px 15px rgba(255, 204, 0, 0.4);">Authenticate Number</button>
        <p style="text-align: center; font-size: 0.8rem; margin-top: 15px;">
            <a href="#" style="color: white; text-decoration: none;" onclick="showForm('login')">← Back to Login</a>
        </p>
    </form>
</div>

<script>
    // Toggle Password Visibility
    function togglePass(inputId, element) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            element.textContent = "HIDE";
        } else {
            input.type = "password";
            element.textContent = "SHOW";
        }
    }

    // Switch between Forms
    function showForm(type) {
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const forgotForm = document.getElementById('forgotForm');
        const tabs = document.getElementById('authTabs');
        
        loginForm.classList.toggle('active', type === 'login');
        signupForm.classList.toggle('active', type === 'signup');
        forgotForm.classList.toggle('active', type === 'forgot');
        
        document.getElementById('loginTab').classList.toggle('active', type === 'login');
        document.getElementById('signupTab').classList.toggle('active', type === 'signup');
        
        tabs.style.display = (type === 'forgot') ? 'none' : 'flex';
        document.getElementById('signupAlert').style.display = (type === 'signup') ? 'block' : 'none';
    }

    // Load Remembered User
    window.onload = () => {
        const savedUser = localStorage.getItem('rememberedUser');
        if (savedUser) {
            document.getElementById('loginUser').value = savedUser;
            document.getElementById('rememberMe').checked = true;
        }
    };

    // LOGIN ACTION
    document.getElementById('loginForm').onsubmit = async function(e) {
        e.preventDefault();
        const identifier = document.getElementById('loginUser').value;
        const password = document.getElementById('loginPass').value;
        const remember = document.getElementById('rememberMe').checked;

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // Sending as 'username' to ensure database matching
                body: JSON.stringify({ username: identifier, password: password })
            });

            if (response.status === 200) {
                // Handle "Remember Me"
                if (remember) {
                    localStorage.setItem('rememberedUser', identifier);
                } else {
                    localStorage.removeItem('rememberedUser');
                }
                
                // Save session for fetching data on dashboard
                localStorage.setItem('activeSession', identifier);
                window.location.href = "home.html";
            } else if (response.status === 404) {
                alert("❌ Account not found. Please check your username/email.");
            } else {
                alert("❌ Incorrect password. Try again.");
            }
        } catch (err) {
            alert("⚠️ Connection Error: Is your database online?");
        }
    };

    // SIGNUP ACTION
    document.getElementById('signupForm').onsubmit = async function(e) {
        e.preventDefault();
        const pass = document.getElementById('regPass').value;
        const confirm = document.getElementById('confirmPass').value;
        
        if (pass !== confirm) {
            alert("❌ Passwords do not match!");
            return;
        }

        const userData = {
            full_name: document.getElementById('regFullName').value,
            username: document.getElementById('regUsername').value,
            email: document.getElementById('regEmail').value,
            phone: document.getElementById('regPhone').value,
            password: pass
        };

        try {
            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            if (response.ok) {
                alert("✅ Account created! You can now log in.");
                showForm('login');
            } else {
                alert("❌ Registration failed. Username or Email might be taken.");
            }
        } catch (err) {
            alert("⚠️ Signup failed. Check your server.");
        }
    };

    // FORGOT PASSWORD ACTION
    document.getElementById('forgotForm').onsubmit = async function(e) {
        e.preventDefault();
        const phone = document.getElementById('recoveryPhone').value;

        try {
            const response = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: phone })
            });

            if (response.ok) {
                alert("✅ Number Authenticated. Check your phone for the reset code.");
            } else {
                alert("❌ Phone number not found in our registry.");
            }
        } catch (err) {
            alert("⚠️ Error: Backend unreachable.");
        }
    };
</script>
</body>
</html>
