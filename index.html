<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAN74TECH MEDIA | AUTHENTICATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0044ff;
            --accent-red: #ff2a2a;
            --warning-yellow: #ffcc00;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.07);
            --transition: 0.4s ease;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #001133, #000000, #002266, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary-blue);
            border-bottom: 5px solid var(--accent-red);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
        }

        .logo { width: 100px; filter: drop-shadow(0 0 8px var(--primary-blue)); animation: pulse 3s infinite; margin-bottom: 15px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        h1 { font-family: 'Montserrat', sans-serif; font-size: 1.6rem; color: var(--primary-blue); margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { color: var(--warning-yellow); font-size: 0.8rem; font-weight: 600; margin-bottom: 30px; text-transform: uppercase; }

        .tabs { display: flex; margin-bottom: 25px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 5px; }
        .tab { flex: 1; padding: 12px; cursor: pointer; font-weight: 600; color: #888; transition: var(--transition); border-radius: 10px; }
        .tab.active { color: white; background: var(--primary-blue); box-shadow: 0 4px 15px rgba(0, 68, 255, 0.3); }

        form { display: none; text-align: left; animation: fadeIn 0.5s ease; }
        form.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 18px; position: relative; }
        label { display: block; font-size: 0.75rem; color: #aaa; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid #333;
            border-radius: 10px; color: white; font-size: 0.95rem; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--warning-yellow); background: rgba(255,255,255,0.1); }

        .toggle-password {
            position: absolute; right: 15px; top: 38px; cursor: pointer;
            color: var(--warning-yellow); font-size: 0.7rem; font-weight: bold;
        }

        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 0.8rem; }
        .forgot-link { color: var(--warning-yellow); text-decoration: none; font-weight: 600; }

        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: 800;
            text-transform: uppercase; cursor: pointer; transition: 0.4s; margin-top: 10px;
        }
        .btn-blue { background: var(--primary-blue); color: white; }
        .btn-yellow { background: var(--warning-yellow); color: black; font-weight: 900; }

        .alert-box {
            background: rgba(255, 204, 0, 0.1); border: 1px solid var(--warning-yellow); color: var(--warning-yellow);
            padding: 12px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 20px; display: none;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <img src="images/logo.png" alt="DAN74TECH Logo" class="logo">
    <h1>DAN74TECH SITE</h1>
    <p class="subtitle">System Authenticator</p>

    <div class="tabs" id="authTabs">
        <div class="tab active" id="loginTab" onclick="showForm('login')">LOGIN</div>
        <div class="tab" id="signupTab" onclick="showForm('signup')">SIGN UP</div>
    </div>

    <form id="loginForm" class="active">
        <div class="input-group">
            <label>Username or Email</label>
            <input type="text" id="loginUser" placeholder="Click to enter" required onclick="handleUsernameClick()">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="••••••••" required>
            <span class="toggle-password" onclick="togglePass('loginPass', this)">SHOW</span>
        </div>
        <div class="form-options">
            <label><input type="checkbox" id="rememberMe"> Remember Me</label>
            <a href="#" class="forgot-link" onclick="showForm('forgot')">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-blue">Enter Dashboard</button>
    </form>

    <form id="signupForm">
        <div id="signupAlert" class="alert-box">⚠️ Account Registry is currently active.</div>
        <div class="input-group"><label>Full Name</label><input type="text" id="regFullName" required></div>
        <div class="input-group"><label>Username</label><input type="text" id="regUsername" required></div>
        <div class="input-group"><label>Email Address</label><input type="email" id="regEmail" required></div>
        <div class="input-group"><label>Phone Number</label><input type="tel" id="regPhone" placeholder="07..." required></div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="regPass" required>
            <span class="toggle-password" onclick="togglePass('regPass', this)">SHOW</span>
        </div>
        <button type="submit" class="btn btn-blue" style="background: var(--accent-red);">Create Account</button>
    </form>

    <form id="forgotForm">
        <div id="forgotAlert" class="alert-box" style="display: block;">🔐 <strong>Recovery:</strong> Authenticate your phone to reset.</div>
        
        <div id="stepVerify">
            <div class="input-group">
                <label>Registered Phone Number</label>
                <input type="tel" id="recoveryPhone" placeholder="07XXXXXXXX" required>
            </div>
            <button type="button" class="btn btn-yellow" onclick="verifyPhone()">Verify Number</button>
        </div>

        <div id="stepReset" style="display: none;">
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-blue">Update & Login</button>
        </div>

        <p style="text-align: center; font-size: 0.8rem; margin-top: 15px;">
            <a href="#" style="color: white; text-decoration: none;" onclick="showForm('login')">← Back to Login</a>
        </p>
    </form>
</div>

<script>
    let verifiedPhone = "";

    function handleUsernameClick() {
        const val = document.getElementById('loginUser').value;
        if(!val) {
            const move = confirm("Don't have an account? Click OK to create a new one now.");
            if(move) showForm('signup');
        }
    }

    function togglePass(id, el) {
        const x = document.getElementById(id);
        x.type = x.type === "password" ? "text" : "password";
        el.textContent = x.type === "password" ? "SHOW" : "HIDE";
    }

    function showForm(type) {
        document.getElementById('loginForm').classList.toggle('active', type === 'login');
        document.getElementById('signupForm').classList.toggle('active', type === 'signup');
        document.getElementById('forgotForm').classList.toggle('active', type === 'forgot');
        document.getElementById('authTabs').style.display = (type === 'forgot') ? 'none' : 'flex';
    }

    // AUTHENTICATE PHONE
    async function verifyPhone() {
        const phone = document.getElementById('recoveryPhone').value;
        try {
            const res = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: phone })
            });

            if (res.ok) {
                verifiedPhone = phone;
                document.getElementById('stepVerify').style.display = 'none';
                document.getElementById('stepReset').style.display = 'block';
                document.getElementById('forgotAlert').innerHTML = "✅ <strong>Identity Confirmed.</strong> Enter new password.";
            } else {
                alert("❌ Phone number not found. The database was just updated; please ensure you are using the number registered during signup.");
            }
        } catch (e) { alert("⚠️ Server connection failed."); }
    }

    // UPDATE PASSWORD & LOGIN
    document.getElementById('forgotForm').onsubmit = async function(e) {
        e.preventDefault();
        const newPass = document.getElementById('newPassword').value;
        try {
            const res = await fetch('/api/update-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: verifiedPhone, password: newPass })
            });

            if (res.ok) {
                alert("🚀 Password Reset Successful! Logging in...");
                localStorage.setItem('activeSession', verifiedPhone);
                window.location.href = "home.html";
            }
        } catch (e) { alert("⚠️ Update failed."); }
    };

    // LOGIN ACTION
    document.getElementById('loginForm').onsubmit = async function(e) {
        e.preventDefault();
        const user = document.getElementById('loginUser').value;
        const pass = document.getElementById('loginPass').value;
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            if (res.ok) {
                localStorage.setItem('activeSession', user);
                window.location.href = "home.html";
            } else {
                alert("❌ Login Failed. If you forgot your details, use the recovery option.");
            }
        } catch (e) { alert("⚠️ Connection Error."); }
    };
</script>
</body>
</html>
