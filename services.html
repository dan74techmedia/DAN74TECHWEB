<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | DAN74TECH MEDIA</title>
    
    <!-- Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- FontAwesome 6 for Modern UI Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Official Theme Palette from Admin */
            --primary-blue: #0044ff;
            --deep-blue: #0022aa;
            --accent-yellow: #ffd700;
            --accent-red: #ff2a2a;
            
            /* Backgrounds & Text */
            --bg-light: #f5f7fa;
            --text-dark: #1e1e24;
            --card-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            scroll-behavior: smooth;
        }
        
        /* --- Header --- */
        header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--deep-blue) 100%);
            color: white;
            padding: 50px 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent-yellow);
        }

        .logo {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        header h1 {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;            
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* --- Navigation --- */
        nav {
            background: var(--deep-blue);
            padding: 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 5px 20px;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s, transform 0.3s;
        }

        nav a:hover {
            color: var(--accent-yellow);
            transform: translateY(-2px);
        }

        /* --- Services Container --- */
        .services-wrapper {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            min-height: 50vh;
        }

        .details-section { 
            background: var(--card-bg);
            padding: 40px 30px; 
            margin-bottom: 25px;
            border-radius: 12px;
            border-left: 5px solid var(--primary-blue); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .details-section:hover { 
            transform: translateX(5px);
            border-left: 5px solid var(--accent-red);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .details-section h2 { 
            font-family: 'Montserrat', sans-serif; 
            color: var(--deep-blue); 
            text-transform: uppercase; 
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 0;
            font-size: 1.8rem;
        }

        .details-section p.desc {
            font-size: 1.05rem;
            color: #555;
            margin-bottom: 20px;
        }

        .price-tag { 
            color: var(--accent-red); 
            font-weight: 700; 
            font-size: 1.1rem; 
            background: #fff0f0;
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid rgba(255, 42, 42, 0.2);
            display: inline-block;
            margin-bottom: 20px;
        }

        .btn-order {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--primary-blue);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 68, 255, 0.2);
        }

        .btn-order:hover {
            background: var(--accent-red);
            transform: translateX(5px);
            box-shadow: 0 6px 15px rgba(255, 42, 42, 0.3);
            color: white;
        }

        /* --- Footer --- */
        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 60px 20px 30px;
            border-top: 4px solid var(--accent-red);
            margin-top: 50px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto 40px auto;
            text-align: left;
        }

        .loader {
            text-align: center;
            color: var(--primary-blue);
            font-size: 1.5rem;
            padding: 60px;
        }

        @media (max-width: 600px) {
            .details-section { padding: 25px 20px; }
            header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<header>
    <img src="images/logo.png" alt="DAN74TECH Logo" class="logo" onerror="this.src='https://placehold.co/100x100/0044ff/FFF?text=D74'">
    <h1>OUR SERVICES</h1>
</header>
  
<nav>
    <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
    <a href="about.html"><i class="fa-solid fa-user-tie"></i> About</a>
    <a href="services.html" style="color: var(--accent-yellow);"><i class="fa-solid fa-layer-group"></i> Services</a>
    <a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact</a>
</nav>

<!-- Dynamic Services List Container -->
<div class="services-wrapper" id="services-container">
    <div class="loader"><i class="fas fa-spinner fa-spin"></i> Fetching Services Menu...</div>
</div>

<footer>
    <div class="footer-grid">
        <div>
            <h3 style="font-family: 'Montserrat'; color: var(--accent-yellow); margin-bottom: 15px;"><i class="fa-solid fa-microchip"></i> DAN74TECH MEDIA</h3>
            <p style="margin: 8px 0; color: #ccc;"><i class="fa-solid fa-location-dot" style="width: 20px;"></i> Based in Meru, Kenya</p>
            <p style="margin: 8px 0; color: #ccc;"><i class="fa-solid fa-clock" style="width: 20px;"></i> Mon - Sat (8 AM - 6 PM)</p>
        </div>
        <div style="text-align: right;">
            <h3 style="font-family: 'Montserrat'; color: var(--accent-yellow); margin-bottom: 15px;">DEVELOPMENT</h3>
            <a href="https://github.com/ngumidaniel425-del/MYself/blob/main/README.md" target="_blank" style="color: #fff; text-decoration: none; font-weight: 600; background: #222; padding: 12px 20px; border-radius: 8px; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; border: 1px solid #444;">
               <i class="fa-brands fa-github fa-lg"></i> View Technical GitHub
            </a>
        </div>
    </div>
    <div style="border-top: 1px solid #222; padding-top: 25px; margin-top: 10px;">
        <p style="color: #777; font-size: 0.9rem;">&copy; 2026 DAN74TECH MEDIA | Dedicated to Excellence</p>
    </div>
</footer>

<!-- ========================================== -->
<!-- DYNAMIC DATABASE INJECTION SCRIPT -->
<!-- ========================================== -->
<script>
    // Smart Call-To-Action generator based on the service route
    function getCallToAction(route) {
        const ctas = {
            'graphics': 'Order Graphics & Upload Files',
            'video': 'Send Video Project',
            'web': 'Get a Web Quote',
            'app': 'Build Your App',
            'repairs': 'Book Repair Slot',
            'advice': 'Book Consultation'
        };
        return ctas[route] || 'View Details & Order';
    }

    async function fetchDetailedServices() {
        const container = document.getElementById('services-container');
        try {
            const res = await fetch('/api/services');
            if (!res.ok) throw new Error('Failed to fetch services');
            
            const data = await res.json();
            
            // Filter out sub-packages if you only want the main categories, 
            // OR display all. Assuming main categories have the 'page_route' property defined clearly.
            const mainServices = data.filter(s => s.page_route); 

            if (mainServices.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #666;">
                        <h3>Updating Services Menu...</h3>
                        <p>Our database is currently syncing. Please check back shortly.</p>
                    </div>`;
                return;
            }

            container.innerHTML = mainServices.map(service => {
                const ctaText = getCallToAction(service.page_route);
                const displayPrice = service.price ? service.price : 'Custom Pricing Available';
                
                return `
                    <section class="details-section" id="${service.page_route}">
                        <h2>${service.icon || '💼'} ${service.title}</h2>
                        <p class="desc">${service.description}</p>
                        <div class="price-tag"><i class="fa-solid fa-tag"></i> ${displayPrice}</div>
                        <br>
                        <a href="${service.page_route}.html" class="btn-order">
                            ${ctaText} <i class="fa-solid fa-arrow-right"></i>
                        </a>
                    </section>
                `;
            }).join('');

        } catch (error) {
            console.error('Error fetching services:', error);
            container.innerHTML = `
                <div style="text-align: center; padding: 50px; color: var(--accent-red);">
                    <i class="fa-solid fa-triangle-exclamation fa-2x"></i>
                    <h3>Unable to load services database</h3>
                    <p>Please ensure the backend server is running.</p>
                </div>`;
        }
    }

    document.addEventListener('DOMContentLoaded', fetchDetailedServices);
</script>

</body>
</html>
