<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrative Gateway | DAN74TECH MEDIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand-blue: #0044ff; --brand-red: #ff2a2a; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-image: url('images/logo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .bg-overlay {
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(8px);
        }

        .floating-panel {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: floatUp 0.5s ease-out forwards;
        }

        @keyframes floatUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="antialiased selection:bg-[#0044ff] selection:text-white min-h-screen flex flex-col justify-between relative">

    <div class="absolute inset-0 bg-overlay z-0"></div>

    <header class="w-full relative z-10 border-b border-gray-800 bg-[#0b0f19]/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 group focus:outline-none">
                <div class="w-11 h-11 rounded-xl bg-gradient-to-br from-[#0044ff] to-[#ff2a2a] p-[2px]">
                    <div class="w-full h-full bg-white rounded-[10px] flex items-center justify-between overflow-hidden">
                        <img src="images/logo.png" alt="Logo" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100?text=DAN74TECH'">
                    </div>
                </div>
                <div class="flex flex-col">
                    <span class="text-lg font-extrabold text-white font-mono tracking-wider">DAN74TECH<span class="text-[#0044ff]">.</span><span class="text-[#ff2a2a]">MEDIA</span></span>
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Administrative Gateway</span>
                </div>
            </a>
            <a href="index.html" class="text-sm font-bold text-gray-300 hover:text-white transition-colors"><i class="fa-solid fa-arrow-left"></i> Back to Hub</a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-12 relative z-10">
        <div class="max-w-md w-full bg-white rounded-3xl border border-gray-100 p-8 floating-panel space-y-6">
            
            <div class="text-center space-y-2">
                <div class="w-12 h-12 bg-blue-50 text-[#0044ff] rounded-2xl flex items-center justify-center text-xl mx-auto">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1 id="panelTitle" class="text-2xl font-extrabold text-gray-900 tracking-tight">Administrative Login</h1>
                <p id="panelSubtitle" class="text-xs text-gray-500 font-medium">Enter secure clearance credentials to access the master operations console.</p>
            </div>

            <div id="authAlert" class="hidden p-3 rounded-xl text-xs font-bold text-center font-mono transition-all"></div>

            <form id="loginForm" class="space-y-4">
                <div class="space-y-1">
                    <label class="block text-xs font-bold tracking-wider text-gray-400 uppercase font-mono">Admin Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 text-xs"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="loginEmail" required placeholder="admin@dan74tech.com" class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-9 pr-4 py-3 text-xs text-gray-900 focus:outline-none focus:border-[#0044ff] transition-colors font-mono">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-xs font-bold tracking-wider text-gray-400 uppercase font-mono">Secure Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 text-xs"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="loginPassword" required placeholder="••••••••••••" class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-9 pr-10 py-3 text-xs text-gray-900 focus:outline-none focus:border-[#0044ff] transition-colors font-mono">
                        <button type="button" onclick="togglePasswordVisibility('loginPassword', 'loginEyeIcon')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-[#0044ff] transition-colors">
                            <i id="loginEyeIcon" class="fa-solid fa-eye text-xs"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="w-full bg-[#0044ff] hover:bg-blue-700 text-white font-bold text-xs tracking-wider py-4 rounded-xl shadow-lg shadow-blue-600/10 transition-all font-mono uppercase mt-4">
                    Verify Clearance & Enter <i class="fa-solid fa-key ml-1"></i>
                </button>
            </form>

        </div>
    </main>

    <footer class="w-full relative z-10 bg-[#0b0f19] text-gray-400 py-6 border-t border-gray-900 text-center text-[11px] font-mono">
        &copy; 2026 DAN74TECH MEDIA. Systems Security Protocol Node. Status: <span class="text-emerald-500">Secure</span>
    </footer>

    <script>
        const SYSTEM_API_BASE_URL = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1') ? 'http://localhost:10000/api' : '/api';

        // --- DOM Elements ---
        const loginForm = document.getElementById('loginForm');
        const authAlert = document.getElementById('authAlert');

        // --- UI Interactions ---
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function showPanelAlert(message, type = 'error') {
            authAlert.className = `p-3 rounded-xl text-xs font-bold text-center font-mono transition-all mb-4 ${type === 'error' ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-emerald-50 text-emerald-600 border border-emerald-100'}`;
            authAlert.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-check-circle'} mr-2"></i>${message}`;
            authAlert.classList.remove('hidden');
        }
        
        // --- Token Serialization & Redirection Engine ---
        function processAuthenticationSuccess(data) {
            // 1. Vaporize all ghost sessions
            localStorage.clear(); 
            
            // 2. Establish persistent session context
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));

            // Admin system compatibility keys
            localStorage.setItem('dan74_admin_token', data.token);
            localStorage.setItem('dan74_admin_user', JSON.stringify(data.user));
            
            console.log("Admin session validated. Initializing Master Operations Console.");
            window.location.href = 'admin.html'; 
        }

        // --- Authentication Login Pipeline ---
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            authAlert.classList.add('hidden');
            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                btn.innerHTML = 'Verifying Credentials... <i class="fa-solid fa-circle-notch fa-spin ml-1"></i>';
                btn.disabled = true;

                const response = await fetch(`${SYSTEM_API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    // Enforce structural admin checkpoint on client side
                    const userRole = String(data.user?.role || '').trim().toLowerCase();
                    
                    if (userRole === 'admin') {
                        showPanelAlert("Handshake complete. Routing to Master Console...", "success");
                        setTimeout(() => processAuthenticationSuccess(data), 800);
                    } else {
                        throw new Error("Access Denied: Terminal restricted to system administrators.");
                    }
                } else {
                    throw new Error(data.error || data.message || "Authentication clearance denied.");
                }
            } catch (err) {
                showPanelAlert(err.message, "error");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // --- Newsletter Pipeline Engine ---
        document.getElementById('newsletterPipelineSubmissionForm')?.addEventListener('submit', async function(formSubmissionEvent) {
            formSubmissionEvent.preventDefault();
            const emailInput = this.querySelector('input[type="email"]').value;
            
            try {
                const response = await fetch('/api/subscribers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput, status: 'active' })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert("✅ Subscription confirmed for DAN74TECH MEDIA updates.");
                    this.reset();
                } else {
                    alert("Notice: " + (result.error || "Subscription already exists."));
                }
            } catch (err) {
                console.error("Submission Failure:", err);
                alert("Pipeline error. Please try again later.");
            }
        });
    </script>
</body>
</html>
