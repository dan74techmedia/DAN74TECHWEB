<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAN74TECH MEDIA | Secure Client Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        corporateYellow: '#FFD700',
                        professionalBlue: '#0044FF',
                        actionRed: '#FF2A2A',
                        darkFooter: '#111827'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Strict ban on dark-mode overrides on document body */
        body { background-color: #f9fafb !important; color: #111827 !important; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hide { display: none !important; }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <section class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md border-t-4 border-professionalBlue relative overflow-hidden">
            
            <div id="alert-box" class="hide absolute top-0 left-0 w-full p-3 text-xs font-bold text-center text-white transition-all z-10"></div>

            <div class="text-center mb-8 mt-4">
                <div class="inline-block bg-blue-50 p-3 rounded-full mb-3">
                    <i class="fa-solid fa-shield-halved text-2xl text-professionalBlue"></i>
                </div>
                <h1 class="text-2xl font-bold text-professionalBlue tracking-wide">DAN74TECH MEDIA</h1>
                <p class="text-sm text-gray-500 font-medium mt-1">Secure Client Operations Portal</p>
            </div>

            <div id="login-view">
                <form id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Email Vector</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-envelope text-gray-400 text-sm"></i>
                            </div>
                            <input type="email" id="login-email" required placeholder="client@domain.com" class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-professionalBlue focus:border-professionalBlue outline-none transition bg-gray-50 focus:bg-white text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Access Credential</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-lock text-gray-400 text-sm"></i>
                            </div>
                            <input type="password" id="login-password" required placeholder="••••••••" class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-professionalBlue focus:border-professionalBlue outline-none transition bg-gray-50 focus:bg-white text-sm">
                        </div>
                    </div>
                    <button type="submit" id="btn-login" class="w-full bg-professionalBlue text-white font-bold py-2.5 px-4 rounded-md hover:bg-blue-700 transition duration-200 shadow-md flex justify-center items-center gap-2">
                        <span>Authenticate Pipeline</span>
                        <i id="spinner-login" class="fa-solid fa-circle-notch spinner hide"></i>
                    </button>
                </form>
                
                <div class="mt-6 pt-4 border-t border-gray-100 text-center">
                    <p class="text-sm text-gray-600">No operational clearance? <br>
                        <a href="#" onclick="toggleAuth('register')" class="text-professionalBlue font-bold hover:underline mt-1 inline-block">Initialize Client Profile</a>
                    </p>
                </div>
            </div>

            <div id="register-view" class="hide">
                <form id="register-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Full Designation (Name)</label>
                        <input type="text" id="reg-name" required placeholder="John Doe" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-corporateYellow focus:border-corporateYellow outline-none bg-gray-50 focus:bg-white text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Email Vector</label>
                        <input type="email" id="reg-email" required placeholder="client@domain.com" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-corporateYellow focus:border-corporateYellow outline-none bg-gray-50 focus:bg-white text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Phone Conduit</label>
                        <input type="text" id="reg-phone" required placeholder="+254 7XX XXX XXX" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-corporateYellow focus:border-corporateYellow outline-none bg-gray-50 focus:bg-white text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Access Credential</label>
                        <input type="password" id="reg-password" required placeholder="Create strong password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-corporateYellow focus:border-corporateYellow outline-none bg-gray-50 focus:bg-white text-sm">
                    </div>
                    <button type="submit" id="btn-register" class="w-full bg-corporateYellow text-gray-900 font-bold py-2.5 px-4 rounded-md hover:bg-yellow-500 transition duration-200 shadow-md mt-2 flex justify-center items-center gap-2">
                        <span>Establish Clearance</span>
                        <i id="spinner-register" class="fa-solid fa-circle-notch spinner hide"></i>
                    </button>
                </form>
                
                <div class="mt-6 pt-4 border-t border-gray-100 text-center">
                    <p class="text-sm text-gray-600">Existing matrix clearance? <br>
                        <a href="#" onclick="toggleAuth('login')" class="text-professionalBlue font-bold hover:underline mt-1 inline-block">Authenticate Here</a>
                    </p>
                </div>
            </div>
            
        </div>
    </section>

    <footer class="bg-darkFooter text-gray-400 py-6 text-center text-sm mt-auto border-t-4 border-corporateYellow">
        <p>&copy; <script>document.write(new Date().getFullYear())</script> DAN74TECH MEDIA. All operational vectors secured.</p>
        <p class="text-xs mt-1">Lead Systems Architecture by Daniel Ngumi | Meru, Kenya</p>
    </footer>

    <script>
        // API Base Vector Mapping
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:10000/api' 
            : 'https://dan74techweb.onrender.com/api';

        // Pre-Flight Session Check: Redirect immediately if already logged in
        window.onload = () => {
            const token = localStorage.getItem('dan74tech_token');
            const userNode = localStorage.getItem('dan74tech_user');
            if (token && userNode) {
                window.location.href = 'client.html';
            }
        };

        // UI View Toggles
        const toggleAuth = (view) => {
            document.getElementById('login-view').classList.toggle('hide', view !== 'login');
            document.getElementById('register-view').classList.toggle('hide', view !== 'register');
            hideAlert(); // Clear any existing errors when switching views
        };

        // Alert System
        const showAlert = (message, isSuccess = false) => {
            const alertBox = document.getElementById('alert-box');
            alertBox.innerText = message;
            alertBox.className = `absolute top-0 left-0 w-full p-3 text-xs font-bold text-center text-white transition-all z-10 ${isSuccess ? 'bg-green-600' : 'bg-actionRed'}`;
            alertBox.classList.remove('hide');
            setTimeout(hideAlert, 5000);
        };

        const hideAlert = () => {
            document.getElementById('alert-box').classList.add('hide');
        };

        const setButtonLoading = (btnId, spinnerId, isLoading) => {
            const btn = document.getElementById(btnId);
            const spinner = document.getElementById(spinnerId);
            if (isLoading) {
                btn.disabled = true;
                btn.classList.add('opacity-75', 'cursor-not-allowed');
                spinner.classList.remove('hide');
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                spinner.classList.add('hide');
            }
        };

        // Universal Network Interceptor
        const authApiCall = async (endpoint, payload) => {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                // Blueprint Enforcement: Handle specific rate limiting / block errors
                if (!response.ok) {
                    throw new Error(data.error || data.message || 'Authentication vector compromised. Try again.');
                }
                return data;
            } catch (error) {
                throw error;
            }
        };

        // Complete Session & Redirect
        const authorizeSessionAndRedirect = (jwt, user) => {
            localStorage.setItem('dan74tech_token', jwt);
            localStorage.setItem('dan74tech_user', JSON.stringify(user));
            showAlert('Authentication successful. Routing to operations portal...', true);
            
            // Allow user to read success message before redirecting
            setTimeout(() => {
                window.location.href = 'client.html'; // STRICT REDIRECT TO CLIENT PORTAL ONLY
            }, 800);
        };

        // ---------------------------------------------------------
        // Form Submission Handlers
        // ---------------------------------------------------------

        // Login Handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            setButtonLoading('btn-login', 'spinner-login', true);

            const payload = {
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            };

            try {
                const res = await authApiCall('/auth/login', payload);
                if (res.success) {
                    authorizeSessionAndRedirect(res.token, res.user);
                }
            } catch (err) {
                showAlert(err.message);
                setButtonLoading('btn-login', 'spinner-login', false);
            }
        });

        // Registration Handler
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            setButtonLoading('btn-register', 'spinner-register', true);

            const payload = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                phone: document.getElementById('reg-phone').value,
                password: document.getElementById('reg-password').value
            };

            try {
                const res = await authApiCall('/auth/register', payload);
                if (res.success) {
                    // Alert users to check their email based on Phase 3 notification triggers
                    showAlert('Profile initialized. Routing to operations portal...', true);
                    setTimeout(() => {
                        authorizeSessionAndRedirect(res.token, res.user);
                    }, 1000);
                }
            } catch (err) {
                showAlert(err.message);
                setButtonLoading('btn-register', 'spinner-register', false);
            }
        });
    </script>
</body>
</html>
