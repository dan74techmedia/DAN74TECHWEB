<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Console | DAN74TECH MEDIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand-blue: #0044ff; --brand-red: #ff2a2a; --bg-dark: #0b0f19; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f3f4f6; /* Light content bg for readability */
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .sidebar-dark { background: rgba(11, 15, 25, 0.95); backdrop-filter: blur(12px); border-right: 1px solid rgba(255,255,255,0.1); }
        .topbar-dark { background: rgba(11, 15, 25, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        /* Custom Scrollbar for tables */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--brand-blue); }

        .modal-enter { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-enter { animation: slideInRight 0.4s ease-out forwards; }

        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }

        /* Loader */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--brand-blue); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased selection:bg-[#0044ff] selection:text-white flex h-screen overflow-hidden">

    <div id="mobileOverlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="sidebar-dark w-64 fixed lg:static inset-y-0 left-0 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col h-full">
        <div class="h-20 flex items-center justify-between px-6 border-b border-gray-800">
            <a href="index.html" class="flex items-center gap-3 group focus:outline-none">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-[#0044ff] to-[#ff2a2a] p-[1px]">
                    <div class="w-full h-full bg-white rounded-[7px] flex items-center justify-center overflow-hidden">
                        <img src="images/logo.png" alt="Logo" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100?text=D'">
                    </div>
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-extrabold text-white font-mono tracking-wider">DAN74TECH</span>
                    <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest">Master Console</span>
                </div>
            </a>
            <button class="lg:hidden text-gray-400 hover:text-white" onclick="toggleSidebar()"><i class="fa-solid fa-times"></i></button>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1 custom-scrollbar" id="navLinks">
            </nav>

        <div class="p-4 border-t border-gray-800">
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-red-500/10 hover:bg-red-500/20 text-red-500 rounded-lg text-xs font-bold uppercase tracking-wider transition-colors font-mono">
                <i class="fa-solid fa-power-off"></i> Terminate Session
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        
        <header class="topbar-dark h-20 flex items-center justify-between px-4 sm:px-6 lg:px-8 z-30">
            <div class="flex items-center gap-4">
                <button class="text-gray-300 hover:text-white lg:hidden" onclick="toggleSidebar()">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <h2 id="pageTitle" class="text-white text-lg font-bold font-mono tracking-wide">System Dashboard</h2>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-2 text-right mr-2">
                    <div class="flex flex-col">
                        <span id="adminNameDisplay" class="text-sm font-bold text-white">Administrator</span>
                        <span class="text-[10px] text-emerald-400 font-mono tracking-widest uppercase">Clearance: Level 5</span>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold border-2 border-gray-700">
                        <i class="fa-solid fa-user-shield"></i>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 relative">
            
            <div id="dashboardView" class="space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4" id="statsGrid">
                    </div>
            </div>

            <div id="tableView" class="hidden flex flex-col h-full space-y-4">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <div class="relative w-full sm:w-72">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 text-sm"><i class="fa-solid fa-search"></i></span>
                        <input type="text" id="searchInput" placeholder="Search records..." class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-9 pr-4 py-2.5 text-sm text-gray-900 focus:outline-none focus:border-[#0044ff] transition-colors font-mono">
                    </div>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="bulkDelete()" id="bulkDeleteBtn" class="hidden flex-1 sm:flex-none bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2.5 rounded-xl text-sm font-bold transition-colors font-mono items-center justify-center gap-2">
                            <i class="fa-solid fa-trash-can"></i> Bulk Delete (<span id="bulkCount">0</span>)
                        </button>
                        <button onclick="openModal()" class="flex-1 sm:flex-none bg-[#0044ff] hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-blue-600/20 transition-all font-mono flex items-center justify-center gap-2">
                            <i class="fa-solid fa-plus"></i> Add New Record
                        </button>
                    </div>
                </div>

                <div class="bg-white border border-gray-100 rounded-2xl shadow-sm flex-1 overflow-hidden flex flex-col">
                    <div class="overflow-x-auto flex-1">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50/80" id="tableHead">
                                </thead>
                            <tbody class="divide-y divide-gray-100 bg-white" id="tableBody">
                                </tbody>
                        </table>
                    </div>
                    <div class="bg-gray-50 px-4 py-3 border-t border-gray-200 flex items-center justify-between sm:px-6">
                        <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                            <div><p class="text-xs text-gray-500 font-mono">Showing <span class="font-bold text-gray-900" id="pageIndicator">Page 1</span></p></div>
                            <div>
                                <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                                    <button onclick="changePage(-1)" class="relative inline-flex items-center px-3 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50"><i class="fa-solid fa-chevron-left"></i></button>
                                    <button onclick="changePage(1)" class="relative inline-flex items-center px-3 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50"><i class="fa-solid fa-chevron-right"></i></button>
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div id="entityModal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
            <div class="relative bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:max-w-2xl w-full modal-enter border border-gray-100 flex flex-col max-h-[90vh]">
                <div class="bg-gray-50 px-6 py-4 border-b border-gray-100 flex justify-between items-center shrink-0">
                    <h3 class="text-lg leading-6 font-bold text-gray-900 font-mono tracking-tight" id="modalTitle">Create Record</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-times text-xl"></i></button>
                </div>
                <div class="px-6 py-4 overflow-y-auto flex-1 custom-scrollbar">
                    <form id="entityForm" class="space-y-4 grid grid-cols-1 sm:grid-cols-2 gap-4">
                        </form>
                </div>
                <div class="bg-gray-50 px-6 py-4 border-t border-gray-100 flex justify-end gap-3 shrink-0">
                    <button type="button" onclick="closeModal()" class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-xl text-sm font-bold hover:bg-gray-50 transition-colors font-mono">Cancel</button>
                    <button type="button" onclick="saveRecord()" id="saveBtn" class="bg-[#0044ff] text-white px-6 py-2 rounded-xl text-sm font-bold shadow-md shadow-blue-500/20 hover:bg-blue-700 transition-colors font-mono flex items-center gap-2">
                        <i class="fa-solid fa-save"></i> Save Configuration
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-5 right-5 z-[70] flex flex-col gap-3"></div>

    <script>
        // ============================================================================
        // 1. CORE SYSTEM CONFIGURATION & STATE
        // ============================================================================
        const SYSTEM_API_BASE_URL = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1') ? 'http://localhost:10000/api' : '/api';
        
        // Define navigation matrix mirroring the backend whitelisted tables
        const navStructure = [
            { section: 'Core Analytics', items: [{ id: 'dashboard', label: 'System Dashboard', icon: 'fa-chart-pie' }] },
            { section: 'CRM & Users', items: [
                { id: 'users', label: 'User Matrix', icon: 'fa-users' },
                { id: 'subscribers', label: 'Newsletter Subs', icon: 'fa-envelope-open-text' },
                { id: 'consultations', label: 'Consultations', icon: 'fa-calendar-check' },
                { id: 'messages', label: 'Inbox Vectors', icon: 'fa-inbox' }
            ]},
            { section: 'Commerce Operations', items: [
                { id: 'orders', label: 'Deployments (Orders)', icon: 'fa-shopping-cart' },
                { id: 'invoices', label: 'Financial Ledgers', icon: 'fa-file-invoice-dollar' },
                { id: 'mpesa_transactions', label: 'M-Pesa Pipeline', icon: 'fa-money-bill-transfer' },
                { id: 'services', label: 'Core Services', icon: 'fa-layer-group' },
                { id: 'sub_services', label: 'Sub Services', icon: 'fa-cubes' }
            ]},
            { section: 'Media & Content', items: [
                { id: 'portfolio', label: 'Portfolio Assets', icon: 'fa-briefcase' },
                { id: 'case_studies', label: 'Case Studies', icon: 'fa-microscope' },
                { id: 'blog_posts', label: 'Blog Insights', icon: 'fa-newspaper' },
                { id: 'testimonials', label: 'Client Appraisals', icon: 'fa-star' },
                { id: 'media_library', label: 'CDN Repository', icon: 'fa-photo-film' }
            ]},
            { section: 'System Support', items: [
                { id: 'support_tickets', label: 'Support Nodes', icon: 'fa-headset' },
                { id: 'file_deliveries', label: 'Secure Deliveries', icon: 'fa-file-export' },
                { id: 'email_campaigns', label: 'Broadcasts', icon: 'fa-bullhorn' },
                { id: 'notifications', label: 'System Alerts', icon: 'fa-bell' },
                { id: 'client_communications', label: 'E2EE Threads', icon: 'fa-user-secret' }
            ]}
        ];

        // Schema Mapper (Tells the UI how to build forms based on table mapping in server.js)
        const tableSchemas = {
            users: ['name', 'email', 'password', 'role', 'phone'],
            services: ['name', 'icon', 'description'],
            sub_services: ['service_id', 'name', 'price', 'description'],
            orders: ['user_id', 'customer_name', 'phone', 'service', 'sub_service', 'domain', 'device_model', 'project_details', 'price', 'status', 'payment_status'],
            portfolio: ['title', 'category', 'description', 'link', 'progress', 'status', 'publisher_name', 'is_approved'],
            case_studies: ['title', 'category', 'challenge', 'solution', 'result', 'image_url', 'status', 'is_approved'],
            testimonials: ['client_name', 'client_designation', 'company', 'client_avatar_url', 'rating', 'review', 'status', 'is_featured', 'is_approved'],
            blog_posts: ['title', 'category', 'content', 'summary', 'image_url', 'slug', 'seo_title', 'seo_description', 'status', 'is_approved'],
            subscribers: ['email', 'status'],
            media_library: ['public_id', 'url', 'filename', 'format', 'bytes'],
            invoices: ['order_id', 'invoice_number', 'client_name', 'client_email', 'amount', 'pdf_url', 'status'],
            notifications: ['user_id', 'title', 'message', 'channel', 'status'],
            support_tickets: ['user_id', 'subject', 'description', 'status', 'priority'],
            messages: ['name', 'email', 'subject', 'message', 'status'],
            consultations: ['client_name', 'client_email', 'booking_date', 'booking_time', 'platform', 'status'],
            file_deliveries: ['order_id', 'client_id', 'file_name', 'file_url', 'file_size', 'download_count', 'status'],
            email_campaigns: ['subject', 'content', 'campaign_type', 'recipients_count', 'sent_by'],
            client_communications: ['sender_id', 'receiver_id', 'message_body', 'attachment_url', 'attachment_name', 'message_type', 'channel', 'is_read', 'delivery_status'],
            mpesa_transactions: ['order_id', 'phone_number', 'amount', 'mpesa_receipt_number', 'status']
        };

        // Application State
        const state = {
            activeView: 'dashboard',
            currentPage: 1,
            searchQuery: '',
            tableData: [],
            totalRecords: 0,
            selectedIds: new Set(),
            relationCache: { users: [], services: [], orders: [] }, // Pre-loaded foreign keys
            currentEditId: null
        };

        // ============================================================================
        // 2. AUTHENTICATION & INITIALIZATION
        // ============================================================================
        function getToken() { return localStorage.getItem('dan74_admin_token') || localStorage.getItem('token'); }
        function getUser() { try { return JSON.parse(localStorage.getItem('dan74_admin_user') || localStorage.getItem('user')); } catch { return null; } }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        async function fetchWithAuth(endpoint, options = {}) {
            const token = getToken();
            if (!token) logout();
            const headers = { 'Authorization': `Bearer ${token}`, ...options.headers };
            if (!(options.body instanceof FormData)) headers['Content-Type'] = 'application/json';
            
            const response = await fetch(`${SYSTEM_API_BASE_URL}${endpoint}`, { ...options, headers });
            if (response.status === 401 || response.status === 403) {
                showToast("Authentication block or clearance expired.", "error");
                setTimeout(logout, 1500);
            }
            return response;
        }

        async function init() {
            if (!getToken()) return logout();
            const user = getUser();
            if (user && user.name) document.getElementById('adminNameDisplay').textContent = user.name;
            
            buildSidebar();
            await preloadRelations();
            loadDashboardStats();
            
            // Search Debounce
            document.getElementById('searchInput').addEventListener('input', (e) => {
                state.searchQuery = e.target.value;
                state.currentPage = 1;
                clearTimeout(window.searchTimeout);
                window.searchTimeout = setTimeout(() => fetchTableData(), 500);
            });
        }

        async function preloadRelations() {
            // Load base matrices to map ID to names in dropdowns easily
            try {
                const [uRes, sRes, oRes] = await Promise.all([
                    fetchWithAuth('/admin/users?limit=1000'),
                    fetchWithAuth('/admin/services?limit=1000'),
                    fetchWithAuth('/admin/orders?limit=1000')
                ]);
                if(uRes.ok) state.relationCache.users = (await uRes.json()).data || [];
                if(sRes.ok) state.relationCache.services = (await sRes.json()).data || [];
                if(oRes.ok) state.relationCache.orders = (await oRes.json()).data || [];
            } catch (err) { console.warn("Relation cache silent failure:", err); }
        }

        // ============================================================================
        // 3. UI RENDERING & NAVIGATION LOGIC
        // ============================================================================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const icon = type === 'success' ? 'fa-check-circle text-emerald-500' : 'fa-triangle-exclamation text-red-500';
            const bg = type === 'success' ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200';
            
            toast.className = `toast-enter flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg border ${bg} text-gray-800 font-mono text-sm max-w-sm`;
            toast.innerHTML = `<i class="fa-solid ${icon} text-lg"></i> <span>${message}</span>`;
            
            const container = document.getElementById('toastContainer');
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function buildSidebar() {
            const container = document.getElementById('navLinks');
            container.innerHTML = '';
            navStructure.forEach(group => {
                const sectionHeader = document.createElement('div');
                sectionHeader.className = 'text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-6 mb-2 px-3';
                sectionHeader.textContent = group.section;
                container.appendChild(sectionHeader);

                group.items.forEach(item => {
                    const btn = document.createElement('button');
                    btn.onclick = () => switchView(item.id, item.label);
                    btn.id = `nav-${item.id}`;
                    btn.className = `w-full flex items-center gap-3 px-3 py-2 rounded-xl text-sm font-medium transition-all ${item.id === 'dashboard' ? 'bg-[#0044ff]/10 text-[#0044ff] font-bold' : 'text-gray-400 hover:bg-gray-800/50 hover:text-white'}`;
                    btn.innerHTML = `<i class="fa-solid ${item.icon} w-5 text-center"></i> <span>${item.label}</span>`;
                    container.appendChild(btn);
                });
            });
        }

        function switchView(viewId, label) {
            state.activeView = viewId;
            state.currentPage = 1;
            state.searchQuery = '';
            state.selectedIds.clear();
            document.getElementById('searchInput').value = '';
            document.getElementById('pageTitle').textContent = label;

            // Update Nav UI
            document.querySelectorAll('#navLinks button').forEach(b => {
                b.className = `w-full flex items-center gap-3 px-3 py-2 rounded-xl text-sm font-medium transition-all text-gray-400 hover:bg-gray-800/50 hover:text-white`;
            });
            const activeBtn = document.getElementById(`nav-${viewId}`);
            if(activeBtn) activeBtn.className = `w-full flex items-center gap-3 px-3 py-2 rounded-xl text-sm transition-all bg-[#0044ff]/10 text-[#0044ff] font-bold`;

            if (window.innerWidth < 1024) toggleSidebar();

            if (viewId === 'dashboard') {
                document.getElementById('tableView').classList.add('hidden');
                document.getElementById('dashboardView').classList.remove('hidden');
                loadDashboardStats();
            } else {
                document.getElementById('dashboardView').classList.add('hidden');
                document.getElementById('tableView').classList.remove('hidden');
                fetchTableData();
            }
        }

        // ============================================================================
        // 4. DATA FETCHING (DASHBOARD & TABLE)
        // ============================================================================
        async function loadDashboardStats() {
            try {
                const res = await fetchWithAuth('/admin/dashboard-stats');
                const data = await res.json();
                
                const stats = [
                    { label: 'Active Matrix Nodes', value: data.users || 0, icon: 'fa-users', color: 'blue' },
                    { label: 'Total Deployments', value: data.orders || 0, icon: 'fa-box', color: 'indigo' },
                    { label: 'Pending Operations', value: data.pending_orders || 0, icon: 'fa-clock', color: 'amber' },
                    { label: 'Open Support Vectors', value: data.open_tickets || 0, icon: 'fa-headset', color: 'red' },
                    { label: 'Pending Consultations', value: data.pending_consultations || 0, icon: 'fa-video', color: 'emerald' },
                    { label: 'Enterprise Ledger (Ksh)', value: data.total_earnings || '0.00', icon: 'fa-wallet', color: 'emerald' }
                ];

                const container = document.getElementById('statsGrid');
                container.innerHTML = stats.map(s => `
                    <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm flex items-center gap-4 hover:shadow-md transition-shadow">
                        <div class="w-12 h-12 rounded-xl flex items-center justify-center bg-${s.color}-50 text-${s.color}-500 shrink-0">
                            <i class="fa-solid ${s.icon} text-xl"></i>
                        </div>
                        <div class="min-w-0">
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest truncate">${s.label}</p>
                            <p class="text-xl font-extrabold text-gray-900 font-mono truncate">${s.value}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error("Stats fail:", err); }
        }

        async function fetchTableData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = `<tr><td colspan="10" class="text-center py-10"><div class="loader mx-auto"></div></td></tr>`;
            
            try {
                const url = `/admin/${state.activeView}?page=${state.currentPage}&limit=15&search=${encodeURIComponent(state.searchQuery)}`;
                const res = await fetchWithAuth(url);
                const result = await res.json();
                
                if (res.ok) {
                    state.tableData = result.data || [];
                    state.totalRecords = result.total || 0;
                    renderTable();
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="10" class="text-center py-8 text-red-500 font-bold text-sm"><i class="fa-solid fa-triangle-exclamation mr-2"></i> ${err.message || 'Fetch error'}</td></tr>`;
            }
        }

        function renderTable() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            document.getElementById('pageIndicator').textContent = `Page ${state.currentPage}`;
            updateBulkDeleteBtn();

            if (state.tableData.length === 0) {
                thead.innerHTML = '';
                tbody.innerHTML = `<tr><td colspan="10" class="text-center py-12 text-gray-400 font-mono text-sm"><i class="fa-solid fa-folder-open text-3xl mb-3 block text-gray-300"></i> No matrix parameters found matching query.</td></tr>`;
                return;
            }

            // Exclude noise columns
            const excludeCols = ['password', 'is_deleted', 'created_at', 'updated_at', 'sender_wrapped_key', 'receiver_wrapped_key', 'iv', 'ciphertext'];
            const columns = Object.keys(state.tableData[0]).filter(c => !excludeCols.includes(c));

            // Render Header
            let headHTML = `<tr><th scope="col" class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider w-10">
                <input type="checkbox" onchange="toggleAllBulk(this)" class="rounded border-gray-300 text-[#0044ff] focus:ring-[#0044ff]">
            </th>`;
            columns.forEach(col => {
                headHTML += `<th scope="col" class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">${col.replace(/_/g, ' ')}</th>`;
            });
            headHTML += `<th scope="col" class="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Matrix Actions</th></tr>`;
            thead.innerHTML = headHTML;

            // Render Rows
            let bodyHTML = '';
            state.tableData.forEach(row => {
                const isSelected = state.selectedIds.has(row.id);
                bodyHTML += `<tr class="${isSelected ? 'bg-blue-50/50' : 'hover:bg-gray-50/50 transition-colors'}">`;
                bodyHTML += `<td class="px-6 py-4 whitespace-nowrap">
                    <input type="checkbox" value="${row.id}" onchange="toggleBulkSelection(${row.id})" ${isSelected ? 'checked' : ''} class="bulk-cb rounded border-gray-300 text-[#0044ff] focus:ring-[#0044ff]">
                </td>`;
                
                columns.forEach(col => {
                    let val = row[col];
                    if (val === null || val === undefined) val = '-';
                    
                    // Formatting based on content type
                    let cellClass = "text-sm text-gray-700 max-w-xs truncate";
                    if (typeof val === 'boolean' || (typeof val === 'string' && ['pending', 'processing', 'completed', 'active', 'inactive', 'approved'].includes(val.toLowerCase()))) {
                        const isPos = val === true || ['completed', 'active', 'approved'].includes(val.toString().toLowerCase());
                        const badgeColor = isPos ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-amber-100 text-amber-700 border-amber-200';
                        val = `<span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wide border ${badgeColor}">${val}</span>`;
                    } else if (col === 'price' || col === 'amount') {
                        val = `<span class="font-mono text-gray-900 font-bold">Ksh ${parseFloat(val||0).toFixed(2)}</span>`;
                    } else if (String(val).startsWith('http')) {
                        val = `<a href="${val}" target="_blank" class="text-blue-600 hover:underline"><i class="fa-solid fa-link"></i> Link</a>`;
                    }

                    bodyHTML += `<td class="px-6 py-4 whitespace-nowrap ${cellClass}">${val}</td>`;
                });

                bodyHTML += `
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                        <button onclick='openModal(${JSON.stringify(row).replace(/'/g, "&#39;")})' class="text-[#0044ff] hover:text-blue-900 bg-blue-50 px-3 py-1.5 rounded-lg transition-colors"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="deleteRecord(${row.id})" class="text-red-500 hover:text-red-900 bg-red-50 px-3 py-1.5 rounded-lg transition-colors"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = bodyHTML;
        }

        function changePage(delta) {
            const newPage = state.currentPage + delta;
            if (newPage > 0) {
                state.currentPage = newPage;
                fetchTableData();
            }
        }

        // ============================================================================
        // 5. BULK OPERATIONS
        // ============================================================================
        function toggleBulkSelection(id) {
            if (state.selectedIds.has(id)) state.selectedIds.delete(id);
            else state.selectedIds.add(id);
            updateBulkDeleteBtn();
        }

        function toggleAllBulk(checkbox) {
            const cbs = document.querySelectorAll('.bulk-cb');
            if (checkbox.checked) {
                cbs.forEach(cb => { cb.checked = true; state.selectedIds.add(parseInt(cb.value)); });
            } else {
                cbs.forEach(cb => { cb.checked = false; state.selectedIds.clear(); });
            }
            updateBulkDeleteBtn();
        }

        function updateBulkDeleteBtn() {
            const btn = document.getElementById('bulkDeleteBtn');
            document.getElementById('bulkCount').textContent = state.selectedIds.size;
            if (state.selectedIds.size > 0) btn.classList.remove('hidden');
            else btn.classList.add('hidden');
        }

        async function bulkDelete() {
            if (!confirm(`Confirm execution: Purge ${state.selectedIds.size} vectors from the active matrix?`)) return;
            try {
                const res = await fetchWithAuth(`/${state.activeView}/bulk`, {
                    method: 'POST',
                    body: JSON.stringify({ ids: Array.from(state.selectedIds), action: 'delete' })
                });
                if (res.ok) {
                    showToast("Bulk structural purge successful.");
                    state.selectedIds.clear();
                    fetchTableData();
                } else throw new Error((await res.json()).error);
            } catch(e) { showToast(e.message, "error"); }
        }

        // ============================================================================
        // 6. DYNAMIC FORM & CRUD LOGIC
        // ============================================================================
        function openModal(record = null) {
            state.currentEditId = record ? record.id : null;
            document.getElementById('modalTitle').textContent = record ? `Modify Reference: [ID-${record.id}]` : `Initialize New Vector`;
            
            const form = document.getElementById('entityForm');
            const schema = tableSchemas[state.activeView] || [];
            
            let html = '';
            schema.forEach(col => {
                const value = record ? (record[col] !== null ? record[col] : '') : '';
                html += `
                    <div class="${['description', 'content', 'project_details', 'message', 'review', 'challenge', 'solution'].includes(col) ? 'col-span-1 sm:col-span-2' : 'col-span-1'}">
                        <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5 font-mono">${col.replace(/_/g, ' ')}</label>
                        ${buildInputMarkup(col, value)}
                    </div>
                `;
            });
            
            form.innerHTML = html;
            document.getElementById('entityModal').classList.remove('hidden');
        }

        function buildInputMarkup(key, val) {
            const baseClass = "w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-900 focus:outline-none focus:border-[#0044ff] focus:ring-1 focus:ring-[#0044ff] transition-colors";
            
            // 1. Relational Selects
            if (key === 'user_id' || key === 'client_id' || key === 'author_id') return generateSelect(key, val, state.relationCache.users, 'id', 'name');
            if (key === 'service_id') return generateSelect(key, val, state.relationCache.services, 'id', 'name');
            if (key === 'order_id') return generateSelect(key, val, state.relationCache.orders, 'id', 'customer_name');
            
            // 2. Pre-defined Selects
            if (key.includes('status')) {
                const opts = ['pending', 'processing', 'completed', 'active', 'inactive', 'approved', 'rejected', 'open', 'closed'];
                return generateSimpleSelect(key, val, opts);
            }
            if (key === 'role') return generateSimpleSelect(key, val, ['admin', 'client']);
            if (key.startsWith('is_')) return generateSimpleSelect(key, String(val), ['true', 'false']);
            
            // 3. Textareas
            if (['description', 'content', 'summary', 'project_details', 'message', 'review', 'challenge', 'solution', 'result'].includes(key)) {
                return `<textarea name="${key}" rows="4" class="${baseClass} resize-y">${val}</textarea>`;
            }

            // 4. Default Inputs
            const type = (key === 'price' || key === 'amount') ? 'number' : (key.includes('email') ? 'email' : (key === 'password' ? 'password' : 'text'));
            const step = type === 'number' ? 'step="0.01"' : '';
            return `<input type="${type}" name="${key}" value="${val}" ${step} class="${baseClass}">`;
        }

        function generateSelect(name, currentVal, optionsArray, valKey, labelKey) {
            let html = `<select name="${name}" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-900 focus:outline-none focus:border-[#0044ff] focus:ring-1 focus:ring-[#0044ff] transition-colors">`;
            html += `<option value="">[ Null Reference ]</option>`;
            optionsArray.forEach(opt => {
                const selected = String(opt[valKey]) === String(currentVal) ? 'selected' : '';
                html += `<option value="${opt[valKey]}" ${selected}>[ID:${opt[valKey]}] ${opt[labelKey]}</option>`;
            });
            return html + `</select>`;
        }

        function generateSimpleSelect(name, currentVal, strings) {
            let html = `<select name="${name}" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-900 focus:outline-none focus:border-[#0044ff] focus:ring-1 focus:ring-[#0044ff] transition-colors capitalize">`;
            strings.forEach(opt => {
                const selected = String(opt).toLowerCase() === String(currentVal).toLowerCase() ? 'selected' : '';
                html += `<option value="${opt}" ${selected}>${opt}</option>`;
            });
            return html + `</select>`;
        }

        function closeModal() {
            document.getElementById('entityModal').classList.add('hidden');
        }

        async function saveRecord() {
            const form = document.getElementById('entityForm');
            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());
            
            // Clean up empty relation IDs so they send as NULL instead of empty strings
            Object.keys(payload).forEach(k => {
                if(k.endsWith('_id') && payload[k] === '') payload[k] = null;
                if(payload[k] === 'true') payload[k] = true;
                if(payload[k] === 'false') payload[k] = false;
            });

            const btn = document.getElementById('saveBtn');
            const ogText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
            btn.disabled = true;

            const url = state.currentEditId ? `/admin/${state.activeView}/${state.currentEditId}` : `/admin/${state.activeView}`;
            const method = state.currentEditId ? 'PUT' : 'POST';

            try {
                const res = await fetchWithAuth(url, { method, body: JSON.stringify(payload) });
                const result = await res.json();
                
                if (res.ok) {
                    showToast(`Matrix configuration successfully ${state.currentEditId ? 'updated' : 'initialized'}.`);
                    closeModal();
                    fetchTableData();
                    if(state.activeView === 'users' || state.activeView === 'services' || state.activeView === 'orders') preloadRelations();
                } else throw new Error(result.error || "System rejected payload vector.");
            } catch(e) {
                showToast(e.message, "error");
            } finally {
                btn.innerHTML = ogText;
                btn.disabled = false;
            }
        }

        async function deleteRecord(id) {
            if (!confirm(`Warning: You are about to permanently deactivate Node ID [${id}]. Proceed?`)) return;
            try {
                const res = await fetchWithAuth(`/admin/${state.activeView}/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast("Node deactivation complete.");
                    fetchTableData();
                } else {
                    const result = await res.json();
                    throw new Error(result.error);
                }
            } catch(e) { showToast(e.message, "error"); }
        }

        // Execute boot sequence
        window.onload = init;
    </script>
</body>
</html>
