        // ==========================================
        // NOTIFICATIONS & UTILITIES
        // ==========================================
        function pushSystemOperationalToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const icons = { success: 'fa-circle-check text-emerald-500', error: 'fa-triangle-exclamation text-brand-red', info: 'fa-circle-info text-brand-blue' };
            const borders = { success: 'border-emerald-200 bg-emerald-50 text-emerald-900', error: 'border-red-200 bg-red-50 text-red-900', info: 'border-blue-200 bg-blue-50 text-blue-900' };
            
            toast.className = `p-4 rounded-xl shadow-lg border text-xs font-mono font-bold flex items-center gap-3 transition-all transform translate-y-2 opacity-0 duration-300 ${borders[type]}`;
            toast.innerHTML = `<i class="fa-solid ${icons[type]} text-lg"></i> <span class="flex-1">${msg}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-y-2', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('translate-y-[-10px]', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 4500);
        }

        // ==========================================
        // AUTHENTICATION PROTOCOLS
        // ==========================================
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem(TOKEN_KEY);
            if (token) {
                // Decode JWT Base64 blindly (Validation happens via APIs)
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if (payload.role !== 'admin') throw new Error("Clearance denied.");
                    document.getElementById('authAdminName').innerText = payload.name || 'Admin';
                    unlockDashboard();
                } catch (e) {
                    executeLogoutSequence(false);
                }
            } else {
                document.getElementById('loginOverlay').classList.remove('hidden');
            }
        });

        async function handleAdminLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const form = new FormData(e.target);
            btn.innerHTML = '<div class="loader-ring w-4 h-4 mr-2"></div> Processing...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(Object.fromEntries(form.entries()))
                });

                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.message || data.error || "Authentication blocked.");
                
                if (data.user.role !== 'admin') throw new Error("Clearance Level Insufficient. Admin privileges required.");

                localStorage.setItem(TOKEN_KEY, data.token);
                document.getElementById('authAdminName').innerText = data.user.name;
                pushSystemOperationalToast("Administrative session lock established.", "success");
                
                unlockDashboard();
            } catch (err) {
                pushSystemOperationalToast(err.message, "error");
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-lock text-emerald-400"></i> Authenticate Session';
                btn.disabled = false;
            }
        }

        function unlockDashboard() {
            const overlay = document.getElementById('loginOverlay');
            overlay.classList.add('opacity-0');
            setTimeout(() => {
                overlay.classList.add('hidden');
                document.getElementById('dashboardInterface').classList.remove('opacity-0', 'pointer-events-none');
                switchModule('dashboard');
            }, 500);
        }

        function executeLogoutSequence(showToast = true) {
            localStorage.removeItem(TOKEN_KEY);
            if(showToast) pushSystemOperationalToast("Terminating secure connection...", "info");
            setTimeout(() => { window.location.reload(); }, 800);
        }

        // ==========================================
        // SECURE API FETCHER
        // ==========================================
        async function fetchSecure(endpoint, method = 'GET', body = null, isMultipart = false) {
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) { executeLogoutSequence(); throw new Error("Unauthorized"); }

            let headers = { 'Authorization': `Bearer ${token}` };
            if (!isMultipart && body) headers['Content-Type'] = 'application/json';

            const url = endpoint.startsWith('http') ? endpoint : `${API_BASE}/api/${endpoint.replace(/^\//, '')}`;
            
            const config = { method, headers };
            if (body) config.body = isMultipart ? body : JSON.stringify(body);

            const res = await fetch(url, config);
            
            if (res.status === 401 || res.status === 403) { executeLogoutSequence(); throw new Error("Clearance breach."); }
            if (!res.ok) {
                const fault = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
                throw new Error(fault.error || fault.message || "Pipeline execution failed.");
            }
            if (method === 'DELETE' || res.status === 204) return { success: true };
            if (res.headers.get("content-type")?.includes("application/pdf")) return await res.blob();
            
            return await res.json();
        }

        // ==========================================

            appState.module = moduleKey;
            document.querySelectorAll('.nav-btn').forEach(b => {

            const activeNav = document.getElementById(`nav-${moduleKey}`);
            if(activeNav) activeNav.className = "nav-btn active-nav w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold font-mono uppercase tracking-wider transition-all bg-brand-blue text-white shadow-sm shadow-blue-200";

            const title = document.getElementById('activeWorkspaceTitle');
            const subtitle = document.getElementById('activeWorkspaceSubtitle');
            const actions = document.getElementById('workspaceContextualActions');
            actions.innerHTML = '';

            if (moduleKey === 'dashboard') {
                title.innerText = "Dashboard Hub";
                subtitle.innerText = "System telemetry and active matrix operational nodes.";
                renderDashboardAnalytics();

                title.innerText = "Mass Broadcast Pipeline";

        // ==========================================
        // DYNAMIC CRUD GRID PIPELINES
        // ==========================================
        async function refreshDataGrid() {
            const vp = document.getElementById('workspaceContentViewport');
            const meta = MODULE_REGISTRY[appState.module];
            vp.innerHTML = `<div class="flex items-center justify-center py-20"><div class="loader-ring"></div></div>`;
            
            try {
                const response = await fetchSecure(meta.endpoint);
                appState.cachedRecords = Array.isArray(response) ? response : (response.data || []);
                
                if (appState.cachedRecords.length === 0) {
                    vp.innerHTML = `<div class="text-center p-12 border border-dashed border-slate-300 rounded-2xl bg-slate-50 text-xs font-mono text-slate-400">Database table array index returned empty for this domain node.</div>`;
                    return;
                }

                let html = `<div class="bg-white border border-brand-borderSlate rounded-2xl shadow-sm overflow-hidden"><div class="overflow-x-auto custom-scrollbar"><table class="w-full text-left whitespace-nowrap"><thead><tr class="bg-slate-50 border-b border-brand-borderSlate">`;
                meta.columns.forEach(col => { html += `<th class="px-6 py-4 text-[10px] font-extrabold font-mono uppercase tracking-widest text-slate-500">${col.replace(/_/g, ' ')}</th>`; });
                html += `<th class="px-6 py-4 text-[10px] font-extrabold font-mono uppercase tracking-widest text-slate-500 text-right">Node Controls</th></tr></thead><tbody class="divide-y divide-slate-100 text-xs font-medium text-slate-700">`;

                appState.cachedRecords.forEach(r => {
                    html += `<tr class="hover:bg-slate-50/70 transition-colors">`;
                    meta.columns.forEach(col => {
                        let val = r[col] !== undefined && r[col] !== null ? r[col] : '-';
                        if (typeof val === 'boolean') val = val ? `<span class="text-emerald-500 font-bold uppercase tracking-wider text-[10px]">TRUE</span>` : `<span class="text-slate-400 font-bold uppercase tracking-wider text-[10px]">FALSE</span>`;
                        else if (col.includes('price') || col.includes('amount')) val = `KES ${Number(val).toLocaleString()}`;
                        else if (String(val).length > 35) val = String(val).substring(0, 35) + '...';
                        html += `<td class="px-6 py-3 font-sans">${val}</td>`;
                    });
                    html += `<td class="px-6 py-3 text-right flex justify-end gap-2">
                        ${appState.module === 'invoices' ? `<button onclick="downloadPDF(${r.id})" class="w-8 h-8 rounded-lg bg-blue-50 text-brand-blue hover:bg-brand-blue hover:text-white transition-colors" title="Download Invoice"><i class="fa-solid fa-file-pdf"></i></button>` : ''}
                        <button onclick="openActionModal('edit', ${r.id})" class="w-8 h-8 rounded-lg bg-orange-50 text-brand-orange hover:bg-brand-orange hover:text-white transition-colors" title="Modify Node"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="executeDelete(${r.id})" class="w-8 h-8 rounded-lg bg-red-50 text-brand-red hover:bg-brand-red hover:text-white transition-colors" title="Purge Record"><i class="fa-solid fa-trash-can"></i></button>
                    </td></tr>`;
                });
                html += `</tbody></table></div></div>`;
                vp.innerHTML = html;
            } catch (err) { vp.innerHTML = `<div class="p-6 bg-red-50 text-brand-red rounded-xl text-xs font-mono border border-red-200">Grid fetch block failure: ${err.message}</div>`; }
        }

        // ==========================================
        // DYNAMIC FORM MODAL ENGINE
        // ==========================================
        function openActionModal(mode, id = null) {
            appState.mode = mode; appState.activeId = id;
            const meta = MODULE_REGISTRY[appState.module];
            const record = mode === 'edit' ? appState.cachedRecords.find(x => x.id === id) : null;
            
            document.getElementById('modalInterfaceTitle').innerHTML = `<i class="fa-solid fa-database text-brand-blue mr-2"></i> ${mode === 'create' ? 'Append' : 'Modify'} ${meta.label} Schema Node ${id ? '#'+id : ''}`;
            const stack = document.getElementById('dynamicFormFieldsStack');
            stack.innerHTML = '';
            
            meta.fields.forEach(f => {
                let val = record && record[f.name] !== undefined && record[f.name] !== null ? record[f.name] : '';
                let req = (f.required && mode === 'create') ? 'required' : '';
                if (f.type === 'password' && mode === 'edit') req = ''; // Prevent forcing password updates on user edit

                let inputHtml = '';
                const baseClass = "w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs text-slate-800 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all";

                if (f.type === 'textarea') inputHtml = `<textarea name="${f.name}" ${req} class="${baseClass} h-24 font-sans">${val}</textarea>`;
                else if (f.type === 'select') {
                    inputHtml = `<select name="${f.name}" ${req} class="${baseClass} font-mono">` + 
                        f.options.map(o => `<option value="${o}" ${String(val) === String(o) ? 'selected' : ''}>${o}</option>`).join('') + 
                    `</select>`;
                } else {
                    inputHtml = `<input type="${f.type}" name="${f.name}" value="${f.type==='password'?'':val}" ${req} class="${baseClass} font-mono">`;
                }

                stack.insertAdjacentHTML('beforeend', `<div class="${f.type === 'textarea' ? 'md:col-span-2' : ''} flex flex-col gap-1.5"><label class="text-[10px] font-extrabold uppercase tracking-widest text-slate-500">${f.label} ${req ? '<span class="text-brand-red">*</span>':''}</label>${inputHtml}</div>`);
            });

            const portal = document.getElementById('structuralActionModalPortal');
            portal.classList.remove('hidden'); setTimeout(() => { portal.classList.remove('opacity-0'); portal.firstElementChild.classList.remove('scale-95'); }, 10);
        }

        async function executeWriteSubmitPipeline(e) {
            e.preventDefault();
            const meta = MODULE_REGISTRY[appState.module];
            const btn = document.getElementById('submitActionButtonText');
            btn.disabled = true; btn.innerHTML = '<div class="loader-ring w-4 h-4 mr-2 inline-block align-middle"></div> Writing...';
            
            try {
                // Ensure correct HTTP Method and endpoint per explicit definition logic in server.js
                let method = appState.mode === 'create' ? 'POST' : 'PUT';
                let endpoint = appState.mode === 'create' ? meta.endpoint : `${meta.endpoint}/${appState.activeId}`;
                
                const formData = new FormData(e.target);
                const jsonPayload = Object.fromEntries(formData.entries());

                if (appState.mode === 'edit' && jsonPayload.password === '') delete jsonPayload.password;

                await fetchSecure(endpoint, method, jsonPayload);
                pushSystemOperationalToast(`Row node schema operation successful.`, "success");
                closeActiveModalWindow(); refreshDataGrid();
            } catch (err) { pushSystemOperationalToast(err.message, "error"); }
            finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-hard-drive mr-2"></i> Commit Data Write'; }
        }

        async function executeDelete(id) {
            if(!confirm("Initialize bulk array target purge for this row?")) return;
            const meta = MODULE_REGISTRY[appState.module];
            try {
                // Implementing specific DELETE routes or using the bulk handler
                // `server.js` contains `app.delete('/api/users/:id')`, `/api/services/:id`, etc.
                await fetchSecure(`${meta.endpoint}/${id}`, 'DELETE');
                pushSystemOperationalToast("Structural vector safely decommissioned.");
                refreshDataGrid();
            } catch (err) { pushSystemOperationalToast(err.message, "error"); }
        }

        async function downloadPDF(id) {
            pushSystemOperationalToast("Retrieving PDF binary chunks...", "info");
            try {
                const blob = await fetchSecure(`invoices/${id}/download`, 'GET');
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `Invoice_Record_${id}.pdf`;
                document.body.appendChild(a); a.click(); a.remove(); window.URL.revokeObjectURL(url);
                pushSystemOperationalToast("Download pipeline concluded.", "success");
            } catch (e) { pushSystemOperationalToast("PDF Extraction Failed.", "error"); }
        }
