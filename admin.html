<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAN74TECH MEDIA | Master Operations Console</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-blue: #0044ff;
            --brand-red: #ff2a2a;
            --brand-yellow: #ffd700;
            --bg-light: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #475569;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            overflow: hidden;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Animations & FX */
        .subtle-pulse-glow {
            box-shadow: 0 0 25px rgba(0, 68, 255, 0.1);
            animation: pulseGlow 4s ease-in-out infinite alternate;
        }
        @keyframes pulseGlow {
            0% { transform: translateY(0px); box-shadow: 0 0 25px rgba(0, 68, 255, 0.08); }
            100% { transform: translateY(-4px); box-shadow: 0 0 35px rgba(255, 42, 42, 0.12); }
        }

        /* Glassmorphism Auth */
        #auth-overlay {
            background: radial-gradient(circle at 50% 50%, rgba(248, 250, 252, 0.95), rgba(226, 232, 240, 0.98));
            backdrop-filter: blur(10px);
        }

        .toast-notification { animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Sidebar & Table Hover Transitions */
        .sidebar-link { transition: all 0.2s ease; border-left: 3px solid transparent; }
        .sidebar-link:hover { background-color: rgba(0, 68, 255, 0.05); color: var(--brand-blue); }
        .sidebar-link.active { 
            background-color: rgba(0, 68, 255, 0.08); 
            color: var(--brand-blue); 
            border-left-color: var(--brand-blue); 
            font-weight: 700;
        }
        tr:hover td { background-color: rgba(0, 68, 255, 0.02); }
    </style>
</head>
<body class="antialiased selection:bg-[#0044ff] selection:text-white h-screen flex">

    <div id="toast-container" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3 max-w-md w-full pointer-events-none"></div>

    <div id="auth-overlay" class="fixed inset-0 z-[10000] flex items-center justify-center transition-opacity duration-300">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-200 max-w-md w-full subtle-pulse-glow text-center mx-4">
            <div class="w-16 h-16 rounded-xl bg-gradient-to-br from-[#0044ff] to-[#ff2a2a] p-[2px] mx-auto mb-4">
                <div class="w-full h-full bg-white rounded-[10px] flex items-center justify-center overflow-hidden">
                    <span class="font-mono font-bold text-[#0f172a]">D74</span>
                </div>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight text-gray-900 font-mono">COMMAND NODE</h1>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1 mb-8">System Administrator Login</p>
            
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4 text-left">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 font-mono">Operator Email</label>
                    <input type="email" id="auth-email" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-[#0044ff] focus:ring-1 focus:ring-[#0044ff] transition-all font-mono">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 font-mono">Cryptographic Key</label>
                    <input type="password" id="auth-password" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-[#0044ff] focus:ring-1 focus:ring-[#0044ff] transition-all font-mono">
                </div>
                <button type="submit" id="auth-btn" class="w-full py-3 bg-[#0044ff] text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition-colors shadow-md shadow-blue-500/20 mt-2 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-shield-halved"></i> Establish Uplink
                </button>
            </form>
        </div>
    </div>

    <div id="app-layout" class="w-full h-full flex hidden opacity-0 transition-opacity duration-500">
        
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col flex-shrink-0 z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
            <div class="h-16 flex items-center gap-3 px-6 border-b border-gray-100">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-[#0044ff] to-[#ff2a2a] p-[1.5px]">
                    <div class="w-full h-full bg-white rounded-[6px] flex items-center justify-center">
                        <i class="fa-solid fa-server text-[#0f172a] text-xs"></i>
                    </div>
                </div>
                <div class="flex flex-col leading-none">
                    <span class="text-sm font-extrabold text-[#0f172a] font-mono tracking-tight">HQ<span class="text-[#0044ff]">.</span>MATRIX</span>
                    <span class="text-[8px] font-bold text-emerald-500 uppercase tracking-widest mt-0.5">Systems Online</span>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="sidebar-menu">
                </div>

            <div class="p-4 border-t border-gray-100">
                <button onclick="handleLogout()" class="w-full py-2.5 px-4 bg-red-50 text-[#ff2a2a] rounded-lg text-xs font-bold hover:bg-[#ff2a2a] hover:text-white transition-colors border border-red-100 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-power-off"></i> Terminate Session
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
            <header class="h-16 bg-white/80 backdrop-blur-md border-b border-gray-200 flex items-center justify-between px-8 sticky top-0 z-10">
                <div class="flex items-center gap-3">
                    <h2 id="view-title" class="text-lg font-extrabold text-gray-900 tracking-tight">Dashboard Overview</h2>
                    <span id="view-badge" class="px-2 py-0.5 rounded bg-blue-50 border border-blue-100 text-[9px] font-mono font-bold text-[#0044ff] uppercase tracking-widest">Core</span>
                </div>
                <div class="flex items-center gap-4 text-sm font-mono text-gray-500">
                    <div class="hidden md:flex items-center gap-1.5">
                        <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span class="text-[10px] font-bold tracking-widest uppercase">Database Active</span>
                    </div>
                    <div class="h-6 w-px bg-gray-200"></div>
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 border border-gray-200">
                            <i class="fa-solid fa-user-astronaut text-xs"></i>
                        </div>
                        <div class="text-xs font-bold text-gray-800" id="header-user-name">Admin</div>
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8 relative">
                
                <div id="view-dashboard" class="view-panel active space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex items-center justify-between group hover:border-[#0044ff] transition-colors">
                            <div>
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 font-mono">Gross Earnings</p>
                                <h3 class="text-2xl font-extrabold text-gray-900 font-mono tracking-tight" id="stat-earnings">$0.00</h3>
                            </div>
                            <div class="w-12 h-12 rounded-lg bg-emerald-50 text-emerald-500 flex items-center justify-center text-xl group-hover:scale-110 transition-transform"><i class="fa-solid fa-sack-dollar"></i></div>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex items-center justify-between group hover:border-[#0044ff] transition-colors">
                            <div>
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 font-mono">Pipeline Orders</p>
                                <h3 class="text-2xl font-extrabold text-gray-900 font-mono tracking-tight" id="stat-orders">0</h3>
                            </div>
                            <div class="w-12 h-12 rounded-lg bg-blue-50 text-[#0044ff] flex items-center justify-center text-xl group-hover:scale-110 transition-transform"><i class="fa-solid fa-layer-group"></i></div>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex items-center justify-between group hover:border-[#ffd700] transition-colors">
                            <div>
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 font-mono">Pending Briefings</p>
                                <h3 class="text-2xl font-extrabold text-gray-900 font-mono tracking-tight" id="stat-consults">0</h3>
                            </div>
                            <div class="w-12 h-12 rounded-lg bg-amber-50 text-amber-500 flex items-center justify-center text-xl group-hover:scale-110 transition-transform"><i class="fa-solid fa-calendar-check"></i></div>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex items-center justify-between group hover:border-[#ff2a2a] transition-colors">
                            <div>
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 font-mono">Open Tickets</p>
                                <h3 class="text-2xl font-extrabold text-gray-900 font-mono tracking-tight" id="stat-tickets">0</h3>
                            </div>
                            <div class="w-12 h-12 rounded-lg bg-red-50 text-[#ff2a2a] flex items-center justify-center text-xl group-hover:scale-110 transition-transform"><i class="fa-solid fa-triangle-exclamation"></i></div>
                        </div>
                    </div>
                </div>

                <div id="view-datagrid" class="view-panel hidden space-y-4">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div class="relative w-full md:w-96">
                            <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                            <input type="text" id="grid-search" class="w-full pl-9 pr-4 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-[#0044ff] focus:ring-1 focus:ring-[#0044ff] transition-all font-mono" placeholder="Query matrix records...">
                        </div>
                        <div class="flex gap-2">
                            <button onclick="refreshDataGrid()" class="px-3 py-2 bg-white border border-gray-200 text-gray-600 rounded-lg text-xs font-bold hover:bg-gray-50 transition-colors shadow-sm">
                                <i class="fa-solid fa-rotate-right"></i>
                            </button>
                            <button id="btn-create-record" class="px-4 py-2 bg-[#0044ff] text-white rounded-lg text-xs font-bold hover:bg-blue-700 transition-colors shadow-sm shadow-blue-500/20 flex items-center gap-2">
                                <i class="fa-solid fa-plus"></i> Inject New Record
                            </button>
                        </div>
                    </div>
                    
                    <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden flex flex-col">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-gray-50 border-b border-gray-200" id="grid-head"></thead>
                                <tbody class="divide-y divide-gray-100" id="grid-body"></tbody>
                            </table>
                        </div>
                        <div class="p-4 border-t border-gray-100 bg-gray-50 flex justify-between items-center text-xs font-mono text-gray-500">
                            <span id="grid-count">Displaying 0 records</span>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="form-modal" class="fixed inset-0 z-[1000] bg-black/40 backdrop-blur-sm hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl border border-gray-100 w-full max-w-2xl max-h-[90vh] flex flex-col transform scale-95 transition-transform duration-300" id="form-modal-content">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 rounded-t-xl">
                <div>
                    <h3 class="text-sm font-extrabold text-gray-900 font-mono tracking-tight" id="modal-title">Record Injection</h3>
                    <p class="text-[10px] text-gray-500 font-mono uppercase tracking-widest mt-0.5" id="modal-subtitle">Schema Matrix Editor</p>
                </div>
                <button onclick="closeModal()" class="w-8 h-8 rounded-md bg-white border border-gray-200 text-gray-500 hover:text-gray-900 hover:bg-gray-100 transition-colors flex items-center justify-center">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 custom-scrollbar">
                <form id="dynamic-form" onsubmit="handleFormSubmit(event)" class="space-y-4"></form>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 rounded-b-xl flex justify-end gap-2">
                <button type="button" onclick="closeModal()" class="px-4 py-2 bg-white border border-gray-200 text-gray-700 rounded-lg text-xs font-bold hover:bg-gray-100 transition-colors shadow-sm">Cancel</button>
                <button type="submit" form="dynamic-form" id="btn-submit-form" class="px-6 py-2 bg-[#0044ff] text-white rounded-lg text-xs font-bold hover:bg-blue-700 transition-colors shadow-sm shadow-blue-500/20">Execute Write</button>
            </div>
        </div>
    </div>

    <script>
        const API_HOST = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1') ? 'http://localhost:10000' : window.location.origin;

        // === 1. GLOBAL STATE & CONFIGURATION ===
        let currentModule = 'dashboard';
        let currentGridData = [];
        let editingRecordId = null;

        // Schema Config reflecting all 17 tables from the DOCX & server.js
        const MODULE_REGISTRY = {
            users: { icon: 'fa-users', title: 'Security Nodes', endpoint: '/api/users', dbTable: 'users', fields: [
                { name: 'name', type: 'text', label: 'Identity Name', required: true },
                { name: 'email', type: 'email', label: 'Email Node', required: true },
                { name: 'phone', type: 'text', label: 'Comm Link' },
                { name: 'role', type: 'select', label: 'Clearance Level', options: ['client', 'admin'], required: true },
                { name: 'password', type: 'password', label: 'Override Key (Leave blank to keep)' }
            ], columns: ['id', 'name', 'email', 'role', 'phone'] },
            
            services: { icon: 'fa-server', title: 'Core Services', endpoint: '/api/services', dbTable: 'services', fields: [
                { name: 'name', type: 'text', label: 'Capability Name', required: true },
                { name: 'icon', type: 'text', label: 'FontAwesome Icon Class', required: true },
                { name: 'description', type: 'textarea', label: 'Technical Description' }
            ], columns: ['id', 'icon', 'name', 'description'] },
            
            sub_services: { icon: 'fa-layer-group', title: 'Sub-Packages', endpoint: '/api/sub-services', dbTable: 'sub_services', fields: [
                { name: 'service_id', type: 'number', label: 'Parent Service ID', required: true },
                { name: 'name', type: 'text', label: 'Package Designation', required: true },
                { name: 'price', type: 'number', label: 'Base Pricing Float', required: true },
                { name: 'description', type: 'textarea', label: 'Specifications' }
            ], columns: ['id', 'category_name', 'name', 'price'] },
            
            orders: { icon: 'fa-cart-shopping', title: 'Orders Pipeline', endpoint: '/api/orders', dbTable: 'orders', fields: [
                { name: 'customer_name', type: 'text', label: 'Customer Name', required: true },
                { name: 'phone', type: 'text', label: 'Phone', required: true },
                { name: 'service', type: 'text', label: 'Core Service', required: true },
                { name: 'sub_service', type: 'text', label: 'Package Variant' },
                { name: 'price', type: 'number', label: 'Override Float Price' },
                { name: 'status', type: 'select', label: 'Operational Status', options: ['pending', 'processing', 'completed', 'cancelled'] },
                { name: 'payment_status', type: 'select', label: 'Ledger Status', options: ['unpaid', 'partial', 'paid', 'refunded'] }
            ], columns: ['id', 'customer_name', 'service', 'price', 'status', 'payment_status'] },
            
            portfolio: { icon: 'fa-briefcase', title: 'Portfolio Array', endpoint: '/api/portfolio', dbTable: 'portfolio', hasFiles: true, fields: [
                { name: 'title', type: 'text', label: 'Project Alias', required: true },
                { name: 'category', type: 'text', label: 'Architecture Category', required: true },
                { name: 'description', type: 'textarea', label: 'Execution Notes' },
                { name: 'image', type: 'file', label: 'Thumbnail Binary (File)' },
                { name: 'link', type: 'text', label: 'External Asset Link' },
                { name: 'progress', type: 'number', label: 'Completion %', value: '100' },
                { name: 'status', type: 'select', label: 'Display Status', options: ['In Progress', 'Completed'] }
            ], columns: ['id', 'title', 'category', 'progress', 'status'] },
            
            case_studies: { icon: 'fa-chart-line', title: 'Case Chronicles', endpoint: '/api/case-studies', dbTable: 'case_studies', fields: [
                { name: 'title', type: 'text', label: 'Log Headline', required: true },
                { name: 'category', type: 'text', label: 'Sector' },
                { name: 'challenge', type: 'textarea', label: 'Constraints' },
                { name: 'solution', type: 'textarea', label: 'Architectural Solution' },
                { name: 'result', type: 'textarea', label: 'Data Metrics Outcome' },
                { name: 'image_url', type: 'text', label: 'Remote Image Path' }
            ], columns: ['id', 'title', 'category'] },
            
            testimonials: { icon: 'fa-comment-dots', title: 'Audit Appraisals', endpoint: '/api/testimonials', dbTable: 'testimonials', fields: [
                { name: 'client_name', type: 'text', label: 'Originator Name', required: true },
                { name: 'company', type: 'text', label: 'Corporate Entity' },
                { name: 'rating', type: 'number', label: 'Metric Score (1-5)' },
                { name: 'review', type: 'textarea', label: 'Raw Feedback' },
                { name: 'status', type: 'select', label: 'Routing State', options: ['pending', 'approved'] },
                { name: 'is_featured', type: 'select', label: 'Pin to Front', options: ['false', 'true'] }
            ], columns: ['id', 'client_name', 'rating', 'status', 'is_featured'] },
            
            blog_posts: { icon: 'fa-pen-nib', title: 'Insight Nodes', endpoint: '/api/blog', dbTable: 'blog_posts', fields: [
                { name: 'title', type: 'text', label: 'Headline Title', required: true },
                { name: 'category', type: 'text', label: 'Topic Vector' },
                { name: 'slug', type: 'text', label: 'URL Routing Slug', required: true },
                { name: 'summary', type: 'textarea', label: 'Brief' },
                { name: 'content', type: 'textarea', label: 'HTML Payload', required: true },
                { name: 'image_url', type: 'text', label: 'Header Graphic URL' },
                { name: 'seo_title', type: 'text', label: 'SEO Title Override' },
                { name: 'seo_description', type: 'text', label: 'SEO Description' }
            ], columns: ['id', 'title', 'category', 'slug'] },
            
            subscribers: { icon: 'fa-users-line', title: 'Target Vectors', endpoint: '/api/subscribers', dbTable: 'subscribers', fields: [
                { name: 'email', type: 'email', label: 'Node Address', required: true },
                { name: 'status', type: 'select', label: 'Pipeline State', options: ['active', 'unsubscribed'] }
            ], columns: ['id', 'email', 'status', 'created_at'] },

            broadcast: { icon: 'fa-paper-plane', title: 'Mass Transmission', endpoint: '/api/subscribers/broadcast', methodOverride: 'POST', fields: [
                { name: 'subject', type: 'text', label: 'Transmission Header Vector', required: true },
                { name: 'message', type: 'textarea', label: 'Fallback Plain Text' },
                { name: 'html', type: 'textarea', label: 'HTML Payload Container', required: true }
            ], columns: [] }, 
            
            media_library: { icon: 'fa-photo-film', title: 'Asset Network', endpoint: '/api/media', dbTable: 'media_library', hasFiles: true, fields: [
                { name: 'file', type: 'file', label: 'Binary Object Injection', required: true }
            ], overridePostEndpoint: '/api/media/upload', columns: ['id', 'filename', 'format', 'bytes', 'url'] }, 
            
            invoices: { icon: 'fa-file-invoice-dollar', title: 'Financial Ledgers', endpoint: '/api/invoices', dbTable: 'invoices', fields: [
                { name: 'order_id', type: 'number', label: 'Linked Order Matrix ID' },
                { name: 'invoice_number', type: 'text', label: 'Ledger Hash ID', required: true },
                { name: 'client_name', type: 'text', label: 'Billed Target', required: true },
                { name: 'amount', type: 'number', label: 'Total Float', required: true },
                { name: 'status', type: 'select', label: 'Clearance Status', options: ['unpaid', 'paid', 'cancelled'] }
            ], columns: ['id', 'invoice_number', 'client_name', 'amount', 'status'] },
            
            notifications: { icon: 'fa-bell', title: 'Alert Dispatches', endpoint: '/api/notifications', dbTable: 'notifications', fields: [
                { name: 'user_id', type: 'number', label: 'Target Account ID', required: true },
                { name: 'title', type: 'text', label: 'Alert Headline', required: true },
                { name: 'message', type: 'textarea', label: 'Dispatch Body', required: true },
                { name: 'channel', type: 'text', label: 'Routing Channel', value: 'dashboard' }
            ], columns: ['id', 'user_id', 'title', 'status', 'created_at'] },
            
            support_tickets: { icon: 'fa-headset', title: 'Tech Escalations', endpoint: '/api/tickets', dbTable: 'support_tickets', fields: [
                { name: 'subject', type: 'text', label: 'Subject Vector', required: true },
                { name: 'description', type: 'textarea', label: 'Technical Description', required: true },
                { name: 'status', type: 'select', label: 'Resolution State', options: ['open', 'in_progress', 'resolved', 'closed'] },
                { name: 'priority', type: 'select', label: 'Urgency Matrix', options: ['low', 'medium', 'high', 'critical'] }
            ], columns: ['id', 'subject', 'priority', 'status'] },
            
            messages: { icon: 'fa-inbox', title: 'Inquiry Databank', endpoint: '/api/messages', dbTable: 'messages', fields: [
                { name: 'name', type: 'text', label: 'Sender Identity' },
                { name: 'email', type: 'email', label: 'Return Address' },
                { name: 'subject', type: 'text', label: 'Inquiry Context' },
                { name: 'message', type: 'textarea', label: 'Payload' },
                { name: 'status', type: 'select', label: 'Review State', options: ['unread', 'read', 'archived'] }
            ], columns: ['id', 'name', 'subject', 'status', 'created_at'] },
            
            consultations: { icon: 'fa-calendar-check', title: 'Briefing Skeds', endpoint: '/api/consultations', dbTable: 'consultations', fields: [
                { name: 'client_name', type: 'text', label: 'Client Identity', required: true },
                { name: 'client_email', type: 'email', label: 'Client Email', required: true },
                { name: 'booking_date', type: 'date', label: 'Target Date', required: true },
                { name: 'booking_time', type: 'time', label: 'Target Time', required: true },
                { name: 'status', type: 'select', label: 'Agenda State', options: ['pending', 'confirmed', 'completed', 'cancelled'] }
            ], columns: ['id', 'client_name', 'booking_date', 'booking_time', 'status'] },
            
            file_deliveries: { icon: 'fa-cloud-arrow-down', title: 'Patch Deliveries', endpoint: '/api/file-deliveries', dbTable: 'file_deliveries', hasFiles: true, fields: [
                { name: 'order_id', type: 'number', label: 'Parent Order Matrix ID' },
                { name: 'client_id', type: 'number', label: 'Authorized Target User ID' },
                { name: 'file_name', type: 'text', label: 'Archive Designation' },
                { name: 'attachment', type: 'file', label: 'Binary File Packet' },
                { name: 'status', type: 'select', label: 'Access Control', options: ['available', 'expired', 'revoked'] }
            ], columns: ['id', 'order_id', 'file_name', 'status'] }
        };

        // === 2. UTILITIES & API WRAPPER ===
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let icon = 'fa-circle-info text-[#0044ff]';
            let colors = 'border-blue-100 text-blue-800 bg-white';
            
            if (type === 'success') { icon = 'fa-circle-check text-emerald-500'; colors = 'border-emerald-100 text-emerald-800 bg-white'; }
            if (type === 'error') { icon = 'fa-triangle-exclamation text-red-500'; colors = 'border-red-100 text-red-800 bg-white'; }
            
            toast.className = `toast-notification pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl border shadow-lg text-xs font-bold transition-all duration-300 w-full font-mono ${colors}`;
            toast.innerHTML = `<i class="fa-solid ${icon} text-base"></i><div>${msg}</div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(10px)'; setTimeout(() => toast.remove(), 300); }, 4000);
        }

        async function fetchSecure(endpoint, method = 'GET', payload = null, isFormData = false) {
            const token = localStorage.getItem('dan74_token');
            if (!token && endpoint !== '/api/auth/login') {
                handleLogout();
                throw new Error("Session invalid. Re-authenticate.");
            }

            const options = { method, headers: { 'Authorization': `Bearer ${token}` } };
            
            if (payload) {
                if (isFormData) { 
                    options.body = payload; // Browser auto-sets multipart boundary
                } else { 
                    options.headers['Content-Type'] = 'application/json'; 
                    options.body = JSON.stringify(payload); 
                }
            }

            const res = await fetch(`${API_HOST}${endpoint}`, options);
            if (!res.ok) {
                if (res.status === 401 || res.status === 403) handleLogout();
                const errData = await res.json().catch(() => ({}));
                throw new Error(errData.error || errData.message || `HTTP Fault ${res.status}`);
            }
            return await res.json();
        }

        // === 3. AUTHENTICATION ===
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const btn = document.getElementById('auth-btn');
            const ogText = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Establishing...`;
            
            try {
                const res = await fetch(`${API_HOST}/api/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.message || "Validation failed");
                
                const user = data.user || data;
                if (user.role !== 'admin') throw new Error("Terminal access limited to administrators.");

                localStorage.setItem('dan74_token', data.token);
                localStorage.setItem('dan74_user', JSON.stringify(user));
                document.getElementById('header-user-name').innerText = user.name || 'Admin';
                
                document.getElementById('auth-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-overlay').style.pointerEvents = 'none';
                    document.getElementById('app-layout').classList.remove('hidden');
                    document.getElementById('app-layout').style.opacity = '1';
                }, 300);
                showToast("Cryptographic tunnel established.", "success");
                initApp();
            } catch (err) { 
                showToast(err.message, "error"); 
            } finally {
                btn.innerHTML = ogText;
            }
        }

        function handleLogout() {
            localStorage.removeItem('dan74_token');
            localStorage.removeItem('dan74_user');
            window.location.reload();
        }

        // === 4. ROUTING & UI INIT ===
        function initApp() {
            if(!localStorage.getItem('dan74_token')) return;
            document.getElementById('auth-overlay').style.opacity = '0';
            document.getElementById('auth-overlay').style.pointerEvents = 'none';
            document.getElementById('app-layout').classList.remove('hidden');
            setTimeout(() => document.getElementById('app-layout').style.opacity = '1', 100);
            
            const user = JSON.parse(localStorage.getItem('dan74_user') || '{}');
            document.getElementById('header-user-name').innerText = user.name || 'Admin';
            
            buildSidebar();
            loadDashboardStats();
            
            // Search Bar Listener
            document.getElementById('grid-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                renderTable(currentGridData.filter(row => 
                    Object.values(row).some(val => String(val).toLowerCase().includes(term))
                ));
            });
        }

        function buildSidebar() {
            const menu = document.getElementById('sidebar-menu');
            let html = `
                <a href="#" onclick="switchModule('dashboard')" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-xs font-bold text-gray-600 hover:bg-blue-50 hover:text-[#0044ff] transition-colors mb-2 sidebar-link" data-module="dashboard">
                    <i class="fa-solid fa-chart-pie w-4 text-center"></i> Main Telemetry
                </a>
                <div class="text-[9px] font-extrabold text-gray-400 uppercase tracking-widest px-4 mt-4 mb-2 font-mono">Operations Schema</div>
            `;
            
            for(const [key, config] of Object.entries(MODULE_REGISTRY)) {
                html += `
                    <a href="#" onclick="switchModule('${key}')" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-xs font-bold text-gray-600 hover:bg-blue-50 hover:text-[#0044ff] transition-colors sidebar-link" data-module="${key}">
                        <i class="fa-solid ${config.icon} w-4 text-center"></i> ${config.title}
                    </a>
                `;
            }
            menu.innerHTML = html;
            highlightSidebar('dashboard');
        }

        function highlightSidebar(moduleKey) {
            document.querySelectorAll('.sidebar-link').forEach(el => {
                el.classList.remove('bg-blue-50', 'text-[#0044ff]', 'border-l-4', 'border-[#0044ff]');
                if(el.getAttribute('data-module') === moduleKey) {
                    el.classList.add('bg-blue-50', 'text-[#0044ff]', 'border-l-4', 'border-[#0044ff]');
                }
            });
        }

        function switchModule(moduleKey) {
            currentModule = moduleKey;
            highlightSidebar(moduleKey);
            document.querySelectorAll('.view-panel').forEach(el => el.classList.add('hidden'));
            
            if(moduleKey === 'dashboard') {
                document.getElementById('view-dashboard').classList.remove('hidden');
                document.getElementById('view-title').innerText = 'Dashboard Overview';
                document.getElementById('view-badge').innerText = 'Core';
                loadDashboardStats();
            } else {
                document.getElementById('view-datagrid').classList.remove('hidden');
                const config = MODULE_REGISTRY[moduleKey];
                document.getElementById('view-title').innerText = config.title;
                document.getElementById('view-badge').innerText = 'Data Node';
                
                const btnCreate = document.getElementById('btn-create-record');
                btnCreate.innerHTML = `<i class="fa-solid ${moduleKey === 'broadcast' ? 'fa-paper-plane' : 'fa-plus'}"></i> ` + 
                                      (moduleKey === 'broadcast' ? 'Deploy Transmission' : 'Inject New Record');
                btnCreate.onclick = () => openModal('create', moduleKey);

                refreshDataGrid();
            }
                    }

        // === 5. DATA ENGINE ===
        async function loadDashboardStats() {
            try {
                const stats = await fetchSecure('/api/admin/stats');
                document.getElementById('stat-earnings').innerText = `$${parseFloat(stats.total_earnings).toFixed(2)}`;
                document.getElementById('stat-orders').innerText = stats.orders;
                document.getElementById('stat-consults').innerText = stats.pending_consultations;
                document.getElementById('stat-tickets').innerText = stats.open_tickets;
            } catch(err) { console.error(err); }
        }

        async function refreshDataGrid() {
            const config = MODULE_REGISTRY[currentModule];
            const tbody = document.getElementById('grid-body');
            const thead = document.getElementById('grid-head');
            
            if (currentModule === 'broadcast') {
                thead.innerHTML = ''; tbody.innerHTML = `<tr><td class="p-8 text-center text-xs font-mono text-gray-500">Initiate mass email transmission via the deploy button. Uses Brevo SDK backend pipeline.</td></tr>`;
                document.getElementById('grid-count').innerText = 'Broadcast Node Active';
                return;
            }

            tbody.innerHTML = `<tr><td colspan="${config.columns.length + 1}" class="p-8 text-center text-xs font-mono text-gray-400"><i class="fa-solid fa-circle-notch fa-spin"></i> Extracting arrays...</td></tr>`;
            
            try {
                let res = await fetchSecure(config.endpoint);
                let data = res.data || res; // Handle paginated wrappers if present
                currentGridData = data.filter(r => !r.is_deleted);
                
                // Build Header
                let headHtml = `<tr>`;
                config.columns.forEach(col => headHtml += `<th class="px-4 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest font-mono">${col.replace(/_/g, ' ')}</th>`);
                headHtml += `<th class="px-4 py-3 text-right text-[10px] font-bold text-gray-500 uppercase tracking-widest font-mono">Actions</th></tr>`;
                thead.innerHTML = headHtml;

                renderTable(currentGridData);
            } catch(err) { 
                tbody.innerHTML = `<tr><td colspan="10" class="p-4 text-center text-xs text-red-500 font-mono">${err.message}</td></tr>`;
                showToast(err.message, 'error'); 
            }
        }

        function renderTable(dataArray) {
            const config = MODULE_REGISTRY[currentModule];
            const tbody = document.getElementById('grid-body');
            tbody.innerHTML = '';
            
            document.getElementById('grid-count').innerText = `Mapping ${dataArray.length} valid entities`;

            if(dataArray.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${config.columns.length + 1}" class="p-8 text-center text-xs font-mono text-gray-400">Database node empty. Zero records matched.</td></tr>`;
                return;
            }

            dataArray.forEach(row => {
                let tr = document.createElement('tr');
                let rowHtml = '';
                
                config.columns.forEach(col => {
                    let val = row[col] || '';
                    if(col === 'status' || col === 'payment_status' || col === 'role') {
                        let badgeColor = 'bg-gray-100 text-gray-600';
                        if(['approved', 'active', 'paid', 'completed', 'resolved', 'admin'].includes(String(val).toLowerCase())) badgeColor = 'bg-emerald-50 text-emerald-600 border-emerald-100';
                        if(['pending', 'unpaid', 'in_progress', 'processing'].includes(String(val).toLowerCase())) badgeColor = 'bg-amber-50 text-amber-600 border-amber-100';
                        if(['cancelled', 'deleted', 'closed'].includes(String(val).toLowerCase())) badgeColor = 'bg-red-50 text-red-600 border-red-100';
                        val = `<span class="px-2 py-0.5 rounded border text-[9px] font-extrabold uppercase tracking-widest font-mono ${badgeColor}">${val}</span>`;
                    }
                    if(col === 'price' || col === 'amount') val = `<span class="font-bold text-[#0f172a] font-mono">$${parseFloat(val).toFixed(2)}</span>`;
                    if(col === 'progress') val = `${val}%`;
                    if(col === 'icon') val = `<i class="${val} text-[#0044ff]"></i>`;
                    if(String(val).startsWith('http') || String(val).startsWith('/uploads')) val = `<a href="${val}" target="_blank" class="text-[#0044ff] hover:underline font-bold text-[10px]"><i class="fa-solid fa-link"></i> Asset Node</a>`;
                    if(col === 'created_at') val = new Date(val).toLocaleDateString();

                    rowHtml += `<td class="px-4 py-3 text-xs text-gray-700 max-w-[200px] truncate">${val}</td>`;
                });

                rowHtml += `
                    <td class="px-4 py-3 text-right">
                        <div class="flex items-center justify-end gap-1.5">
                            ${currentModule === 'invoices' ? `<a href="${API_HOST}/api/invoices/${row.id}/download" target="_blank" class="w-7 h-7 rounded bg-amber-50 text-amber-500 hover:bg-amber-500 hover:text-white transition-colors flex items-center justify-center text-[10px]" title="Download PDF"><i class="fa-solid fa-download"></i></a>` : ''}
                            <button onclick="openModal('edit', '${currentModule}', ${row.id})" class="w-7 h-7 rounded bg-blue-50 text-[#0044ff] hover:bg-[#0044ff] hover:text-white transition-colors flex items-center justify-center text-[10px]">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button onclick="deleteRecord('${config.dbTable}', ${row.id})" class="w-7 h-7 rounded bg-red-50 text-[#ff2a2a] hover:bg-[#ff2a2a] hover:text-white transition-colors flex items-center justify-center text-[10px]">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </td>
                `;
                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            });
        }

        // === 6. FORM MODAL ENGINE ===
        function openModal(action, moduleKey, id = null) {
            const config = MODULE_REGISTRY[moduleKey];
            editingRecordId = id;
            
            document.getElementById('modal-title').innerText = action === 'create' ? `Inject New ${config.title}` : `Modify Record Vector #${id}`;
            document.getElementById('modal-subtitle').innerText = moduleKey.toUpperCase() + ' MATRIX';
            
            const form = document.getElementById('dynamic-form');
            form.innerHTML = '';
            
            // Set multipart encoding if required
            if (config.hasFiles) form.setAttribute('enctype', 'multipart/form-data');
            else form.removeAttribute('enctype');

            let existingData = {};
            if (id) existingData = currentGridData.find(r => r.id === id) || {};

            config.fields.forEach(f => {
                const val = existingData[f.name] !== undefined ? existingData[f.name] : (f.value || '');
                let inputHtml = '';
                
                const labelHtml = `<label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wide mb-1 font-mono">${f.label}</label>`;
                const classStr = "w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-[#0044ff] focus:ring-1 focus:ring-[#0044ff] transition-all font-mono";

                if (f.type === 'textarea') {
                    inputHtml = `<textarea name="${f.name}" class="${classStr}" rows="4" ${f.required ? 'required' : ''}>${val}</textarea>`;
                } else if (f.type === 'select') {
                    let opts = f.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o.toUpperCase()}</option>`).join('');
                    inputHtml = `<select name="${f.name}" class="${classStr}">${opts}</select>`;
                } else if (f.type === 'file') {
                    inputHtml = `<input type="file" name="${f.name}" class="${classStr} bg-white file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-[10px] file:font-bold file:bg-blue-50 file:text-[#0044ff]" ${action === 'create' && f.required ? 'required' : ''}>`;
                } else {
                    inputHtml = `<input type="${f.type}" name="${f.name}" value="${f.type !== 'password' ? val : ''}" class="${classStr}" ${f.required && f.type !== 'password' ? 'required' : ''}>`;
                }

                form.innerHTML += `<div class="mb-3">${labelHtml}${inputHtml}</div>`;
            });

            const modal = document.getElementById('form-modal');
            const modalContent = document.getElementById('form-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.style.opacity = '1';
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('form-modal');
            const modalContent = document.getElementById('form-modal-content');
            modal.style.opacity = '0';
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const config = MODULE_REGISTRY[currentModule];
            const form = e.target;
            const submitBtn = document.getElementById('btn-submit-form');
            
            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Transmitting...';

                let payload, isMultipart = false;
                if (config.hasFiles) {
                    payload = new FormData(form);
                    isMultipart = true;
                } else {
                    payload = Object.fromEntries(new FormData(form));
                }

                let method = editingRecordId ? 'PUT' : (config.methodOverride || 'POST');
                let endpoint = (action === 'create' && config.overridePostEndpoint) ? config.overridePostEndpoint : config.endpoint;
                
                if (editingRecordId) endpoint += `/${editingRecordId}`;

                const res = await fetchSecure(endpoint, method, payload, isMultipart);
                showToast(`Sequence execution successful.`, "success");
                
                closeModal();
                if(currentModule !== 'broadcast') refreshDataGrid();
            } catch (err) {
                showToast(err.message, "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Execute Write';
            }
        }

        async function deleteRecord(dbTable, id) {
            if(!confirm(`WARNING: Initialize soft-delete purge protocol for ${dbTable} record #${id}?`)) return;
            try {
                await fetchSecure(`/api/${dbTable}/bulk`, 'POST', { action: 'delete', ids: [id] });
                showToast("Data array purged from matrix.", "success");
                refreshDataGrid();
                loadDashboardStats();
            } catch(err) { showToast(err.message, 'error'); }
        }

        // Initialize App Checks on Load
        if(localStorage.getItem('dan74_token')) {
            initApp();
        }
    </script>
</body>
