<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAN74TECH MEDIA | PRO ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0044ff; --accent-orange: #ff9900; --accent-red: #ff2a2a;
            --success-green: #25D366; --bg-dark: #050505; --card-bg: rgba(255, 255, 255, 0.05);
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: white; }
        
        /* Layouts */
        #adminLogin { display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 15px; text-align: center; width: 300px; border-top: 4px solid var(--primary-blue); }
        
        #adminDashboard { display: none; min-height: 100vh; }
        .dashboard-container { display: flex; }
        .sidebar { width: 250px; background: #111; height: 100vh; padding: 20px; }
        .content { flex: 1; padding: 40px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .nav-item { padding: 15px; cursor: pointer; color: #aaa; }
        .nav-item.active { color: white; border-left: 3px solid var(--primary-blue); background: rgba(0,68,255,0.1); }
        
        .data-table { width: 100%; border-collapse: collapse; background: var(--card-bg); }
        .data-table th, .data-table td { padding: 15px; border-bottom: 1px solid #333; text-align: left; }
        
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary-blue); color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="adminLogin">
        <div class="login-box">
            <h2>PRO ADMIN</h2>
            <input type="text" id="adminUser" placeholder="Admin Username">
            <input type="password" id="adminPass" placeholder="Password">
            <button onclick="attemptLogin()">Access Dashboard</button>
            <p id="loginError" style="color:red; display:none;">Invalid Credentials</p>
        </div>
    </div>

    <div id="adminDashboard">
        <div class="dashboard-container">
            <div class="sidebar">
                <div class="nav-item active" onclick="switchTab('services')">📋 Manage Services</div>
                <div class="nav-item" onclick="switchTab('users')">👥 Login Database</div>
            </div>
            <div class="content">
                <div id="tab-services" class="tab-content active">
                    <h1>Manage Services</h1>
                    <p>Use this area to update your service offerings.</p>
                </div>
                <div id="tab-users" class="tab-content">
                    <h1>Login Database</h1>
                    <table class="data-table">
                        <thead>
                            <tr><th>ID</th><th>Username</th><th>Email</th></tr>
                        </thead>
                        <tbody id="userTableBody">
                            <tr><td colspan="3">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function attemptLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            // Simple validation; replace with API call for production
            if(user === "admin" && pass === "admin123") {
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        async function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            
            if(tabId === 'users') {
                try {
                    const res = await fetch('/api/users');
                    const users = await res.json();
                    const tbody = document.getElementById('userTableBody');
                    tbody.innerHTML = users.map(u => `
                        <tr>
                            <td>${u.id}</td>
                            <td>${u.username}</td>
                            <td>${u.email}</td>
                        </tr>
                    `).join('');
                } catch(err) {
                    document.getElementById('userTableBody').innerHTML = "<tr><td colspan='3'>Error loading data</td></tr>";
                }
            }
        }
    </script>
</body>
</html>
