        // Main Fetch Execution Wrapper implementing secure verification parameters
        async function fetchSecure(endpoint, method = 'GET', bodyData = null) {
            const token = localStorage.getItem(TOKEN_KEY);
            const headers = { 'Authorization': `Bearer ${token}` };
            if (!(bodyData instanceof FormData)) headers['Content-Type'] = 'application/json';

            const config = { method, headers };
            if (bodyData) config.body = bodyData instanceof FormData ? bodyData : JSON.stringify(bodyData);

            try {
                const response = await fetch(`${API_BASE}/api/${endpoint}`, config);
                if (response.status === 401 || response.status === 403) {
                    executeLogoutSequence(true);
                    throw new Error("Clearance Authorization credentials invalid or expired.");
                }
                if (method === 'DELETE') return { success: true };
                
                // Route check logic for binary application stream payloads
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/pdf')) return await response.blob();

                const parsedResultData = await response.json();
                if (!response.ok) throw new Error(parsedResultData.error || parsedResultData.message || "Pipeline processing transaction fault.");
                return parsedResultData;
            } catch (err) {
                pushSystemOperationalToast(err.message, "error");
                throw err;
            }
        }

            } catch (err) {
                console.error("PDF Extraction application logic failure error trace:", err);
            }
        }
    </script>
</body>
