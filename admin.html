    <script>
        // STRICT JWT VALIDATION WALL - Executes instantly to prevent unauthorized DOM rendering
        (function() {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(window.atob(base64));
                if (payload.role !== 'admin') {
                    alert('CRITICAL ACCESS ERROR: Administrative clearance required.');
                    window.location.href = '/client.html';
                }
            } catch (err) {
                localStorage.removeItem('authToken');
                window.location.href = '/login.html';
            }
        })();

            theme: {
                extend: {
                    colors: {

        // GLOBAL APPLICATION SECURE NETWORK ACCESS LAYER WRROLLER
        async function fetchSecure(endpoint, method = 'GET', body = null, isMultipart = false) {
            const token = localStorage.getItem('authToken');
            let headers = { 'Authorization': `Bearer ${token}` };
            
            // STRICT INTERCEPT FIX: Let browser implicitly apply appropriate form boundary strings
            if (!isMultipart) {
                headers['Content-Type'] = 'application/json';
            }

            let configuration = { method, headers };
            if (body) {
                configuration.body = isMultipart ? body : JSON.stringify(body);
            }

            const cleanEndpoint = endpoint.startsWith('/') ? endpoint : `/api/${endpoint}`;
            const response = await fetch(`${API_BASE}${cleanEndpoint}`, configuration);
            
            if (response.status === 401 || response.status === 403) {
                pushSystemOperationalToast("Administrative session key validation rejected. Access revoked.", "error");
                executeLogoutSequence();
                throw new Error("Clearance error state detected.");
            }
            
            if (!response.ok) {
                const faultObj = await response.json().catch(() => ({ error: "System pipeline unhandled panic error state" }));
                throw new Error(faultObj.error || "Data layer mapping operational transaction failure.");
            }
            
            if (method === 'DELETE' || response.status === 204) return { success: true };
            
            // Special handling for dynamic formats (e.g. dynamic invoice generation pipelines)
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.includes("application/pdf")) {
                return await response.blob();
            }

            return await response.json();
        }

            toast.className = `p-4 rounded-xl shadow-lg border text-xs font-mono font-bold uppercase flex items-center gap-3 bg-white transition-all transform translate-y-2 opacity-0 duration-300`;

                            </div>

                                <div class="flex justify-between py-1 border-b border-dashed border-slate-100"><span class="text-brand-textMuted">Relational DB Pool Layer:</span> <span class="font-bold text-emerald-600">ACTIVE (Neon Connection Pool)</span></div>
                                <div class="flex justify-between py-1 border-b border-dashed border-slate-100"><span class="text-brand-textMuted">Mass Mail Relay Access:</span> <span class="font-bold text-emerald-600">CONNECTED (Brevo SDK Core)</span></div>

            try {
                // Read from structured backend API routes matrix mapping keys
                const rawRecords = await fetchSecure(meta.endpoint);
                appState.cachedRecords = Array.isArray(rawRecords) ? rawRecords : (rawRecords.data ? rawRecords.data : []);
                
                if (appState.cachedRecords.length === 0) {
                    viewport.innerHTML = `
                        <div class="bg-brand-panelWhite rounded-2xl border border-brand-borderSlate p-12 text-center text-xs font-mono text-brand-textMuted shadow-sm">

                        </div>
                    `;
                    return;

                // Compile tabular grid layout system dynamically

                appState.cachedRecords.forEach(record => {
                    datagridHtml += `<tr class="hover:bg-slate-50/80 transition-colors">`;

                            </button>
                        </td>
                    </tr>`;
                });

                datagridHtml += `</tbody></table></div></div>`;
                viewport.innerHTML = datagridHtml;

            } catch (err) {
                viewport.innerHTML = `
                    <div class="p-6 bg-rose-50 border border-rose-100 rounded-2xl text-center text-xs font-mono text-brand-red shadow-sm">
                        <i class="fa-solid fa-triangle-exclamation text-2xl mb-2 block"></i>
                        Dynamic layout mapping structural read failure: ${err.message}
                    </div>
                `;

        }

        // DATA ASSEMBLY MODAL CONFIGURATION ENGINE INTERFACES
        function openActionModal(mode, recordId = null) {
            appState.mode = mode;
            appState.activeId = recordId;
            
            const meta = MODULE_REGISTRY[appState.module];
            const stack = document.getElementById('dynamicFormFieldsStack');
            const form = document.getElementById('dynamicMatrixDataAssemblyForm');
            
            form.reset();
            stack.innerHTML = '';
            
            document.getElementById('modalInterfaceTitle').innerText = mode === 'create' 
                ? `Append Record Entry to ${meta.label} Schema` 
                : `Modify ${meta.label} Schema Record Reference ID: #${recordId}`;

            let recordMatch = mode === 'edit' ? appState.cachedRecords.find(r => r.id === recordId) : null;

            // Generate HTML input structural fields matching configuration parameters
            meta.fields.forEach(f => {
                let inputContainer = `<div class="${f.type === 'textarea' ? 'sm:col-span-2' : ''} flex flex-col gap-1.5">
                    <label class="text-[10px] font-extrabold uppercase font-mono tracking-wider text-brand-textMuted">${f.label}${f.required && mode === 'create' ? ' <span class="text-brand-red">*</span>' : ''}</label>`;
                
                let curVal = recordMatch && recordMatch[f.name] !== undefined && recordMatch[f.name] !== null ? recordMatch[f.name] : '';

                if (f.type === 'textarea') {
                    inputContainer += `<textarea name="${f.name}" ${f.required && mode === 'create' ? 'required' : ''} class="w-full bg-slate-50 border border-brand-borderSlate rounded-xl px-4 py-3 text-xs text-brand-textDark focus:outline-none focus:border-brand-blue focus:bg-white transition-all h-28 font-sans" placeholder="${f.placeholder || ''}">${curVal}</textarea>`;
                } else if (f.type === 'select') {
                    inputContainer += `<select name="${f.name}" ${f.required && mode === 'create' ? 'required' : ''} class="w-full bg-slate-50 border border-brand-borderSlate rounded-xl px-4 py-3 text-xs text-brand-textDark focus:outline-none focus:border-brand-blue focus:bg-white transition-all font-mono">`;
                    f.options.forEach(opt => {
                        let selected = curVal.toString() === opt.toString() ? 'selected' : '';
                        inputContainer += `<option value="${opt}" ${selected}>${opt.toUpperCase()}</option>`;
                    });
                    inputContainer += `</select>`;
                } else if (f.type === 'file') {
                    inputContainer += `
                        <div class="relative flex flex-col gap-2">
                            <input type="file" name="${f.name}" ${f.required && mode === 'create' ? 'required' : ''} class="w-full bg-slate-50 border border-brand-borderSlate rounded-xl px-4 py-2.5 text-xs text-brand-textMuted file:mr-4 file:py-1 file:px-2.5 file:rounded-lg file:border-0 file:text-[10px] file:font-mono file:font-bold file:uppercase file:bg-brand-blue/10 file:text-brand-blue hover:file:bg-brand-blue/20 transition-all font-mono">
                            ${curVal ? `<p class="text-[10px] text-brand-orange truncate font-mono bg-orange-50 border border-orange-100 p-2 rounded-lg">Active CDN Vector: ${curVal}</p>` : ''}
                        </div>
                    `;
                } else {
                    let reqAttr = (f.required && mode === 'create') ? 'required' : '';
                    let placeholderVal = f.placeholder || '';
                    if (f.type === 'password' && mode === 'edit') reqAttr = ''; // Unrequire passwords on update operations
                    
                    inputContainer += `<input type="${f.type}" name="${f.name}" value="${f.type === 'password' ? '' : curVal}" ${reqAttr} placeholder="${placeholderVal}" class="w-full bg-slate-50 border border-brand-borderSlate rounded-xl px-4 py-3 text-xs text-brand-textDark focus:outline-none focus:border-brand-blue focus:bg-white transition-all font-sans">`;
                }

                inputContainer += `</div>`;
                stack.insertAdjacentHTML('beforeend', inputContainer);
            });

            // Trigger structural rendering of CSS visibility animations
            const portal = document.getElementById('structuralActionModalPortal');
            portal.classList.remove('hidden');
            setTimeout(() => {
                portal.classList.remove('opacity-0');
                portal.firstElementChild.classList.remove('scale-95');
            }, 50);
        }

        // CLOSE ACTIVE STRUCTURAL ACTION WINDOW MODAL ENGINE
        function closeActiveModalWindow() {
            const portal = document.getElementById('structuralActionModalPortal');
            portal.classList.add('opacity-0');
            portal.firstElementChild.classList.add('scale-95');
            setTimeout(() => {
                portal.classList.add('hidden');
                document.getElementById('dynamicMatrixDataAssemblyForm').reset();
                appState.activeId = null;
            }, 300);
        }

        // FORM TRANSACTION DATA ASSEMBLY PIPE CONTROLLER SUBMIT WRITE
        async function executeWriteSubmitPipeline(e) {
            e.preventDefault();
            const meta = MODULE_REGISTRY[appState.module];
            const btn = document.getElementById('submitActionButtonText');
            const formElement = document.getElementById('dynamicMatrixDataAssemblyForm');
            const formData = new FormData(formElement);

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-1.5"></i> Syncing Engine Record Node...';

            try {
                let endpoint = meta.endpoint;
                let method = appState.mode === 'create' ? 'POST' : 'PUT';
                
                if (appState.mode === 'edit') {
                    endpoint = `${meta.endpoint}/${appState.activeId}`;
                }

                let responseObj;
                if (meta.hasFiles) {
                    // VALIDATION FIX: Scrub empty text files out of multi-part payloads during edit mode to safeguard database pointers
                    if (appState.mode === 'edit') {
                        meta.fields.forEach(field => {
                            if (field.type === 'file') {
                                const fileInput = formElement.querySelector(`input[name="${field.name}"]`);
                                if (fileInput && fileInput.files.length === 0) {
                                    formData.delete(field.name);
                                }
                            }
                        });
                    }
                    responseObj = await fetchSecure(endpoint, method, formData, true);
                } else {
                    const plainPayloadObj = Object.fromEntries(formData.entries());
                    // Secure field pruning: eliminate blank password inputs from the mapping block to maintain structural logic
                    if (appState.mode === 'edit' && plainPayloadObj.password === '') {
                        delete plainPayloadObj.password;
                    }
                    responseObj = await fetchSecure(endpoint, method, plainPayloadObj, false);
                }

                pushSystemOperationalToast(`Schema operations write execution sequence completed successfully.`, "success");
                closeActiveModalWindow();
                refreshDataGrid();
            } catch (err) {
                pushSystemOperationalToast(err.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-microchip mr-1.5"></i> Execute Write';
            }
        }

        // COMPILATION SOFT DELETION PURGE CONTROL INTERCEPT SIGNAL
        async function executeSoftPurgeSequence(dbTableKey, entityRecordId) {
            if (!confirm(`CRITICAL DELETION WARNING: Initialize soft-delete isolation sequence for structural record node reference #${entityRecordId}?`)) return;
            try {
                await fetchSecure(`${dbTableKey}/${entityRecordId}`, 'DELETE');
                pushSystemOperationalToast("Structural data row safely isolated and parsed from operational lookup matrix.", "success");
                refreshDataGrid();
            } catch (err) {
                pushSystemOperationalToast(err.message, "error");
            }
        }

        // FINANCIAL INVOICE PDF EXTRACTION DATA PIPELINE CONTROLLER
        async function triggerInvoiceDownloadPipeline(invoiceEntityId) {
            pushSystemOperationalToast("Accessing server routing maps to isolate ledger PDF binary tracks...", "info");
            try {
                const pdfBlobData = await fetchSecure(`/invoices/${invoiceEntityId}/download`, 'GET');
                const localizedDownloadUrl = window.URL.createObjectURL(pdfBlobData);
                const internalAnchorNode = document.createElement('a');
                internalAnchorNode.href = localizedDownloadUrl;
                internalAnchorNode.download = `DAN74TECH_MEDIA_INVOICE_RECORD_${invoiceEntityId}.pdf`;
                document.body.appendChild(internalAnchorNode);
                internalAnchorNode.click();
                internalAnchorNode.remove();
                window.URL.revokeObjectURL(localizedDownloadUrl);
                pushSystemOperationalToast("Fidelity PDF ledger download complete.", "success");
            } catch (err) {
                pushSystemOperationalToast(`PDF Generation fault sequence tracking logs: ${err.message}`, "error");
            }
        }

        // MASS BROADCAST TRANSMISSION ROUTING EXECUTION DISPATCHER

        // DESTRUCTION TERMINATION LOGOUT PIPELINE SEQUENCE
        function executeLogoutSequence() {
            localStorage.removeItem('authToken');
            pushSystemOperationalToast("Session destruction routine executed successfully. Re-routing initialization path.", "info");
            setTimeout(() => {
                window.location.href = '/login.html';

        }
    </script>
